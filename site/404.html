<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Batch A 台灣小學數學練習題產生器</title>
  <link rel="stylesheet" href="./assets/styles/app.css">
</head>
<body data-route-kind="404">
  <main class="app-shell">
    <section class="app-shell__hero">
      <p class="app-shell__eyebrow">Batch A browser worksheet path</p>
      <h1>台灣小學數學 Batch A 練習題產生器</h1>
      <p class="app-shell__lede">找不到指定頁面，但仍可使用單元、知識點、題目形式、預覽與列印流程。</p>
      <nav class="app-shell__version-nav" aria-label="介面版本切換">
        <a class="version-link" href="./index.html">返回標準版首頁</a>
        <a class="version-link" href="./pixel/">切換至像素風版 Beta</a>
      </nav>
    </section>

    <section class="app-shell__controls" aria-label="Batch A worksheet controls">
      <div class="control-group">
        <h2>Batch A 單元</h2>
        <label class="field">
          <span>選擇單元</span>
          <select id="batch-a-source-select" name="batchASourceId"></select>
        </label>
        <p class="help-text" id="batch-a-source-help">13 個 Batch A 單元可選。</p>
      </div>

      <div class="control-group" id="batch-a-knowledge-point-selector" aria-label="知識點與題目形式選擇">
        <h2>知識點選擇</h2>
        <label class="field">
          <span>出題模式</span>
          <select id="batch-a-selection-mode-select" name="batchASelectionMode">
            <option value="sourceUnit" selected>單元出題</option>
            <option value="singleKnowledgePoint">單一知識點加強</option>
            <option value="mixedKnowledgePointsSameUnit">同單元知識點混合</option>
            <option value="mixedKnowledgePointsCrossUnit" disabled>跨單元知識點混合</option>
          </select>
        </label>
        <p class="help-text" id="batch-a-knowledge-point-empty-state">此單元已有通過驗證的知識點時，可選擇單一知識點加強或同單元混合。</p>
        <div class="availability-summary" id="batch-a-knowledge-point-availability-summary" aria-live="polite">
          可選知識點：0｜已建立但尚未開放：0｜目前不可選：0
        </div>
        <div class="knowledge-point-panel" id="batch-a-knowledge-point-panel" aria-live="polite"></div>

        <section class="pattern-group-selector" id="batch-a-pattern-group-selector" data-visible="false" aria-label="題目形式選擇">
          <h3>題目形式</h3>
          <p class="help-text" id="batch-a-pattern-group-help">切換到知識點模式後，可選擇計算題或應用題。</p>
          <div class="pattern-group-panel" id="batch-a-pattern-group-panel" aria-live="polite"></div>
        </section>

        <ul class="selector-warning-list" id="batch-a-knowledge-point-warning-list" aria-live="polite"></ul>
      </div>

      <div class="control-group">
        <h2>題目設定</h2>
        <div class="control-grid">
          <label class="field">
            <span>題目數量</span>
            <input id="batch-a-question-count-input" name="batchAQuestionCount" type="number" min="1" max="200" value="20" spellcheck="false">
          </label>
          <label class="field">
            <span>排序模式</span>
            <select id="batch-a-ordering-select" name="batchAOrdering">
              <option value="groupedByPattern">依題型分組</option>
              <option value="shuffleAcrossPatterns">跨題型隨機排序</option>
            </select>
          </label>
          <label class="field">
            <span>產生種子</span>
            <input id="generation-seed-input" name="generationSeed" type="text" value="batch-a-browser" spellcheck="false">
          </label>
        </div>
        <label class="toggle">
          <input id="batch-a-answer-key-input" name="batchAIncludeAnswerKey" type="checkbox" checked>
          <span>包含答案頁</span>
        </label>
      </div>

      <div class="control-group">
        <h2>列印版面</h2>
        <div class="control-grid">
          <label class="field">
            <span>欄數</span>
            <input id="columns-input" name="columns" type="number" min="1" max="6" value="4" spellcheck="false">
          </label>
          <label class="field">
            <span>每頁列數</span>
            <input id="rows-per-page-input" name="rowsPerPage" type="number" min="1" max="20" value="10" spellcheck="false">
          </label>
        </div>
      </div>

      <div class="toolbar">
        <button id="regenerate-button" class="button button--primary" type="button">產生 / 重新產生</button>
        <button id="print-button" class="button" type="button" disabled>列印</button>
      </div>

      <div class="status-panel" id="status-panel" aria-live="polite"></div>
      <div class="validation-panel" id="validation-panel" aria-live="polite"></div>
    </section>

    <section class="app-shell__preview" aria-label="Worksheet preview">
      <div class="preview-header">
        <h2>預覽</h2>
        <p id="preview-meta">尚未產生新的 Batch A 練習題。</p>
      </div>
      <iframe
        id="preview-frame"
        class="preview-frame"
        title="Worksheet preview"
        loading="eager"
        referrerpolicy="no-referrer"
      ></iframe>
    </section>
  </main>

  <script type="module" src="./assets/browser/main.js"></script>
</body>
</html>
