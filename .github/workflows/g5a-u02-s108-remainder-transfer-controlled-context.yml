name: G5A-U02 S108 Remainder Transfer Controlled Context

on:
  pull_request:
    branches: [main]
    paths:
      - "src/curriculum/g5a-u02/**"
      - "site/modules/renderer/g5a-u02-s101-public-renderer.js"
      - "site/modules/renderer/g5a-u02-s108-public-representation.js"
      - "site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js"
      - "tests/curriculum/g5a-u02-s108-remainder-transfer-controlled-context.test.js"
      - "tools/curriculum/run-g5a-u02-s108-bundle-audit.mjs"
      - "docs/curriculum/architecture/G5AU02_S108_P2RemainderTransferControlledContextFullFix.md"
      - "docs/curriculum/output/G5AU02_S108_P2_REMAINDER_TRANSFER_CONTEXT_PENDING.marker"
      - ".github/workflows/g5a-u02-s108-remainder-transfer-controlled-context.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  source-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run S108 focused source, validator and renderer acceptance
        run: node --test tests/curriculum/g5a-u02-s108-remainder-transfer-controlled-context.test.js
      - name: Run S107 predecessor regression
        run: node --test tests/curriculum/g5a-u02-s107-selection-symbolic-common-marking.test.js

  browser-bundle:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build current browser runtime from canonical source
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile=site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Verify bundled S108 authority
        run: node tools/curriculum/run-g5a-u02-s108-bundle-audit.mjs > /tmp/g5a-u02-s108-bundle-audit.json
      - name: Materialize canonical bundle on the PR branch
        shell: bash
        run: |
          if git diff --quiet -- site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
          git commit -m "build(g5a-u02): materialize S108 browser runtime"
          git push origin HEAD:${{ github.head_ref }}
      - name: Require committed bundle parity
        run: git diff --exit-code -- site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Upload generated bundle and audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-s108-generated-bundle
          retention-days: 30
          if-no-files-found: error
          path: |
            site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
            /tmp/g5a-u02-s108-bundle-audit.json

  full-regression:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-package-lock
      - name: Run complete Node regression with inspectable readback
        shell: bash
        run: |
          set +e
          npm test > /tmp/g5a-u02-s108-full-regression.log 2>&1
          status=$?
          tail -n 180 /tmp/g5a-u02-s108-full-regression.log
          exit "$status"
      - name: Upload full regression readback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-s108-full-regression
          retention-days: 7
          if-no-files-found: error
          path: /tmp/g5a-u02-s108-full-regression.log
