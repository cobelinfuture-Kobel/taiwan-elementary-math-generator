name: GCTX-P14 Patch Validation Steps

on:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/gctx-p14-patch-validation-steps.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-main-workflow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply exact workflow patch
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('.github/workflows/gctx-p14-live-public-ui-d0.yml')
          text = path.read_text(encoding='utf-8')

          trigger = '      - "tools/governance/promote-gctx-p14-e6-d0-claim.mjs"\n'
          validator_trigger = '      - "tools/governance/validate-gctx-p14-e6-live-evidence.mjs"\n'
          if validator_trigger not in text:
              if trigger not in text:
                  raise SystemExit('P14 promoter trigger line not found')
              text = text.replace(trigger, trigger + validator_trigger, 1)

          start_marker = '      - name: Validate live result and D0 Claim\n'
          end_marker = '      - name: Upload live UI evidence\n'
          start = text.find(start_marker)
          end = text.find(end_marker, start)
          if start < 0 or end < 0:
              raise SystemExit('P14 combined validation block not found')

          replacement = '''      - name: Validate milestone Claim schema and hashes
        run: npm run governance:claims

      - name: Validate live result and D0 artifact identity
        env:
          LIVE_EVIDENCE_DIR: ${{ steps.evidence_state.outputs.output_dir }}
        run: node tools/governance/validate-gctx-p14-e6-live-evidence.mjs

'''
          text = text[:start] + replacement + text[end:]
          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit exact workflow patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/gctx-p14-live-public-ui-d0.yml
          if git diff --cached --quiet; then
            echo "Split P14 validation steps already committed."
          else
            git commit -m "ci(gctx): split P14 Claim and artifact validation"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
