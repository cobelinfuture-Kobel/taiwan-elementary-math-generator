name: S96H Exact Main Readback Recovery

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/s96h-exact-main-readback-recovery.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: s96h-exact-main-readback-recovery
  cancel-in-progress: false

jobs:
  exact-main-readback:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout exact main SHA
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Run full Node test suite
        shell: bash
        run: |
          set -o pipefail
          npm test 2>&1 | tee "$RUNNER_TEMP/npm-test-output.txt"

      - name: Verify test summary and clean tree
        shell: bash
        run: |
          TESTS=$(awk '/(^|[[:space:]])tests[[:space:]]+[0-9]+/ { value=$NF } END { print value }' "$RUNNER_TEMP/npm-test-output.txt")
          PASS=$(awk '/(^|[[:space:]])pass[[:space:]]+[0-9]+/ { value=$NF } END { print value }' "$RUNNER_TEMP/npm-test-output.txt")
          FAIL=$(awk '/(^|[[:space:]])fail[[:space:]]+[0-9]+/ { value=$NF } END { print value }' "$RUNNER_TEMP/npm-test-output.txt")
          test -n "$TESTS"
          test "$PASS" = "$TESTS"
          test "$FAIL" = "0"
          test -z "$(git status --porcelain)"
          echo "TESTS=$TESTS" >> "$GITHUB_ENV"
          echo "PASS=$PASS" >> "$GITHUB_ENV"
          echo "FAIL=$FAIL" >> "$GITHUB_ENV"

      - name: Write exact main authority
        shell: bash
        run: |
          python3 <<'PY'
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path('docs/ci/latest-public-math-ci-readback.json')
          data = {
              'schemaVersion': 'public-math-ci-readback-v1',
              'status': 'PASS_CI_SYNCED_AND_CLEAN',
              'result': 'PASS',
              'failedStage': 'none',
              'workflow': os.environ['GITHUB_WORKFLOW'],
              'repository': os.environ['GITHUB_REPOSITORY'],
              'eventName': os.environ['GITHUB_EVENT_NAME'],
              'ref': os.environ['GITHUB_REF'],
              'refName': os.environ['GITHUB_REF_NAME'],
              'sha': os.environ['GITHUB_SHA'],
              'run': {
                  'id': os.environ['GITHUB_RUN_ID'],
                  'number': os.environ['GITHUB_RUN_NUMBER'],
                  'attempt': os.environ['GITHUB_RUN_ATTEMPT'],
                  'url': f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              },
              'checks': {
                  'npmTestExitCode': {'expected': '0', 'actual': '0'},
                  'tests': {'expected': 'auto-detected', 'actual': os.environ['TESTS']},
                  'pass': {'expected': 'equal tests', 'actual': os.environ['PASS']},
                  'fail': {'expected': '0', 'actual': os.environ['FAIL']},
                  'workingTree': {'expected': 'clean', 'actual': 'clean'},
              },
              'steps': {
                  'checkout': 'success',
                  'setupNode': 'success',
                  'installDependencies': 'success',
                  'npmTest': 'success',
                  'verifyDynamicTestResult': 'success',
                  'gitStatus': 'success',
                  'verifyWorkingTree': 'success',
              },
              'diagnostics': {
                  'failingTestsExcerpt': '',
                  'npmOutputTail': '',
                  'failureContext': '',
              },
              'recovery': {
                  'task': 'S96H_R3_G5A_U02_ReadbackRecovery',
                  'originalS96HMergeSha': 'f6c1703405877787c255fb50d994c20ac81dc598',
              },
              'updatedAt': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
          }
          path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Commit exact main authority
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ci/latest-public-math-ci-readback.json
          git commit -m "ci: recover S96H exact main readback [skip ci]"
          git push origin HEAD:main
