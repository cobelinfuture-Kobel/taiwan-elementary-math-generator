name: G5A-U02 S104 P0 Integrated Semantic Renderer HTML PDF

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/curriculum/g5a-u02/**"
      - "site/modules/curriculum/batch-a/g5a-u02-global-layout-projection.js"
      - "site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js"
      - "site/modules/renderer/g5a-u02-s101-public-renderer.js"
      - "site/modules/renderer/html-renderer-s73-extension.js"
      - "site/assets/styles/print-styles.css"
      - "data/curriculum/contracts/G5AU02_S99_P0SourceMethodAndRepresentationFullFixContract.json"
      - "data/curriculum/contracts/GLM_S00_PublicCompletedUnit18LayoutContract.json"
      - "tests/curriculum/g5a-u02-s104-p0-integrated-semantic-renderer-html-pdf.test.js"
      - "tools/curriculum/run-g5a-u02-s104-html-pdf-acceptance.mjs"
      - "docs/curriculum/architecture/G5AU02_S104_P0IntegratedSemanticRendererHTMLPDFAcceptance.md"
      - "docs/curriculum/output/G5AU02_S104_P0_INTEGRATED_ACCEPTANCE_PENDING.marker"
      - ".github/workflows/g5a-u02-s104-p0-integrated-semantic-renderer-html-pdf.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  item-matrix-and-regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install --no-package-lock
      - name: Verify committed browser bundle matches canonical source
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile=/tmp/g5a-u02-browser-dynamic-runtime.bundle.js
          cmp site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js /tmp/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Run S104 768-item integrated matrix
        run: node --test tests/curriculum/g5a-u02-s104-p0-integrated-semantic-renderer-html-pdf.test.js
      - name: Run predecessor P0 and question-boundary gates
        run: |
          node --test tests/curriculum/g5a-u02-s100-method-witness-language-reasoning.test.js
          node --test tests/curriculum/g5a-u02-s101-partition-geometry-representation.test.js
          node --test tests/curriculum/g5a-u02-s102-nontrivial-common-factor-witness.test.js
          node --test tests/curriculum/g5a-u02-s103-digit-code-profile-separation.test.js
          node --test tests/curriculum/g5a-u02-pre-s104-worked-solution-leakage.test.js
      - name: Run complete Node regression
        shell: bash
        run: |
          set +e
          npm test > /tmp/g5a-u02-s104-full-regression.log 2>&1
          status=$?
          tail -n 300 /tmp/g5a-u02-s104-full-regression.log
          exit "$status"
      - name: Upload regression readback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-s104-full-regression
          retention-days: 14
          if-no-files-found: error
          path: /tmp/g5a-u02-s104-full-regression.log

  actual-layout-answer-boundary-html-pdf:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install project, browser, font and PDF dependencies
        run: |
          npm install --no-package-lock
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
      - name: Verify committed browser bundle matches canonical source
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile=/tmp/g5a-u02-browser-dynamic-runtime.bundle.js
          cmp site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js /tmp/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Run 216-layout and 72-answer-boundary HTML/PDF acceptance
        run: node tools/curriculum/run-g5a-u02-s104-html-pdf-acceptance.mjs
      - name: Validate exact S104 matrix totals
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const root = 'docs/curriculum/output/g5a-u02-s104';
          const layout = JSON.parse(await readFile(`${root}/layout-manifest.json`, 'utf8'));
          const boundary = JSON.parse(await readFile(`${root}/answer-boundary-manifest.json`, 'utf8'));
          if (layout.scenarioCount !== 216 || layout.passCount !== 216 || layout.status !== 'PASS') {
            throw new Error(`S104_LAYOUT_MATRIX_FAIL:${layout.passCount}/${layout.scenarioCount}`);
          }
          if (boundary.scenarioCount !== 72 || boundary.passCount !== 72 || boundary.status !== 'PASS') {
            throw new Error(`S104_ANSWER_BOUNDARY_FAIL:${boundary.passCount}/${boundary.scenarioCount}`);
          }
          console.log(JSON.stringify({ layout: '216/216 PASS', answerBoundary: '72/72 PASS' }, null, 2));
          NODE
      - name: Upload S104 HTML/PDF acceptance authority
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-s104-integrated-html-pdf-authority
          retention-days: 30
          if-no-files-found: error
          path: docs/curriculum/output/g5a-u02-s104
