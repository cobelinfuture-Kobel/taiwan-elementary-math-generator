name: Historical POSTG Milestone Readback

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: historical-postg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  historical-readback:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run consolidated historical POSTG readback
        run: node --test tests/curriculum/postg-app-*.test.js
