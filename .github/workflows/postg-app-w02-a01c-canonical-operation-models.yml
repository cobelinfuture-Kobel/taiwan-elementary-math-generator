name: POSTG-APP W02-A01C Canonical Operation Models

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postg-app-w02-a01c-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  canonical-operation-models:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install project dependencies
        run: npm install
      - name: Run W02 A01C focused tests
        run: node --test tests/curriculum/postg-app-w02-a01c-canonical-operation-models.test.js
      - name: Run deterministic W02 A01C validator
        run: node tools/curriculum/validate-postg-app-w02-a01c-canonical-operation-models.mjs
      - name: Verify materializer is idempotent
        run: |
          node tools/curriculum/materialize-postg-app-w02-a01c-canonical-operation-models.mjs
          git diff --exit-code
      - name: Verify W02 A01B regression
        run: |
          node --test tests/curriculum/postg-app-w02-a01b-page-knowledge-operation-candidates.test.js
          node tools/curriculum/validate-postg-app-w02-a01b-page-knowledge-operation-candidates.mjs
      - name: Validate master controller and milestone claims
        run: |
          node --test tests/curriculum/postg-app-m00-master-controller.test.js
          node tools/curriculum/validate-postg-app-m00-master-controller.mjs
          npm run governance:claims
