name: POSTG-APP W02-A04 Validator Shadow

on:
  pull_request:
    branches: [ main ]
    paths:
      - "data/curriculum/application/assessment/w02-validator-fixture-shadow-*.json"
      - "data/curriculum/application/schema/w02-validator-shadow-fixture.schema.json"
      - "data/curriculum/application/contracts/POSTG-APP-W02-A04_ValidatorFixturesAndSharedRuntimeShadow.json"
      - "data/project/milestones/POSTG-APP-W02-A04.claim.json"
      - "src/curriculum/application/w02-validator-fixture-shadow-runtime.mjs"
      - "tools/curriculum/validate-postg-app-w02-a04-runtime-shadow.mjs"
      - "tests/curriculum/postg-app-w02-a04-runtime-shadow.test.js"
      - "data/curriculum/application/controller/postg-app-master-controller-state.json"
      - "src/curriculum/application/postg-app-master-controller.mjs"
      - "tests/curriculum/postg-app-m00-master-controller.test.js"
      - "tests/curriculum/postg-app-w01-a06e-operator-approval.test.js"
      - "docs/curriculum/output/POSTG_APP_W02_A04_*"
      - ".github/workflows/postg-app-w02-a04-validator-shadow.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: postg-app-w02-a04-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validator-shadow:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
      - name: Synchronize A04 controller validator and regressions once
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source_path = Path('src/curriculum/application/postg-app-master-controller.mjs')
          source = source_path.read_text(encoding='utf-8')

          if 'const W02_A04_CLAIM_PATH' not in source:
              source = source.replace(
                  "const W02_A03_CLAIM_PATH = 'data/project/milestones/POSTG-APP-W02-A03.claim.json';\n",
                  "const W02_A03_CLAIM_PATH = 'data/project/milestones/POSTG-APP-W02-A03.claim.json';\nconst W02_A04_CLAIM_PATH = 'data/project/milestones/POSTG-APP-W02-A04.claim.json';\n",
                  1
              )
          if 'w02A04Claim: readJsonIfExists' not in source:
              source = source.replace(
                  "    w02A03Claim: readJsonIfExists(root, W02_A03_CLAIM_PATH)\n",
                  "    w02A03Claim: readJsonIfExists(root, W02_A03_CLAIM_PATH),\n    w02A04Claim: readJsonIfExists(root, W02_A04_CLAIM_PATH)\n",
                  1
              )
          if '    w02A04Claim\n  } = controller;' not in source:
              source = source.replace(
                  "    w02A02Claim,\n    w02A03Claim\n  } = controller;",
                  "    w02A02Claim,\n    w02A03Claim,\n    w02A04Claim\n  } = controller;",
                  1
              )
          source = source.replace(
              "    'N_PLUS_ONE_PROOF_MISCONCEPTION_AND_PBL_BLUEPRINTS_MATERIALIZED',\n",
              "    'VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_SHADOW_PASS',\n",
              1
          )
          source = source.replace(
              "JSON.stringify(REQUIRED_GATE_ORDER.slice(0, 7))",
              "JSON.stringify(REQUIRED_GATE_ORDER.slice(0, 10))",
              1
          )
          if 'w02State.validatorFixtureCount !== 672' not in source:
              source = source.replace(
                  "      || w02State.nPlusOnePblBlueprintsComplete !== true\n      || w02State.productionAdmittedCandidateCount !== 0) {",
                  "      || w02State.nPlusOnePblBlueprintsComplete !== true\n      || w02State.validatorFixtureCount !== 672\n      || w02State.validatorPositiveFixtureCount !== 275\n      || w02State.validatorNegativeFixtureCount !== 397\n      || w02State.validatorPassCount !== 275\n      || w02State.validatorExpectedRejectCount !== 397\n      || w02State.validatorUnexpectedPassCount !== 0\n      || w02State.validatorUnexpectedRejectCount !== 0\n      || w02State.pairedNPlusOneExecutionCount !== 61\n      || w02State.misconceptionExecutionCount !== 183\n      || w02State.calculationPassInterpretationFailCount !== 122\n      || w02State.counterfactualExecutionCount !== 61\n      || w02State.crossContextExecutionCount !== 61\n      || w02State.uniquenessNegativeExecutionCount !== 61\n      || w02State.pblDependencyExecutionCount !== 62\n      || w02State.sourceNodeRuntimeCoverageCount !== 13\n      || w02State.primaryMacroContextRuntimeCoverageCount !== 16\n      || w02State.alternateMacroContextRuntimeCoverageCount !== 2\n      || w02State.operationFamilyRuntimeCoverageCount !== 22\n      || w02State.answerShapeRuntimeCoverageCount !== 2\n      || w02State.adapterRuntimeCoverageCount !== 2\n      || w02State.duplicateFixtureProjectionGroupCount !== 1\n      || w02State.duplicateFixtureProjectionParity !== true\n      || w02State.validatorFixturesComplete !== true\n      || w02State.sharedRuntimeShadowPass !== true\n      || w02State.productionAdmittedCandidateCount !== 0) {",
                  1
              )
          source = source.replace(
              "controllerState.currentCapability !== 'W02_N_PLUS_ONE_PROOF_MISCONCEPTION_AND_PBL_BLUEPRINTS_MATERIALIZED'",
              "controllerState.currentCapability !== 'W02_VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_SHADOW_PASS'"
          ).replace(
              "controllerState.currentMainlineBlocker !== 'W02_VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_PENDING'",
              "controllerState.currentMainlineBlocker !== 'W02_WORKSHEET_SHADOW_PROJECTION_AND_PRODUCTION_ADMISSION_REVIEW_PENDING'"
          ).replace(
              "controllerState.nextShortestStep !== 'POSTG-APP-W02-A04_ValidatorFixturesAndSharedRuntimeShadow'",
              "controllerState.nextShortestStep !== 'POSTG-APP-W02-A05_WorksheetShadowProjectionAndProductionAdmissionReview'"
          )
          if "code: 'POSTG_APP_W02_A04_CLAIM_INVALID'" not in source:
              marker = "  const contextValidation = validateGlobalContextAuthority(controller.contextAuthority);\n"
              block = """  issues.push(...validateShadowClaim({
            claim: w02A04Claim,
            pathValue: W02_A04_CLAIM_PATH,
            code: 'POSTG_APP_W02_A04_CLAIM_INVALID',
            claimedStatus: 'W02_VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_SHADOW_PASS',
            nextTaskId: 'POSTG-APP-W02-A05_WorksheetShadowProjectionAndProductionAdmissionReview'
          }));

          """
              if marker not in source:
                  raise SystemExit('A04 claim insertion marker not found')
              source = source.replace(marker, block + marker, 1)
          source = source.replace(
              "? 'W02_N_PLUS_ONE_PROOF_MISCONCEPTION_AND_PBL_BLUEPRINTS_MATERIALIZED'",
              "? 'W02_VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_SHADOW_PASS'",
              1
          )
          required_source_markers = [
              'const W02_A04_CLAIM_PATH',
              'w02A04Claim: readJsonIfExists',
              "'VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_SHADOW_PASS'",
              'w02State.validatorFixtureCount !== 672',
              "code: 'POSTG_APP_W02_A04_CLAIM_INVALID'",
              "POSTG-APP-W02-A05_WorksheetShadowProjectionAndProductionAdmissionReview"
          ]
          missing = [marker for marker in required_source_markers if marker not in source]
          if missing:
              raise SystemExit(f'Missing source markers: {missing}')
          source_path.write_text(source, encoding='utf-8')

          test_path = Path('tests/curriculum/postg-app-m00-master-controller.test.js')
          test = test_path.read_text(encoding='utf-8')
          replacements = [
              ('M00 validates the exact 79-node scope with W01 admitted and W02 A03 blueprints materialized', 'M00 validates the exact 79-node scope with W01 admitted and W02 A04 validator shadow passed'),
              ("assert.equal(result.status, 'W02_N_PLUS_ONE_PROOF_MISCONCEPTION_AND_PBL_BLUEPRINTS_MATERIALIZED');", "assert.equal(result.status, 'W02_VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_SHADOW_PASS');"),
              ("assert.equal(result.nextShortestStep, 'POSTG-APP-W02-A04_ValidatorFixturesAndSharedRuntimeShadow');", "assert.equal(result.nextShortestStep, 'POSTG-APP-W02-A05_WorksheetShadowProjectionAndProductionAdmissionReview');"),
              ('Wave 02 has A03 N+1, misconception and required-only PBL blueprints complete', 'Wave 02 has A04 validator fixtures and shared shadow runtime complete'),
              ("assert.equal(w02.currentState.state, 'N_PLUS_ONE_PROOF_MISCONCEPTION_AND_PBL_BLUEPRINTS_MATERIALIZED');", "assert.equal(w02.currentState.state, 'VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_SHADOW_PASS');"),
              ('assert.deepEqual(w02.currentState.completedGates, REQUIRED_GATES.slice(0, 7));', 'assert.deepEqual(w02.currentState.completedGates, REQUIRED_GATES.slice(0, 10));'),
              ('W01 stays E5 while W02 A00 through A03 remain E3 non-production', 'W01 stays E5 while W02 A00 through A04 remain E3 non-production'),
              ('forged approval, W02 claims and A03 materialization state fail closed', 'forged approval, W02 claims and A04 runtime state fail closed'),
              ('evidenceCase.controllerState.waveStates[1].pblTaskSetCandidateCount = 30;', 'evidenceCase.controllerState.waveStates[1].validatorFixtureCount = 671;')
          ]
          for old, new in replacements:
              test = test.replace(old, new)
          if 'w02.currentState.validatorFixtureCount' not in test:
              test = test.replace(
                  "  assert.equal(w02.currentState.nPlusOnePblBlueprintsComplete, true);\n  assert.equal(w02.currentState.productionAdmittedCandidateCount, 0);",
                  "  assert.equal(w02.currentState.nPlusOnePblBlueprintsComplete, true);\n  assert.equal(w02.currentState.validatorFixtureCount, 672);\n  assert.equal(w02.currentState.validatorPositiveFixtureCount, 275);\n  assert.equal(w02.currentState.validatorNegativeFixtureCount, 397);\n  assert.equal(w02.currentState.validatorPassCount, 275);\n  assert.equal(w02.currentState.validatorExpectedRejectCount, 397);\n  assert.equal(w02.currentState.validatorUnexpectedPassCount, 0);\n  assert.equal(w02.currentState.validatorUnexpectedRejectCount, 0);\n  assert.equal(w02.currentState.pairedNPlusOneExecutionCount, 61);\n  assert.equal(w02.currentState.misconceptionExecutionCount, 183);\n  assert.equal(w02.currentState.calculationPassInterpretationFailCount, 122);\n  assert.equal(w02.currentState.counterfactualExecutionCount, 61);\n  assert.equal(w02.currentState.crossContextExecutionCount, 61);\n  assert.equal(w02.currentState.uniquenessNegativeExecutionCount, 61);\n  assert.equal(w02.currentState.pblDependencyExecutionCount, 62);\n  assert.equal(w02.currentState.sourceNodeRuntimeCoverageCount, 13);\n  assert.equal(w02.currentState.primaryMacroContextRuntimeCoverageCount, 16);\n  assert.equal(w02.currentState.alternateMacroContextRuntimeCoverageCount, 2);\n  assert.equal(w02.currentState.operationFamilyRuntimeCoverageCount, 22);\n  assert.equal(w02.currentState.answerShapeRuntimeCoverageCount, 2);\n  assert.equal(w02.currentState.adapterRuntimeCoverageCount, 2);\n  assert.equal(w02.currentState.duplicateFixtureProjectionGroupCount, 1);\n  assert.equal(w02.currentState.duplicateFixtureProjectionParity, true);\n  assert.equal(w02.currentState.validatorFixturesComplete, true);\n  assert.equal(w02.currentState.sharedRuntimeShadowPass, true);\n  assert.equal(w02.currentState.productionAdmittedCandidateCount, 0);",
                  1
              )
          if 'controller.w02A04Claim' not in test:
              test = test.replace('    controller.w02A03Claim\n', '    controller.w02A03Claim,\n    controller.w02A04Claim\n', 1)
          if "['w02A04Claim', 'POSTG_APP_W02_A04_CLAIM_INVALID']" not in test:
              test = test.replace(
                  "    ['w02A03Claim', 'POSTG_APP_W02_A03_CLAIM_INVALID']\n",
                  "    ['w02A03Claim', 'POSTG_APP_W02_A03_CLAIM_INVALID'],\n    ['w02A04Claim', 'POSTG_APP_W02_A04_CLAIM_INVALID']\n",
                  1
              )
          required_test_markers = [
              "W02_VALIDATOR_FIXTURES_AND_SHARED_RUNTIME_SHADOW_PASS",
              'w02.currentState.validatorFixtureCount',
              'controller.w02A04Claim',
              'POSTG_APP_W02_A04_CLAIM_INVALID',
              'POSTG-APP-W02-A05_WorksheetShadowProjectionAndProductionAdmissionReview'
          ]
          missing = [marker for marker in required_test_markers if marker not in test]
          if missing:
              raise SystemExit(f'Missing test markers: {missing}')
          test_path.write_text(test, encoding='utf-8')

          w01_path = Path('tests/curriculum/postg-app-w01-a06e-operator-approval.test.js')
          w01 = w01_path.read_text(encoding='utf-8')
          if "w02.completedGates.includes('VALIDATOR_CONTRACT_COMPLETE')" not in w01:
              w01 = w01.replace(
                  "  assert.equal(w02.completedGates.includes('N_PLUS_1_CONTRACT_COMPLETE'), true);\n  assert.equal(w02.nPlusOnePblBlueprintsComplete, true);",
                  "  assert.equal(w02.completedGates.includes('N_PLUS_1_CONTRACT_COMPLETE'), true);\n  assert.equal(w02.completedGates.includes('VALIDATOR_CONTRACT_COMPLETE'), true);\n  assert.equal(w02.completedGates.includes('POSITIVE_NEGATIVE_FIXTURES_COMPLETE'), true);\n  assert.equal(w02.completedGates.includes('SHARED_RUNTIME_SHADOW_PASS'), true);\n  assert.equal(w02.nPlusOnePblBlueprintsComplete, true);\n  assert.equal(w02.validatorFixturesComplete, true);\n  assert.equal(w02.sharedRuntimeShadowPass, true);",
                  1
              )
          if "w02.completedGates.includes('SHARED_RUNTIME_SHADOW_PASS')" not in w01:
              raise SystemExit('Missing W01 A04 monotonic marker')
          w01_path.write_text(w01, encoding='utf-8')
          PY
          if git diff --quiet -- src/curriculum/application/postg-app-master-controller.mjs tests/curriculum/postg-app-m00-master-controller.test.js tests/curriculum/postg-app-w01-a06e-operator-approval.test.js; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/curriculum/application/postg-app-master-controller.mjs tests/curriculum/postg-app-m00-master-controller.test.js tests/curriculum/postg-app-w01-a06e-operator-approval.test.js
          git commit -m "feat(application): validate W02 A04 controller transition"
          git push origin HEAD:${{ github.head_ref }}
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install
      - name: Validate A04 schema document
        run: |
          python -m pip install jsonschema
          python - <<'PY'
          import json
          from jsonschema import Draft202012Validator
          with open('data/curriculum/application/schema/w02-validator-shadow-fixture.schema.json', encoding='utf-8') as handle:
              Draft202012Validator.check_schema(json.load(handle))
          PY
      - name: Run W02 A04 focused tests and validator with diagnostics
        run: |
          set +e
          node --test tests/curriculum/postg-app-w02-a04-runtime-shadow.test.js > w02-a04-focused.log 2>&1
          test_status=$?
          node tools/curriculum/validate-postg-app-w02-a04-runtime-shadow.mjs > w02-a04-validator.json 2>&1
          validator_status=$?
          printf '%s %s\n' "$test_status" "$validator_status" > w02-a04-status.txt
          exit 0
      - name: Write deterministic A04 runtime readback
        if: always()
        run: |
          node --input-type=module - <<'NODE'
          import fs from 'node:fs';
          import { buildW02ValidatorShadowReadback } from './src/curriculum/application/w02-validator-fixture-shadow-runtime.mjs';
          const readback = buildW02ValidatorShadowReadback();
          fs.writeFileSync('w02-a04-runtime-readback.json', `${JSON.stringify({
            counts: readback.counts,
            fixtureTypeCounts: readback.fixtureTypeCounts,
            errorCodeCounts: readback.errorCodeCounts,
            operationFamilyCoverage: readback.operationFamilyCoverage,
            answerShapeCoverage: readback.answerShapeCoverage,
            adapterCoverage: readback.adapterCoverage,
            duplicateComparisons: readback.duplicateComparisons,
            issues: readback.issues
          }, null, 2)}\n`);
          NODE
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: w02-a04-runtime-diagnostics
          path: |
            w02-a04-focused.log
            w02-a04-validator.json
            w02-a04-status.txt
            w02-a04-runtime-readback.json
          if-no-files-found: error
      - name: Enforce A04 focused gate
        run: |
          read test_status validator_status < w02-a04-status.txt
          test "$test_status" -eq 0
          test "$validator_status" -eq 0
      - name: Verify A03 and A02 regressions
        run: |
          node --test tests/curriculum/postg-app-w02-a03-candidate-pack.test.js
          node tools/curriculum/validate-postg-app-w02-a03-candidate-pack.mjs
          node --test tests/curriculum/postg-app-w02-a02-candidate-pack.test.js
          node tools/curriculum/validate-postg-app-w02-a02-candidate-pack.mjs
      - name: Verify controller, W01 E5 and governance
        run: |
          node --test tests/curriculum/postg-app-m00-master-controller.test.js
          node tools/curriculum/validate-postg-app-m00-master-controller.mjs
          node --test tests/curriculum/postg-app-w01-a06e-operator-approval.test.js
          node tools/curriculum/validate-postg-app-w01-a06e-operator-approval.mjs
          npm run governance:claims
      - name: Run full regression suite
        run: npm test
