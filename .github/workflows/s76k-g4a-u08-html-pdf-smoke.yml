name: S76K G4A-U08 HTML PDF Smoke

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  production-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Install browser and PDF verification dependencies
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
          python3 -m pip install --break-system-packages pypdf pillow

      - name: Run full Node test suite
        run: npm test

      - name: Generate 120-question G4A-U08 canonical HTML
        run: node tools/curriculum/generate-s76k-g4a-u08-public-smoke.mjs

      - name: Verify DOM containment and print PDF
        run: |
          node --input-type=module <<'NODE'
          import { chromium } from 'playwright';
          import { readFileSync } from 'node:fs';
          import { pathToFileURL } from 'node:url';
          import { resolve } from 'node:path';

          const root = resolve('artifacts/s76k-g4a-u08');
          const htmlPath = resolve(root, 'S76K_G4A_U08_PublicWorksheet.html');
          const pdfPath = resolve(root, 'S76K_G4A_U08_PublicWorksheet.pdf');
          const manifest = JSON.parse(readFileSync(resolve(root, 'S76K_G4A_U08_PublicWorksheet.manifest.json'), 'utf8'));
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1280, height: 960 } });
          await page.goto(pathToFileURL(htmlPath).href, { waitUntil: 'networkidle' });
          await page.emulateMedia({ media: 'print' });

          const containment = await page.evaluate(() => {
            const pages = [...document.querySelectorAll('.worksheet-page')];
            const cells = [...document.querySelectorAll('.worksheet-cell')];
            const cellOverflow = cells.filter((node) =>
              node.scrollHeight > node.clientHeight + 1 || node.scrollWidth > node.clientWidth + 1);
            const pageOverflow = pages.filter((node) =>
              node.scrollHeight > node.clientHeight + 1 || node.scrollWidth > node.clientWidth + 1);
            const bodyText = document.body.innerText;
            const internalIds = bodyText.match(/\b(?:kp|pg|ps|tpl)_g4a_u08_[a-z0-9_]+\b/gi) ?? [];
            const placeholders = bodyText.match(/\{\{[^}]+\}\}|\[[A-Z_]+\]|undefined|null/g) ?? [];
            return {
              pageCount: pages.length,
              cellCount: cells.length,
              cellOverflowCount: cellOverflow.length,
              pageOverflowCount: pageOverflow.length,
              internalIdLeakCount: internalIds.length,
              unresolvedPlaceholderCount: placeholders.length,
            };
          });

          if (containment.pageCount !== manifest.expectedPdfPageCount) {
            throw new Error(`expected ${manifest.expectedPdfPageCount} pages, got ${containment.pageCount}`);
          }
          if (containment.cellCount !== 240) throw new Error(`expected 240 cells, got ${containment.cellCount}`);
          if (containment.cellOverflowCount !== 0) throw new Error(`cell overflow=${containment.cellOverflowCount}`);
          if (containment.pageOverflowCount !== 0) throw new Error(`page overflow=${containment.pageOverflowCount}`);
          if (containment.internalIdLeakCount !== 0) throw new Error(`internal ID leak=${containment.internalIdLeakCount}`);
          if (containment.unresolvedPlaceholderCount !== 0) throw new Error(`placeholder count=${containment.unresolvedPlaceholderCount}`);

          await page.pdf({
            path: pdfPath,
            format: 'A4',
            printBackground: true,
            preferCSSPageSize: true,
            margin: { top: '0mm', right: '0mm', bottom: '0mm', left: '0mm' },
          });
          await browser.close();
          NODE

      - name: Render and verify all PDF pages
        run: |
          rm -rf /tmp/s76k-g4a-u08-rendered
          mkdir -p /tmp/s76k-g4a-u08-rendered
          pdftoppm -png -r 120 artifacts/s76k-g4a-u08/S76K_G4A_U08_PublicWorksheet.pdf /tmp/s76k-g4a-u08-rendered/page
          python3 <<'PY'
          import json
          from pathlib import Path
          from PIL import Image, ImageStat
          from pypdf import PdfReader

          root = Path('artifacts/s76k-g4a-u08')
          pdf = root / 'S76K_G4A_U08_PublicWorksheet.pdf'
          manifest = json.loads((root / 'S76K_G4A_U08_PublicWorksheet.manifest.json').read_text(encoding='utf-8'))
          reader = PdfReader(str(pdf))
          files = sorted(Path('/tmp/s76k-g4a-u08-rendered').glob('page-*.png'))
          expected = manifest['expectedPdfPageCount']
          if len(reader.pages) != expected:
              raise SystemExit(f'expected {expected} PDF pages, got {len(reader.pages)}')
          if len(files) != len(reader.pages):
              raise SystemExit(f'rendered page mismatch: {len(files)}/{len(reader.pages)}')
          nonblank = 0
          for path in files:
              image = Image.open(path).convert('L')
              stat = ImageStat.Stat(image)
              if stat.extrema[0][0] < 245 and stat.var[0] > 5:
                  nonblank += 1
          if nonblank != len(files):
              raise SystemExit(f'blank page detected: {nonblank}/{len(files)}')
          print(f'all rendered pages nonblank: {nonblank}')
          PY

      - name: Verify PDF text bounding boxes stay inside A4 pages
        run: |
          pdftotext -bbox-layout artifacts/s76k-g4a-u08/S76K_G4A_U08_PublicWorksheet.pdf /tmp/s76k-g4a-u08-bbox.html
          python3 <<'PY'
          import json
          import re
          from pathlib import Path

          root = Path('artifacts/s76k-g4a-u08')
          manifest = json.loads((root / 'S76K_G4A_U08_PublicWorksheet.manifest.json').read_text(encoding='utf-8'))
          text = Path('/tmp/s76k-g4a-u08-bbox.html').read_text(encoding='utf-8', errors='ignore')
          page_re = re.compile(r'<page[^>]*width="([0-9.]+)"[^>]*height="([0-9.]+)"[^>]*>(.*?)</page>', re.S)
          word_re = re.compile(r'<word[^>]*xMin="([0-9.]+)"[^>]*yMin="([0-9.]+)"[^>]*xMax="([0-9.]+)"[^>]*yMax="([0-9.]+)"', re.S)
          pages = page_re.findall(text)
          expected = manifest['expectedPdfPageCount']
          if len(pages) != expected:
              raise SystemExit(f'expected {expected} bbox pages, got {len(pages)}')
          overflow = []
          for page_index, (width, height, body) in enumerate(pages, 1):
              width, height = float(width), float(height)
              for coords in word_re.findall(body):
                  x0, y0, x1, y1 = map(float, coords)
                  if x0 < -0.5 or y0 < -0.5 or x1 > width + 0.5 or y1 > height + 0.5:
                      overflow.append((page_index, x0, y0, x1, y1, width, height))
          if overflow:
              raise SystemExit(f'PDF bbox overflow count={len(overflow)} first={overflow[0]}')
          print(f'PDF bbox containment PASS: {expected} pages')
          PY

      - name: Finalize verified smoke manifest
        run: |
          python3 <<'PY'
          from hashlib import sha256
          import json
          from pathlib import Path
          import re
          import unicodedata
          from pypdf import PdfReader

          root = Path('artifacts/s76k-g4a-u08')
          pdf_path = root / 'S76K_G4A_U08_PublicWorksheet.pdf'
          manifest_path = root / 'S76K_G4A_U08_PublicWorksheet.manifest.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          reader = PdfReader(str(pdf_path))
          texts = [unicodedata.normalize('NFKC', page.extract_text() or '') for page in reader.pages]
          all_text = ''.join(texts)
          if len(reader.pages) != manifest['expectedPdfPageCount']:
              raise SystemExit(f"PDF page mismatch: {len(reader.pages)}/{manifest['expectedPdfPageCount']}")
          if not texts[-1].strip():
              raise SystemExit('last answer page is blank')
          if not re.search(r'[\u4e00-\u9fff]', all_text):
              raise SystemExit('Traditional Chinese glyph extraction gate failed')
          if re.search(r'\b(?:kp|pg|ps|tpl)_g4a_u08_[a-z0-9_]+\b', all_text, re.I):
              raise SystemExit('internal curriculum ID leaked into PDF text')
          if re.search(r'\{\{[^}]+\}\}|\[[A-Z_]+\]|undefined|null', all_text):
              raise SystemExit('unresolved placeholder leaked into PDF text')
          pdf_bytes = pdf_path.read_bytes()
          manifest.update({
              'status': 'production_html_pdf_smoke_pass',
              'actualPdfPageCount': len(reader.pages),
              'pdfSha256': sha256(pdf_bytes).hexdigest(),
              'pdfBytes': len(pdf_bytes),
              'renderedPageImageCount': len(reader.pages),
              'nonblankRenderedPageCount': len(reader.pages),
              'domCellOverflowCount': 0,
              'domPageOverflowCount': 0,
              'pdfBoundingBoxOverflowCount': 0,
              'cjkGlyphRendering': 'pass',
              'visualRenderVerification': 'all_pages_nonblank_and_bbox_contained',
          })
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY

      - name: Upload verified smoke bundle
        uses: actions/upload-artifact@v4
        with:
          name: s76k-g4a-u08-public-html-pdf-smoke
          if-no-files-found: error
          retention-days: 30
          path: |
            artifacts/s76k-g4a-u08/S76K_G4A_U08_PublicWorksheet.html
            artifacts/s76k-g4a-u08/S76K_G4A_U08_PublicWorksheet.pdf
            artifacts/s76k-g4a-u08/S76K_G4A_U08_PublicWorksheet.manifest.json
            /tmp/s76k-g4a-u08-rendered/*.png
