name: POSTG APP M00 Full Consumer Recovery

on:
  push:
    branches: [postg-app-w02-a08r4-third-operator-approval]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: postg-app-m00-full-consumer-recovery
  cancel-in-progress: true

jobs:
  restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: postg-app-w02-a08r4-third-operator-approval
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Restore full M00 consumer and apply A08R4/A09A overlays
        run: node tools/curriculum/restore-postg-app-m00-full-consumer-with-a09a.mjs
      - name: Verify restored controller parses
        run: node --check src/curriculum/application/postg-app-master-controller.mjs
      - name: Commit restored controller when needed
        shell: bash
        run: |
          if git diff --quiet -- src/curriculum/application/postg-app-master-controller.mjs; then
            echo "M00 full consumer already restored."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/curriculum/application/postg-app-master-controller.mjs
          git commit -m "fix(application): restore full M00 consumer with A09A freeze"
          git push origin HEAD:postg-app-w02-a08r4-third-operator-approval
