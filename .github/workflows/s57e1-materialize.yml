name: S57E1 G3B-U04 Materialize

on:
  push:
    branches:
      - s57e1-g3b-u04-patternspec-materialization
    paths:
      - tools/curriculum/materialize-s57e1-g3b-u04.mjs
      - .github/workflows/s57e1-materialize.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: s57e1-g3b-u04-patternspec-materialization
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Materialize S57E1 PatternSpecs
        run: node tools/curriculum/materialize-s57e1-g3b-u04.mjs

      - name: Run full test suite
        run: npm test

      - name: Verify generated scope
        run: |
          test -f data/curriculum/pattern_specs/S57E_G3B_U04_SemanticPatternSpecs.json
          test -f site/modules/curriculum/batch-a/source-pattern-g3b-u04-semantic-extension.js
          test -f tests/curriculum/g3b-u04-semantic-pattern-specs.test.js
          git status --short

      - name: Commit generated artifacts and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/curriculum/pattern_specs/S57E_G3B_U04_SemanticPatternSpecs.json
          git add site/modules/curriculum/batch-a/source-pattern-g3b-u04-semantic-extension.js
          git add tests/curriculum/g3b-u04-semantic-pattern-specs.test.js
          git rm .github/workflows/s57e1-materialize.yml
          git commit -m "data(g3b-u04): materialize S57E1 semantic PatternSpecs"
          git push origin HEAD:s57e1-g3b-u04-patternspec-materialization
