name: S96D G5A-U02 Browser Bundle

on:
  push:
    branches:
      - feat/s96d-g5a-u02-arbitrary-regeneration
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build canonical browser bundle
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --banner:js='/* GENERATED FROM CANONICAL src/curriculum/g5a-u02 — DO NOT EDIT */' \
            --outfile=site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js

      - name: Verify generated runtime
        run: |
          node --input-type=module <<'NODE'
          const runtime = await import('./site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js');
          const audit = runtime.auditG5AU02BrowserDynamicRuntime();
          if (!audit.ok) throw new Error(JSON.stringify(audit.errors));
          NODE

      - name: Commit generated bundle
        run: |
          if git diff --quiet -- site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js; then
            echo 'Bundle unchanged.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
          git commit -m 'build(g5a-u02): generate S96D browser runtime bundle [skip ci]'
          git push origin HEAD:${{ github.ref_name }}
