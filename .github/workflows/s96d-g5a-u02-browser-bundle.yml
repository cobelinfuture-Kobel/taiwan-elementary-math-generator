name: S96D G5A-U02 Browser Bundle

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-24.04
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
      BUNDLE_PATH: site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build canonical browser bundle
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile="${BUNDLE_PATH}"

      - name: Verify generated runtime
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const runtime = await import('./site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js');
          const audit = runtime.auditG5AU02BrowserDynamicRuntime();
          if (!audit.ok) throw new Error(JSON.stringify(audit.errors));
          const bundle = await readFile(process.env.BUNDLE_PATH, 'utf8');
          if (bundle.includes('src/')) throw new Error('Generated site bundle contains forbidden src/ path');
          NODE

      - name: Commit generated bundle
        run: |
          if [ -z "$(git status --porcelain -- "${BUNDLE_PATH}")" ]; then
            echo 'Bundle unchanged.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add "${BUNDLE_PATH}"
          git commit -m 'build(g5a-u02): generate S96D browser runtime bundle [skip ci]'
          git push origin HEAD:${TARGET_BRANCH}
