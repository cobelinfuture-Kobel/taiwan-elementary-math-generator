name: R02 Finalize Text Candidate Pack V2

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/r02-finalize-text-pack-v2.yml"
      - "tools/curriculum/finalize-r02-text-pack.py"
      - "data/curriculum/global/candidates/r02/source-authority-reconciliation-index.json"

permissions:
  contents: write

jobs:
  finalize:
    if: github.head_ref == 'curriculum/global-kp-rebase-r02'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout R02 branch
        uses: actions/checkout@v4
        with:
          ref: curriculum/global-kp-rebase-r02
          fetch-depth: 1
          show-progress: false
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Finalize validated text pack
        run: python tools/curriculum/finalize-r02-text-pack.py
      - name: Focused R02 tests
        id: focused_tests
        continue-on-error: true
        run: |
          mkdir -p tmp
          node --test tests/curriculum/r02-global-kp-candidate-reconciliation.test.js > tmp/r02-focused.log 2>&1
      - name: Upload focused R02 diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r02-focused-test-diagnostics
          path: tmp/r02-focused.log
          if-no-files-found: error
          retention-days: 7
      - name: Block after focused R02 failure
        if: steps.focused_tests.outcome == 'failure'
        run: exit 1
      - name: Governance claim integrity
        id: governance
        continue-on-error: true
        run: node tools/governance/validate-milestone-claim-integrity.mjs > tmp/r02-governance.log 2>&1
      - name: Upload governance diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r02-governance-diagnostics
          path: tmp/r02-governance.log
          if-no-files-found: error
          retention-days: 7
      - name: Block after governance failure
        if: steps.governance.outcome == 'failure'
        run: exit 1
      - name: Commit finalized text pack
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "R02 fix: replace truncated gzip with validated text chunks"
          git push origin HEAD:curriculum/global-kp-rebase-r02
