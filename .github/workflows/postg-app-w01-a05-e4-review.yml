name: POSTG-APP W01-A05 E4 Human Review

on:
  pull_request:
    branches: [ main ]
    paths:
      - "src/curriculum/application/w01-e4-production-review-runtime.mjs"
      - "site/assets/browser/pipeline/build-worksheet-document.js"
      - "site/modules/core/worksheet-formatting.js"
      - "tools/curriculum/generate-postg-app-w01-a05-review-artifacts.mjs"
      - "tools/curriculum/render-postg-app-w01-a05-review-pdf.mjs"
      - "tools/curriculum/finalize-postg-app-w01-a05-review-evidence.mjs"
      - "tools/governance/promote-postg-app-w01-a05-e4-claim.mjs"
      - "tests/curriculum/postg-app-w01-a05-e4-review.test.js"
      - "data/project/milestones/POSTG-APP-W01-A05.claim.json"
      - "data/curriculum/application/contracts/POSTG-APP-W01-A05_UnitFlowExactGeneratorRendererAndHumanReviewRemediation.json"
      - "docs/curriculum/application/contracts/POSTG_APP_W01_E4_Production_Review_And_Human_Decision_V1.md"
      - "docs/curriculum/output/POSTG_APP_W01_A05_E4_HUMAN_REVIEW_READY.marker"
      - "docs/curriculum/output/POSTG_APP_W01_A05_E4_HUMAN_REVIEW_READBACK.md"
      - "docs/curriculum/output/postg-app/**"
      - ".github/workflows/postg-app-w01-a05-e4-review.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: postg-app-w01-a05-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  e4-production-review:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Detect committed E4 evidence
        id: evidence_state
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const claim = JSON.parse(fs.readFileSync('data/project/milestones/POSTG-APP-W01-A05.claim.json', 'utf8'));
          const required = [
            'docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.html',
            'docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.pdf',
            'docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.extracted.txt',
            'docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW_DATA.json',
            'docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW_MANIFEST.json',
            'docs/curriculum/output/POSTG_APP_W01_A05_E4_HUMAN_REVIEW_READY.marker',
            'docs/curriculum/output/POSTG_APP_W01_A05_E4_HUMAN_REVIEW_READBACK.md'
          ];
          const committed = claim.actualEvidenceLevel === 'E4_PRODUCTION_EQUIVALENT_OUTPUT_VERIFIED'
            && claim.claims?.humanReviewReady === true
            && claim.claims?.productionAdmitted === false
            && required.every((path) => fs.existsSync(path));
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `committed_e4=${committed}\n`);
          NODE

      - name: Apply A02 PBL candidate shape compatibility
        if: steps.evidence_state.outputs.committed_e4 != 'true'
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/curriculum/application/w01-e4-production-review-runtime.mjs')
          source = path.read_text(encoding='utf-8')
          old = '''function buildPblReviewSections(a02, selectedSources) {
            return a02.pblTaskSetCandidates
              .filter((candidate) => selectedSources.has(candidate.sourceId))
              .map((candidate) => ({
                pblTaskSetId: candidate.pblTaskSetId,
                sourceId: candidate.sourceId,
                knowledgePointId: candidate.knowledgePointId,
                graphType: candidate.graphCandidate.graphType,
                nodes: clone(candidate.graphCandidate.nodes),
                edges: clone(candidate.graphCandidate.edges),
                finalProductCandidate: clone(candidate.graphCandidate.finalProductCandidate),
                taskBlueprints: clone(candidate.taskBlueprints),
                projectionCandidate: candidate.graphCandidate.graphType === 'PBL3_LINEAR'
                  ? 'APPROVED_COMPLETE_SINGLE_PAGE_CANDIDATE'
                  : 'APPROVED_COMPLETE_TWO_PAGE_CANDIDATE',
                unapprovedPageSplitForbidden: true,
                productionAdmissionAllowed: false
              }));
          }
          '''
          new = '''function buildPblReviewSections(a02, selectedSources) {
            return a02.pblTaskSetCandidates
              .filter((candidate) => selectedSources.has(candidate.sourceId))
              .map((candidate) => ({
                pblTaskSetId: candidate.pblCandidateId,
                sourceId: candidate.sourceId,
                knowledgePointId: candidate.primaryKnowledgePointId,
                graphType: candidate.graphType,
                nodes: clone(candidate.taskBlueprints.map((task) => ({
                  taskId: task.taskId,
                  outputMilestoneId: task.outputMilestoneId,
                  isFinalTask: task.isFinalTask
                }))),
                edges: clone(candidate.taskBlueprints.flatMap((task) => (
                  task.inputRefs.map((inputRef) => ({
                    fromMilestoneId: inputRef,
                    toTaskId: task.taskId
                  }))
                ))),
                finalProductCandidate: clone(candidate.finalProductCandidate),
                taskBlueprints: clone(candidate.taskBlueprints),
                projectionCandidate: candidate.projectionCandidate,
                unapprovedPageSplitForbidden: true,
                productionAdmissionAllowed: false
              }));
          }
          '''
          if new not in source:
              if old not in source:
                  raise SystemExit('A05 PBL candidate shape anchor not found.')
              source = source.replace(old, new)
              path.write_text(source, encoding='utf-8')
          PY

      - name: Run A05 focused runtime tests
        id: focused_tests
        continue-on-error: true
        run: |
          mkdir -p docs/curriculum/output/postg-app
          set -o pipefail
          node --test tests/curriculum/postg-app-w01-a05-e4-review.test.js 2>&1 | tee docs/curriculum/output/postg-app/POSTG_APP_W01_A05_FOCUSED_TEST.log

      - name: Upload focused test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postg-app-w01-a05-focused-test-diagnostics
          path: |
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_FOCUSED_TEST.log
            src/curriculum/application/w01-e4-production-review-runtime.mjs
            tests/curriculum/postg-app-w01-a05-e4-review.test.js
          retention-days: 7

      - name: Block after focused test failure
        if: steps.focused_tests.outcome == 'failure'
        run: exit 1

      - name: Generate production-equivalent review HTML and data
        if: steps.evidence_state.outputs.committed_e4 != 'true'
        run: node tools/curriculum/generate-postg-app-w01-a05-review-artifacts.mjs

      - name: Install Chromium PDF runtime
        if: steps.evidence_state.outputs.committed_e4 != 'true'
        run: |
          npm install --no-save --package-lock=false playwright@1.51.1
          npx playwright install --with-deps chromium

      - name: Render review PDF with Chromium
        if: steps.evidence_state.outputs.committed_e4 != 'true'
        run: node tools/curriculum/render-postg-app-w01-a05-review-pdf.mjs

      - name: Install PDF verification tools
        if: steps.evidence_state.outputs.committed_e4 != 'true'
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Finalize and verify E4 review evidence
        if: steps.evidence_state.outputs.committed_e4 != 'true'
        run: node tools/curriculum/finalize-postg-app-w01-a05-review-evidence.mjs

      - name: Promote exact artifacts to E4 claim
        if: steps.evidence_state.outputs.committed_e4 != 'true'
        run: node tools/governance/promote-postg-app-w01-a05-e4-claim.mjs

      - name: Validate E4 claim and artifact contract
        run: |
          npm run governance:claims
          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW_MANIFEST.json', 'utf8'));
          const claim = JSON.parse(fs.readFileSync('data/project/milestones/POSTG-APP-W01-A05.claim.json', 'utf8'));
          const contract = JSON.parse(fs.readFileSync('data/curriculum/application/contracts/POSTG-APP-W01-A05_UnitFlowExactGeneratorRendererAndHumanReviewRemediation.json', 'utf8'));
          const ok = manifest.status === 'PRODUCTION_EQUIVALENT_HTML_PDF_HUMAN_REVIEW_READY'
            && manifest.evidenceLevel === 'E4_PRODUCTION_EQUIVALENT_OUTPUT_VERIFIED'
            && manifest.exactProductionGeneratorUsed === true
            && manifest.productionRendererUsed === true
            && manifest.reviewCohortSourceCount === 12
            && manifest.exactGeneratorFailureCount === 0
            && manifest.reviewCohortMacroContextCount === 16
            && manifest.mathPreservedCount === manifest.reviewCohortQuestionCount
            && manifest.promptChangedCount === manifest.reviewCohortQuestionCount
            && manifest.forbiddenVisibleLabelCount === 0
            && manifest.humanReviewReady === true
            && manifest.productionAdmissionGranted === false
            && claim.actualEvidenceLevel === 'E4_PRODUCTION_EQUIVALENT_OUTPUT_VERIFIED'
            && claim.claims?.humanReviewReady === true
            && claim.claims?.productionAdmitted === false
            && contract.status === 'E4_PRODUCTION_EQUIVALENT_OUTPUT_VERIFIED_HUMAN_REVIEW_READY'
            && contract.evidenceResult?.productionAdmissionGranted === false;
          if (!ok) process.exit(1);
          NODE

      - name: Upload exact Human Review evidence
        uses: actions/upload-artifact@v4
        with:
          name: postg-app-w01-a05-production-equivalent-human-review
          path: |
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.html
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.pdf
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.extracted.txt
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW_DATA.json
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW_MANIFEST.json
            docs/curriculum/output/POSTG_APP_W01_A05_E4_HUMAN_REVIEW_READY.marker
            docs/curriculum/output/POSTG_APP_W01_A05_E4_HUMAN_REVIEW_READBACK.md
          retention-days: 30

      - name: Commit exact E4 artifacts to pull request branch
        if: steps.evidence_state.outputs.committed_e4 != 'true' && github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/curriculum/application/w01-e4-production-review-runtime.mjs \
            data/project/milestones/POSTG-APP-W01-A05.claim.json \
            data/curriculum/application/contracts/POSTG-APP-W01-A05_UnitFlowExactGeneratorRendererAndHumanReviewRemediation.json \
            docs/curriculum/output/POSTG_APP_W01_A05_E4_HUMAN_REVIEW_READY.marker \
            docs/curriculum/output/POSTG_APP_W01_A05_E4_HUMAN_REVIEW_READBACK.md \
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.html \
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.pdf \
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW.extracted.txt \
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW_DATA.json \
            docs/curriculum/output/postg-app/POSTG_APP_W01_A05_REVIEW_MANIFEST.json
          if git diff --cached --quiet; then
            echo "Exact A05 E4 artifacts already committed."
          else
            git commit -m "docs(application): commit W01-A05 E4 human review evidence"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
