name: G5A-U02 S107 Selection Symbolic Common Marking

on:
  pull_request:
    branches: [main]
    paths:
      - "src/curriculum/g5a-u02/**"
      - "site/modules/renderer/g5a-u02-s101-public-renderer.js"
      - "site/modules/renderer/g5a-u02-s107-public-representation.js"
      - "site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js"
      - "tests/curriculum/g5a-u02-s97-source-parity-prompt-completeness.test.js"
      - "tests/curriculum/g5a-u02-s107-selection-symbolic-common-marking.test.js"
      - "tools/curriculum/run-g5a-u02-s107-bundle-audit.mjs"
      - "tools/curriculum/materialize-g5a-u02-s107-integration.mjs"
      - "docs/curriculum/architecture/G5AU02_S107_P1CandidateSymbolicRelationAndCommonFactorMarkingFullFix.md"
      - "docs/curriculum/output/G5AU02_S107_P1_CANDIDATE_SYMBOLIC_COMMON_PENDING.marker"
      - ".github/workflows/g5a-u02-s107-selection-symbolic-common-marking.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-integration:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Materialize bounded S107 integration
        run: node tools/curriculum/materialize-g5a-u02-s107-integration.mjs
      - name: Build canonical browser bundle
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile=site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Commit only bounded integration and generated bundle
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          allowed=$(printf '%s\n' \
            src/curriculum/g5a-u02/class-c-hidden-projection-binding.js \
            src/curriculum/g5a-u02/question-display-model.js \
            site/modules/renderer/g5a-u02-s101-public-renderer.js \
            site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js | sort)
          git add -- \
            src/curriculum/g5a-u02/class-c-hidden-projection-binding.js \
            src/curriculum/g5a-u02/question-display-model.js \
            site/modules/renderer/g5a-u02-s101-public-renderer.js \
            site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
          staged=$(git diff --cached --name-only | sort)
          if [ -z "$staged" ]; then
            echo "S107 integration already materialized."
            exit 0
          fi
          test "$staged" = "$allowed"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build(g5a-u02): materialize S107 integration and bundle"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

  source-contract:
    needs: materialize-integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run S107 focused source and renderer acceptance
        run: node --test tests/curriculum/g5a-u02-s107-selection-symbolic-common-marking.test.js
      - name: Run S97 supersession regression
        run: node --test tests/curriculum/g5a-u02-s97-source-parity-prompt-completeness.test.js

  browser-bundle:
    needs: materialize-integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build current browser runtime from canonical source
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile=site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Verify bundled S107 authority
        run: node tools/curriculum/run-g5a-u02-s107-bundle-audit.mjs > /tmp/g5a-u02-s107-bundle-audit.json
      - name: Require committed bundle parity
        run: git diff --exit-code -- site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Upload generated bundle and audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-s107-generated-bundle
          retention-days: 30
          if-no-files-found: error
          path: |
            site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
            /tmp/g5a-u02-s107-bundle-audit.json

  full-regression:
    needs: materialize-integration
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-package-lock
      - name: Run complete Node regression with inspectable readback
        shell: bash
        run: |
          set +e
          npm test > /tmp/g5a-u02-s107-full-regression.log 2>&1
          status=$?
          tail -n 180 /tmp/g5a-u02-s107-full-regression.log
          exit "$status"
      - name: Upload full regression readback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-s107-full-regression
          retention-days: 7
          if-no-files-found: error
          path: /tmp/g5a-u02-s107-full-regression.log
