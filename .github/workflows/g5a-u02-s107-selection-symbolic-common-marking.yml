name: G5A-U02 S107 Selection Symbolic Common Marking

on:
  pull_request:
    branches: [main]
    paths:
      - "src/curriculum/g5a-u02/**"
      - "site/modules/renderer/g5a-u02-s101-public-renderer.js"
      - "site/modules/renderer/g5a-u02-s107-public-representation.js"
      - "site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js"
      - "tests/curriculum/g5a-u02-s97-legacy-unknown-key-normalization.test.js"
      - "tests/curriculum/g5a-u02-s97-source-parity-prompt-completeness.test.js"
      - "tests/curriculum/g5a-u02-s107-selection-symbolic-common-marking.test.js"
      - "tools/curriculum/materialize-g5a-u02-s107-regression-fix.mjs"
      - "tools/curriculum/run-g5a-u02-s107-bundle-audit.mjs"
      - "docs/curriculum/architecture/G5AU02_S107_P1CandidateSymbolicRelationAndCommonFactorMarkingFullFix.md"
      - "docs/curriculum/output/G5AU02_S107_P1_CANDIDATE_SYMBOLIC_COMMON_PENDING.marker"
      - ".github/workflows/g5a-u02-s107-selection-symbolic-common-marking.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize-regression-fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Materialize bounded S107 renderer and regression fix
        run: node tools/curriculum/materialize-g5a-u02-s107-regression-fix.mjs
      - name: Commit only approved S107 regression files
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          allowed=$(printf '%s\n' \
            site/modules/renderer/g5a-u02-s101-public-renderer.js \
            tests/curriculum/g5a-u02-s97-legacy-unknown-key-normalization.test.js \
            tests/curriculum/g5a-u02-s97-source-parity-prompt-completeness.test.js | sort)
          git add -- \
            site/modules/renderer/g5a-u02-s101-public-renderer.js \
            tests/curriculum/g5a-u02-s97-legacy-unknown-key-normalization.test.js \
            tests/curriculum/g5a-u02-s97-source-parity-prompt-completeness.test.js
          staged=$(git diff --cached --name-only | sort)
          test -n "$staged"
          test "$staged" = "$allowed"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "fix(g5a-u02): align S107 renderer and S97 supersession"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"

  source-contract:
    needs: materialize-regression-fix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run S107 focused source and renderer acceptance
        run: node --test tests/curriculum/g5a-u02-s107-selection-symbolic-common-marking.test.js
      - name: Run S97 supersession regressions
        run: |
          node --test tests/curriculum/g5a-u02-s97-legacy-unknown-key-normalization.test.js
          node --test tests/curriculum/g5a-u02-s97-source-parity-prompt-completeness.test.js

  browser-bundle:
    needs: materialize-regression-fix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build current browser runtime from canonical source
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile=site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Verify bundled S107 authority
        run: node tools/curriculum/run-g5a-u02-s107-bundle-audit.mjs > /tmp/g5a-u02-s107-bundle-audit.json
      - name: Require committed bundle parity
        run: git diff --exit-code -- site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js

  full-regression:
    needs: materialize-regression-fix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-package-lock
      - name: Run complete Node regression
        run: npm test
