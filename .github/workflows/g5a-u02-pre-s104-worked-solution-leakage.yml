name: G5A-U02 Pre-S104 Worked Solution Leakage

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/curriculum/g5a-u02/s100-question-display.js"
      - "src/curriculum/g5a-u02/hidden-worksheet-answer-key.js"
      - "site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js"
      - "site/modules/renderer/g5a-u02-s101-public-renderer.js"
      - "tests/curriculum/g5a-u02-pre-s104-worked-solution-leakage.test.js"
      - "tests/curriculum/g5a-u02-s100-method-witness-language-reasoning.test.js"
      - "tools/curriculum/generate-g5a-u02-pre-s104-semantic-regeneration.mjs"
      - "docs/curriculum/architecture/G5AU02_PreS104_WorkedSolutionLeakageAndResponseSpaceFullFix.md"
      - "docs/curriculum/output/G5AU02_PRE_S104_WORKED_SOLUTION_LEAKAGE_PENDING.marker"
      - ".github/workflows/g5a-u02-pre-s104-worked-solution-leakage.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  source-and-regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-package-lock
      - name: Run focused worked-solution boundary tests
        run: node --test tests/curriculum/g5a-u02-pre-s104-worked-solution-leakage.test.js
      - name: Run S100 backward source contract
        run: node --test tests/curriculum/g5a-u02-s100-method-witness-language-reasoning.test.js
      - name: Run complete Node regression
        shell: bash
        run: |
          set +e
          npm test > /tmp/g5a-u02-worked-solution-full-regression.log 2>&1
          status=$?
          tail -n 250 /tmp/g5a-u02-worked-solution-full-regression.log
          exit "$status"
      - name: Upload full regression readback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-worked-solution-full-regression
          retention-days: 7
          if-no-files-found: error
          path: /tmp/g5a-u02-worked-solution-full-regression.log

  regenerated-html-pdf:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install project and browser dependencies
        run: |
          npm install --no-package-lock
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
          python3 -m pip install --break-system-packages pypdf pillow
      - name: Build deployable browser runtime
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile=site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Generate corrected 60-question HTML and audit
        run: node tools/curriculum/generate-g5a-u02-pre-s104-semantic-regeneration.mjs
      - name: Validate leakage and response-space authority
        run: |
          node --input-type=module <<'NODE'
          import { readFile } from 'node:fs/promises';
          const root = 'docs/curriculum/output/pre-s104';
          const audit = JSON.parse(await readFile(`${root}/G5AU02_PreS104_Regenerated60.audit.json`, 'utf8'));
          const manifest = JSON.parse(await readFile(`${root}/G5AU02_PreS104_Regenerated60.manifest.json`, 'utf8'));
          const zero = [
            'factorRelationWorkedSolutionLeakCount',
            'trialDivisionWorkedSolutionLeakCount',
            'factorRelationResponseSpaceMissingCount',
            'trialDivisionResponseSpaceMissingCount',
          ];
          for (const key of zero) {
            if (audit[key] !== 0 || manifest[key] !== 0) throw new Error(`${key}=${audit[key]}/${manifest[key]}`);
          }
          if (audit.workedSolutionPolicy !== 'answer_key_only_question_scaffold_v1') throw new Error(`policy=${audit.workedSolutionPolicy}`);
          if (manifest.questionCount !== 60 || manifest.answerCount !== 60 || manifest.canonicalPatternCount !== 22) {
            throw new Error('regeneration count mismatch');
          }
          console.log(JSON.stringify({ status: audit.status, workedSolutionPolicy: audit.workedSolutionPolicy, zero }, null, 2));
          NODE
      - name: Verify DOM containment and print PDF
        run: |
          node --input-type=module <<'NODE'
          import { chromium } from 'playwright';
          import { pathToFileURL } from 'node:url';
          import { resolve } from 'node:path';
          import { readFile } from 'node:fs/promises';
          const root = resolve('docs/curriculum/output/pre-s104');
          const htmlPath = resolve(root, 'G5AU02_PreS104_Regenerated60.html');
          const pdfPath = resolve(root, 'G5AU02_PreS104_Regenerated60.pdf');
          const manifest = JSON.parse(await readFile(resolve(root, 'G5AU02_PreS104_Regenerated60.manifest.json'), 'utf8'));
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1280, height: 960 } });
          await page.goto(pathToFileURL(htmlPath).href, { waitUntil: 'networkidle' });
          const diagnostic = await page.evaluate(() => {
            const cells = [...document.querySelectorAll('.worksheet-cell')];
            const pages = [...document.querySelectorAll('.worksheet-page')];
            const questionSection = document.querySelector('.worksheet-section--questions');
            const questionText = questionSection?.innerText ?? '';
            return {
              questionCellCount: document.querySelectorAll('.worksheet-cell--question').length,
              answerCellCount: document.querySelectorAll('.worksheet-cell--answer-key').length,
              pageCount: pages.length,
              cellOverflowCount: cells.filter((node) => node.scrollHeight > node.clientHeight + 1 || node.scrollWidth > node.clientWidth + 1).length,
              pageOverflowCount: pages.filter((node) => node.scrollHeight > node.clientHeight + 1 || node.scrollWidth > node.clientWidth + 1).length,
              hasMultiplicationScaffold: questionText.includes('乘法：'),
              hasDivisionScaffold: questionText.includes('除法：'),
              hasTrialScaffold: questionText.includes('是否整除') || questionText.includes('整除□'),
              solvedTrialTokenCount: (questionText.match(/\d+\/\d+\/\d+[✓×]/g) ?? []).length,
              solvedTrialInstructionCount: (questionText.match(/✓整除/g) ?? []).length,
            };
          });
          console.log(JSON.stringify(diagnostic, null, 2));
          if (diagnostic.questionCellCount !== 60 || diagnostic.answerCellCount !== 60) throw new Error('cell count mismatch');
          if (diagnostic.pageCount !== manifest.expectedPdfPageCount) throw new Error('page count mismatch');
          if (diagnostic.cellOverflowCount !== 0 || diagnostic.pageOverflowCount !== 0) throw new Error('DOM overflow');
          if (!diagnostic.hasMultiplicationScaffold || !diagnostic.hasDivisionScaffold || !diagnostic.hasTrialScaffold) throw new Error('response scaffold missing');
          if (diagnostic.solvedTrialTokenCount !== 0 || diagnostic.solvedTrialInstructionCount !== 0) throw new Error('worked trial solution leaked');
          await page.emulateMedia({ media: 'print' });
          await page.pdf({
            path: pdfPath,
            format: 'A4',
            printBackground: true,
            preferCSSPageSize: true,
            margin: { top: '0mm', right: '0mm', bottom: '0mm', left: '0mm' },
          });
          await browser.close();
          NODE
      - name: Verify PDF pages and question-page readback
        run: |
          rm -rf /tmp/g5a-u02-worked-pages && mkdir -p /tmp/g5a-u02-worked-pages
          pdftoppm -png -r 100 docs/curriculum/output/pre-s104/G5AU02_PreS104_Regenerated60.pdf /tmp/g5a-u02-worked-pages/page
          pdftotext -bbox-layout docs/curriculum/output/pre-s104/G5AU02_PreS104_Regenerated60.pdf /tmp/g5a-u02-worked-bbox.html
          python3 <<'PY'
          import json, re
          from pathlib import Path
          from PIL import Image, ImageStat
          from pypdf import PdfReader
          root = Path('docs/curriculum/output/pre-s104')
          manifest = json.loads((root / 'G5AU02_PreS104_Regenerated60.manifest.json').read_text(encoding='utf-8'))
          reader = PdfReader(str(root / 'G5AU02_PreS104_Regenerated60.pdf'))
          images = sorted(Path('/tmp/g5a-u02-worked-pages').glob('page-*.png'))
          expected = manifest['expectedPdfPageCount']
          if len(reader.pages) != expected or len(images) != expected:
              raise SystemExit(f'page mismatch pdf={len(reader.pages)} png={len(images)} expected={expected}')
          for image_path in images:
              stat = ImageStat.Stat(Image.open(image_path).convert('L'))
              if stat.extrema[0][0] >= 245 or stat.var[0] <= 5:
                  raise SystemExit(f'blank page: {image_path}')
          bbox = Path('/tmp/g5a-u02-worked-bbox.html').read_text(encoding='utf-8', errors='ignore')
          page_re = re.compile(r'<page[^>]*width="([0-9.]+)"[^>]*height="([0-9.]+)"[^>]*>(.*?)</page>', re.S)
          word_re = re.compile(r'<word[^>]*xMin="([0-9.]+)"[^>]*yMin="([0-9.]+)"[^>]*xMax="([0-9.]+)"[^>]*yMax="([0-9.]+)"', re.S)
          for index, (width, height, body) in enumerate(page_re.findall(bbox), 1):
              width, height = float(width), float(height)
              for coords in word_re.findall(body):
                  x0, y0, x1, y1 = map(float, coords)
                  if x0 < -0.5 or y0 < -0.5 or x1 > width + 0.5 or y1 > height + 0.5:
                      raise SystemExit(f'bbox overflow page={index} coords={coords}')
          question_text = '\n'.join((reader.pages[i].extract_text() or '') for i in range(manifest['questionPageCount']))
          for required in ['乘法：', '除法：', '判斷：', '因數：']:
              if required not in question_text:
                  raise SystemExit(f'missing question scaffold: {required}')
          normalized_question_text = re.sub(r'\s+', '', question_text)
          if '是否整除' not in normalized_question_text and '整除□' not in normalized_question_text:
              raise SystemExit('missing question scaffold: trial judgement')
          if re.search(r'\d+/\d+/\d+[✓×]', question_text) or '✓整除' in question_text:
              raise SystemExit('worked trial solution leaked into question PDF pages')
          print(f'worked-solution question boundary PDF PASS: {expected} pages')
          PY
      - name: Upload regenerated authority
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-pre-s104-worked-solution-regenerated-60
          if-no-files-found: error
          retention-days: 30
          path: |
            docs/curriculum/output/pre-s104/G5AU02_PreS104_Regenerated60.html
            docs/curriculum/output/pre-s104/G5AU02_PreS104_Regenerated60.pdf
            docs/curriculum/output/pre-s104/G5AU02_PreS104_Regenerated60.manifest.json
            docs/curriculum/output/pre-s104/G5AU02_PreS104_Regenerated60.audit.json
