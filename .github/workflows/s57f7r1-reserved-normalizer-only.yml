name: S57F7R1 Reserved Normalizer Only FullFix

on:
  push:
    branches:
      - s57f7r1-g3b-u04-human-semantic-readback-fullfix
    paths:
      - .github/workflows/s57f7r1-reserved-normalizer-only.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-commit:
    if: github.event_name != 'pull_request' || github.head_ref == 's57f7r1-g3b-u04-human-semantic-readback-fullfix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: s57f7r1-g3b-u04-human-semantic-readback-fullfix
          fetch-depth: 0
      - name: Align reserved normalizer with registered contexts
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js')
          text = path.read_text(encoding='utf-8')
          pairs = [
            ('const perRecipientByContext = { classroom: 5, library: 4, sports_equipment: 2, awards: 3 };',
             'const perRecipientByContext = { books: 4, prizes: 3, snacks: 4, sports_equipment: 2 };'),
            ('const reservedByContext = { classroom: 5, library: 4, sports_equipment: 2, awards: 6 };',
             'const reservedByContext = { books: 4, prizes: 6, snacks: 4, sports_equipment: 2 };')
          ]
          for old, new in pairs:
              if text.count(old) != 1:
                  raise SystemExit(f'Expected normalizer mapping exactly once: {old}; count={text.count(old)}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
          git diff --check
      - name: Commit patch and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+users.noreply.github.com"
          git add site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js
          git rm .github/workflows/s57f7r1-reserved-normalizer-only.yml
          git commit -m "fix(g3b-u04): align reserved normalizer with registered contexts"
          git push origin HEAD:s57f7r1-g3b-u04-human-semantic-readback-fullfix
