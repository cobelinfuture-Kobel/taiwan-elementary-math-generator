name: G4B-U04 R3B 3x5 PR Test

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/g4b-u04-r3b-3x5-pr-test.yml
      - tools/curriculum/generate-g4b-u04-r3b-3x5-experiment.mjs
      - tools/curriculum/run-g4b-u04-r3b-3x5-experiment.mjs
      - docs/curriculum/experiments/G4B_U04_R3B_3X5_TEST_ONLY.md

permissions:
  contents: read

jobs:
  test-only-3x5:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Install browser and PDF verification dependencies
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
          python3 -m pip install --break-system-packages pypdf pillow

      - name: Run isolated 3x5 experiment
        run: node tools/curriculum/run-g4b-u04-r3b-3x5-experiment.mjs

      - name: Upload test PDF, HTML, manifest and page images
        uses: actions/upload-artifact@v4
        with:
          name: g4b-u04-r3b-3x5-test-only
          if-no-files-found: error
          retention-days: 30
          path: |
            docs/curriculum/output/experiments/g4b-u04-r3b-3x5/*.html
            docs/curriculum/output/experiments/g4b-u04-r3b-3x5/*.pdf
            docs/curriculum/output/experiments/g4b-u04-r3b-3x5/manifest.json
            /tmp/g4b-u04-r3b-3x5-rendered/*.png
