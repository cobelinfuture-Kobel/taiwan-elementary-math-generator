name: S75 G4B-U04 HTML PDF Smoke

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  production-smoke:
    if: github.event_name != 'push' || github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Install browser and PDF verification dependencies
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
          python3 -m pip install --break-system-packages pypdf pillow

      - name: Run full Node test suite
        run: npm test

      - name: Generate 68-question canonical HTML
        run: node tools/curriculum/generate-s75-g4b-u04-public-smoke.mjs

      - name: Verify DOM containment and print PDF
        run: |
          node --input-type=module <<'NODE'
          import { chromium } from 'playwright';
          import { pathToFileURL } from 'node:url';
          import { resolve } from 'node:path';
          const htmlPath = resolve('docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.html');
          const pdfPath = resolve('docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.pdf');
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 1280, height: 960 } });
          await page.goto(pathToFileURL(htmlPath).href, { waitUntil: 'networkidle' });
          const containment = await page.evaluate(() => {
            const cells = [...document.querySelectorAll('.g4b-u04-cell')]
              .filter((node) => !node.classList.contains('g4b-u04-cell--filler'));
            const overflow = cells.filter((node) =>
              node.scrollHeight > node.clientHeight + 1 || node.scrollWidth > node.clientWidth + 1
            );
            const longCards = [...document.querySelectorAll(
              '.g4b-u04-cell--contextual_application,'
              + '.g4b-u04-cell--operation_estimation,'
              + '.g4b-u04-cell--inverse_possible_values,'
              + '.g4b-u04-cell--method_comparison'
            )];
            return {
              cellCount: cells.length,
              overflowCount: overflow.length,
              longCardCount: longCards.length,
              firstOverflow: overflow[0]?.outerHTML.slice(0, 500) ?? null,
            };
          });
          console.log(JSON.stringify(containment, null, 2));
          if (containment.cellCount !== 136) throw new Error(`expected 136 rendered cells, got ${containment.cellCount}`);
          if (containment.overflowCount !== 0) throw new Error(`DOM overflow count=${containment.overflowCount}; first=${containment.firstOverflow}`);
          if (containment.longCardCount < 24) throw new Error(`long-text card coverage too low: ${containment.longCardCount}`);
          await page.emulateMedia({ media: 'print' });
          await page.pdf({
            path: pdfPath,
            format: 'A4',
            printBackground: true,
            preferCSSPageSize: true,
            margin: { top: '0mm', right: '0mm', bottom: '0mm', left: '0mm' }
          });
          await browser.close();
          NODE

      - name: Render and verify all PDF pages
        run: |
          rm -rf /tmp/s75-g4b-u04-rendered
          mkdir -p /tmp/s75-g4b-u04-rendered
          pdftoppm -png -r 120 docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.pdf /tmp/s75-g4b-u04-rendered/page
          python3 <<'PY'
          import json
          from pathlib import Path
          from PIL import Image, ImageStat
          from pypdf import PdfReader
          root = Path('docs/curriculum/output/smoke')
          pdf = root / 'S75_G4B_U04_PublicWorksheet.pdf'
          manifest = json.loads((root / 'S75_G4B_U04_PublicWorksheet.manifest.json').read_text(encoding='utf-8'))
          reader = PdfReader(str(pdf))
          files = sorted(Path('/tmp/s75-g4b-u04-rendered').glob('page-*.png'))
          if len(files) != len(reader.pages):
              raise SystemExit(f'rendered page mismatch: {len(files)}/{len(reader.pages)}')
          expected_pages = manifest['expectedPdfPageCount']
          if len(files) != expected_pages:
              raise SystemExit(f'PDF page mismatch: {len(files)}/{expected_pages}')
          if expected_pages < 2:
              raise SystemExit(f'expected multi-page production PDF, got {expected_pages} pages')
          nonblank = 0
          for path in files:
              image = Image.open(path).convert('L')
              stat = ImageStat.Stat(image)
              if stat.extrema[0][0] < 245 and stat.var[0] > 5:
                  nonblank += 1
          if nonblank != len(files):
              raise SystemExit(f'blank page detected: {nonblank}/{len(files)}')
          print(f'all rendered pages nonblank: {nonblank}')
          PY

      - name: Verify PDF text bounding boxes stay inside A4 pages
        run: |
          pdftotext -bbox-layout docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.pdf /tmp/s75-g4b-u04-bbox.html
          python3 <<'PY'
          import re
          from pathlib import Path
          text = Path('/tmp/s75-g4b-u04-bbox.html').read_text(encoding='utf-8', errors='ignore')
          page_re = re.compile(r'<page[^>]*width="([0-9.]+)"[^>]*height="([0-9.]+)"[^>]*>(.*?)</page>', re.S)
          word_re = re.compile(r'<word[^>]*xMin="([0-9.]+)"[^>]*yMin="([0-9.]+)"[^>]*xMax="([0-9.]+)"[^>]*yMax="([0-9.]+)"', re.S)
          pages = page_re.findall(text)
          if not pages:
              raise SystemExit('no PDF bbox pages parsed')
          overflow = []
          for page_index, (width, height, body) in enumerate(pages, 1):
              width, height = float(width), float(height)
              for coords in word_re.findall(body):
                  x0, y0, x1, y1 = map(float, coords)
                  if x0 < -0.5 or y0 < -0.5 or x1 > width + 0.5 or y1 > height + 0.5:
                      overflow.append((page_index, x0, y0, x1, y1, width, height))
          if overflow:
              raise SystemExit(f'PDF bbox overflow count={len(overflow)} first={overflow[0]}')
          print(f'PDF bbox containment PASS: {len(pages)} pages')
          PY

      - name: Finalize verified smoke manifest
        run: |
          python3 <<'PY'
          from hashlib import sha256
          import json
          from pathlib import Path
          import unicodedata
          from pypdf import PdfReader
          root = Path('docs/curriculum/output/smoke')
          pdf_path = root / 'S75_G4B_U04_PublicWorksheet.pdf'
          manifest_path = root / 'S75_G4B_U04_PublicWorksheet.manifest.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          reader = PdfReader(str(pdf_path))
          texts = [(page.extract_text() or '') for page in reader.pages]
          normalized_texts = [unicodedata.normalize('NFKC', text) for text in texts]
          all_text = ''.join(normalized_texts)
          if '概數' not in all_text or '答案頁' not in all_text:
              raise SystemExit('Traditional Chinese title or answer page missing from normalized PDF text')
          if len(reader.pages) != manifest['expectedPdfPageCount']:
              raise SystemExit(f"PDF page mismatch: {len(reader.pages)}/{manifest['expectedPdfPageCount']}")
          if not normalized_texts[-1].strip():
              raise SystemExit('last answer page is blank')
          pdf_bytes = pdf_path.read_bytes()
          manifest.update({
              'status': 'production_html_pdf_smoke_pass',
              'actualPdfPageCount': len(reader.pages),
              'pdfSha256': sha256(pdf_bytes).hexdigest(),
              'pdfBytes': len(pdf_bytes),
              'renderedPageImageCount': len(reader.pages),
              'nonblankRenderedPageCount': len(reader.pages),
              'pdfBoundingBoxOverflowCount': 0,
              'cjkGlyphRendering': 'pass',
              'visualRenderVerification': 'all_pages_nonblank_and_bbox_contained',
          })
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY

      - name: Commit first verified smoke bundle to branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/s75-g4b-u04-production-stress-html-pdf-d0'
        run: |
          HTML_PATH=docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.html
          PDF_PATH=docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.pdf
          MANIFEST_PATH=docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.manifest.json
          if git cat-file -e "HEAD:${HTML_PATH}" && git cat-file -e "HEAD:${PDF_PATH}" && git cat-file -e "HEAD:${MANIFEST_PATH}"; then
            echo "Verified smoke bundle already committed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${HTML_PATH}" "${PDF_PATH}" "${MANIFEST_PATH}"
          git commit -m "docs(g4b-u04): commit verified S75 HTML PDF smoke"
          git push origin HEAD:s75-g4b-u04-production-stress-html-pdf-d0

      - name: Upload verified smoke bundle
        uses: actions/upload-artifact@v4
        with:
          name: s75-g4b-u04-public-html-pdf-smoke
          if-no-files-found: error
          retention-days: 30
          path: |
            docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.html
            docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.pdf
            docs/curriculum/output/smoke/S75_G4B_U04_PublicWorksheet.manifest.json
            /tmp/s75-g4b-u04-rendered/*.png
