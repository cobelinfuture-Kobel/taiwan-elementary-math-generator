name: S57E5 One-Time Verify

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/s57e5-one-time-verify.yml

permissions:
  contents: write

jobs:
  verify-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S57E5 branch
        uses: actions/checkout@v4
        with:
          ref: s57e5-g3b-u04-blocking-semantic-validator
          fetch-depth: 0
          path: work

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: work
        run: npm install

      - name: Run full test suite and record result
        shell: bash
        run: |
          cd work
          mkdir -p docs/curriculum/output/debug
          set +e
          npm test > docs/curriculum/output/debug/S57E5_ONE_TIME_VERIFY.log 2>&1
          exit_code=$?
          set -e
          {
            echo
            echo "exit_code=$exit_code"
            echo "head_sha=$(git rev-parse HEAD)"
          } >> docs/curriculum/output/debug/S57E5_ONE_TIME_VERIFY.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/curriculum/output/debug/S57E5_ONE_TIME_VERIFY.log
          git commit -m "test(g3b-u04): record S57E5 one-time verification"
          git push origin HEAD:s57e5-g3b-u04-blocking-semantic-validator
          exit $exit_code

      - name: Checkout main for workflow cleanup
        if: always()
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: cleanup

      - name: Remove one-time workflow from main
        if: always()
        run: |
          cd cleanup
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/s57e5-one-time-verify.yml
          git commit -m "chore(ci): remove one-time S57E5 verification workflow [skip ci]"
          git push origin HEAD:main
