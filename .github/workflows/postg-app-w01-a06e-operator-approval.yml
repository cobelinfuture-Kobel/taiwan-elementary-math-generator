name: POSTG-APP W01-A06E Operator Approval

on:
  pull_request:
    branches: [ main ]
    paths:
      - "data/curriculum/application/reviews/POSTG-APP-W01-A06E_OperatorSecondHumanReviewDecision.json"
      - "data/curriculum/application/contracts/POSTG-APP-W01-A06E_OperatorSecondHumanReviewDecision.json"
      - "data/curriculum/application/controller/postg-app-wave-plan.json"
      - "data/curriculum/application/controller/postg-app-master-controller-state.json"
      - "data/project/milestones/POSTG-APP-W01-A06.claim.json"
      - "src/curriculum/application/postg-app-master-controller.mjs"
      - "src/curriculum/application/w01-a06e-operator-approval-runtime.mjs"
      - "tools/curriculum/validate-postg-app-w01-a06e-operator-approval.mjs"
      - "tests/curriculum/postg-app-w01-a06e-operator-approval.test.js"
      - "tests/curriculum/postg-app-m00-master-controller.test.js"
      - "docs/curriculum/output/POSTG_APP_W01_A06E_OPERATOR_APPROVAL_READY.marker"
      - "docs/curriculum/output/POSTG_APP_W01_A06E_OPERATOR_APPROVAL_READBACK.md"
      - ".github/workflows/postg-app-w01-a06e-operator-approval.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postg-app-w01-a06e-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  operator-approval:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Run A06E focused approval tests
        run: node --test tests/curriculum/postg-app-w01-a06e-operator-approval.test.js

      - name: Run deterministic A06E approval validator
        run: node tools/curriculum/validate-postg-app-w01-a06e-operator-approval.mjs

      - name: Validate master controller transition
        run: |
          node --test tests/curriculum/postg-app-m00-master-controller.test.js
          node tools/curriculum/validate-postg-app-m00-master-controller.mjs

      - name: Run A06 semantic and renderer regressions
        run: |
          node --test tests/curriculum/postg-app-w01-a06b-semantic-runtime.test.js
          node --test tests/curriculum/postg-app-w01-a06c-relation-surfaces.test.js
          node --test tests/curriculum/postg-app-w01-a06d-production-review.test.js

      - name: Validate milestone claims
        run: npm run governance:claims
