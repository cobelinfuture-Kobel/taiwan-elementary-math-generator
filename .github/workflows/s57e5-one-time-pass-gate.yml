name: S57E5 One-Time Pass Gate

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/s57e5-one-time-pass-gate.yml

permissions:
  contents: write

jobs:
  verify-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S57E5 branch
        uses: actions/checkout@v4
        with:
          ref: s57e5-g3b-u04-blocking-semantic-validator
          fetch-depth: 0
          path: work

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: work
        run: npm install

      - name: Run full test suite
        working-directory: work
        run: npm test | tee /tmp/s57e5-test.log

      - name: Record pass and remove debug artifacts
        run: |
          cd work
          rm -f docs/curriculum/output/debug/S57E5_validator_test.log
          rm -f docs/curriculum/output/debug/S57E5_ONE_TIME_VERIFY.log
          rm -f docs/curriculum/output/debug/S57E5_CI_RETRY.marker
          rmdir docs/curriculum/output/debug 2>/dev/null || true
          {
            echo "S57E5_ONE_TIME_PASS"
            grep -E '^# tests |^# pass |^# fail ' /tmp/s57e5-test.log || true
            echo "verified_head=$(git rev-parse HEAD)"
          } > docs/curriculum/output/S57E5_ONE_TIME_VERIFY_PASS.marker
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/curriculum/output
          git commit -m "test(g3b-u04): record S57E5 pass gate"
          git push origin HEAD:s57e5-g3b-u04-blocking-semantic-validator

      - name: Checkout main for workflow cleanup
        if: always()
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: cleanup

      - name: Remove one-time workflow from main
        if: always()
        run: |
          cd cleanup
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/s57e5-one-time-pass-gate.yml
          git commit -m "chore(ci): remove one-time S57E5 pass gate [skip ci]"
          git push origin HEAD:main
