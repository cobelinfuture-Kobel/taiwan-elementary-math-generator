name: S96D G5A-U02 Focused Test

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run focused S96D tests
        run: node --test tests/site/g5a-u02-browser-arbitrary-regeneration.test.js
      - name: Run full suite with concise failure tail
        shell: bash
        run: |
          set +e
          npm test > /tmp/s96d-full-suite.log 2>&1
          code=$?
          tail -n 250 /tmp/s96d-full-suite.log
          exit $code
