name: GLM-S05 One-Shot Regression Patch

on:
  push:
    branches:
      - fix/global-18-layout-fullfix
    paths:
      - .glm-s05-regression-patch-trigger

permissions:
  contents: write

jobs:
  patch-stale-expectations:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/global-18-layout-fullfix
          fetch-depth: 0
      - name: Apply bounded replacements
        run: python tools/maintenance/patch-glm-s05-stale-regressions.py
      - name: Remove one-shot maintenance files
        run: |
          rm -f .glm-s05-regression-patch-trigger
          rm -f tools/maintenance/patch-glm-s05-stale-regressions.py
          rm -f .github/workflows/glm-s05-one-shot-regression-patch.yml
      - name: Commit bounded regression updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "test(layout): align stale regressions with exact matrix"
          git push origin HEAD:fix/global-18-layout-fullfix
