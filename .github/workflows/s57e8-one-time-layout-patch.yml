name: S57E8 One-Time Layout Patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/s57e8-one-time-layout-patch.yml

permissions:
  contents: write

jobs:
  patch-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S57E8 branch
        uses: actions/checkout@v4
        with:
          ref: s57e8-g3b-u04-html-pdf-smoke
          fetch-depth: 0
          path: work

      - name: Tighten A4 question-card height
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'work/site/modules/curriculum/batch-a/g3b-u04-hidden-semantic-html.js';
          const before = 'min-height: 58mm;';
          const after = 'min-height: 46mm;';
          const text = fs.readFileSync(path, 'utf8');
          if (!text.includes(before) && !text.includes(after)) throw new Error('Expected question-card height token was not found.');
          fs.writeFileSync(path, text.includes(before) ? text.replace(before, after) : text, 'utf8');
          NODE
          cd work
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add site/modules/curriculum/batch-a/g3b-u04-hidden-semantic-html.js
            git commit -m "fix(g3b-u04): fit S57E8 question cards to one A4 page"
            git push origin HEAD:s57e8-g3b-u04-html-pdf-smoke
          fi

      - name: Checkout main for cleanup
        if: always()
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: cleanup

      - name: Remove one-time workflow
        if: always()
        run: |
          cd cleanup
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/s57e8-one-time-layout-patch.yml
          git commit -m "chore(ci): remove one-time S57E8 layout patch [skip ci]"
          git push origin HEAD:main
