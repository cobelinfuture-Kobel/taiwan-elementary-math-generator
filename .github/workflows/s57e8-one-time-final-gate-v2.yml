name: S57E8 One-Time Final Gate V2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/s57e8-one-time-final-gate-v2.yml

permissions:
  contents: write

jobs:
  verify-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S57E8 branch
        uses: actions/checkout@v4
        with:
          ref: s57e8-g3b-u04-html-pdf-smoke
          fetch-depth: 0
          path: work

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies and PDF tools
        run: |
          cd work
          npm install
          sudo apt-get update
          sudo apt-get install -y poppler-utils

      - name: Verify committed HTML/PDF artifacts
        shell: bash
        run: |
          set -euo pipefail
          cd work
          HTML="docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.html"
          PDF="docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.pdf"
          MANIFEST="docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.manifest.json"
          test -s "$HTML"
          test -s "$PDF"
          test -s "$MANIFEST"
          pages="$(pdfinfo "$PDF" | awk '/^Pages:/ {print $2}')"
          test "$pages" = "16"
          head -c 5 "$PDF" | grep -q '%PDF-'
          pdftotext "$PDF" /tmp/s57e8-final.txt
          grep -q '3B-U04' /tmp/s57e8-final.txt
          grep -q '兩步驟計算' /tmp/s57e8-final.txt
          grep -q '答案卷' /tmp/s57e8-final.txt
          MANIFEST_PATH="$MANIFEST" node <<'NODE'
          const fs = require('node:fs');
          const m = JSON.parse(fs.readFileSync(process.env.MANIFEST_PATH, 'utf8'));
          const pass = m.status === 'html_pdf_smoke_pass'
            && m.actualPdfPageCount === 16
            && m.questionCount === 64
            && m.answerKeyItemCount === 64
            && m.templateFamilyCount === 32
            && m.knowledgePointCount === 9
            && m.validation.semanticErrors === 0
            && m.validation.unresolvedPlaceholders === 0
            && m.validation.nonPositiveAnswers === 0
            && m.validation.publicProjectionChanged === false;
          if (!pass) {
            console.error(JSON.stringify(m, null, 2));
            process.exit(1);
          }
          NODE

      - name: Run full test suite
        working-directory: work
        run: npm test | tee /tmp/s57e8-final-test.log

      - name: Record final gate and remove obsolete temporary markers
        run: |
          cd work
          rm -f docs/curriculum/output/S57E5_ONE_TIME_VERIFY_PASS.marker
          rm -f docs/curriculum/output/S57E5_FINAL_CI_TRIGGER.marker
          rm -f docs/curriculum/output/S57E6_ONE_TIME_VERIFY_PASS.marker
          rm -f docs/curriculum/output/S57E7_ONE_TIME_VERIFY_PASS.marker
          {
            echo "S57E8_FINAL_ARTIFACT_GATE_PASS"
            grep -E '^# tests |^# pass |^# fail ' /tmp/s57e8-final-test.log || true
            echo "pdf_pages=16"
            echo "question_count=64"
            echo "answer_key_item_count=64"
            echo "template_family_count=32"
            echo "knowledge_point_count=9"
            echo "verified_head=$(git rev-parse HEAD)"
          } > docs/curriculum/output/S57E8_FINAL_ARTIFACT_GATE_PASS.marker
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A docs/curriculum/output
          git commit -m "test(g3b-u04): record S57E8 final artifact gate"
          git push origin HEAD:s57e8-g3b-u04-html-pdf-smoke

      - name: Checkout main for workflow cleanup
        if: always()
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: cleanup

      - name: Remove one-time workflow from main
        if: always()
        run: |
          cd cleanup
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/s57e8-one-time-final-gate-v2.yml
          git commit -m "chore(ci): remove corrected one-time S57E8 final gate [skip ci]"
          git push origin HEAD:main
