name: S57E8 G3B-U04 Hidden HTML PDF Smoke

on:
  push:
    branches:
      - s57e8-g3b-u04-html-pdf-smoke
    paths:
      - site/modules/curriculum/batch-a/g3b-u04-hidden-semantic-html.js
      - tools/curriculum/generate-s57e8-g3b-u04-hidden-smoke.mjs
      - tests/curriculum/batch-a/g3b-u04-hidden-html-pdf-smoke.test.js
      - .github/workflows/s57e8-hidden-html-pdf-smoke.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-verify-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: s57e8-g3b-u04-html-pdf-smoke
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install CJK fonts and PDF inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils

      - name: Generate deterministic hidden worksheet HTML
        run: node tools/curriculum/generate-s57e8-g3b-u04-hidden-smoke.mjs

      - name: Print HTML to PDF with headless Chrome
        shell: bash
        run: |
          set -euo pipefail
          HTML="$GITHUB_WORKSPACE/docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.html"
          PDF="$GITHUB_WORKSPACE/docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.pdf"
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$CHROME"
          "$CHROME" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --no-pdf-header-footer \
            --print-to-pdf="$PDF" \
            "file://$HTML"
          test -s "$PDF"

      - name: Verify PDF structure, pages, and extracted Traditional Chinese text
        shell: bash
        run: |
          set -euo pipefail
          PDF="docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.pdf"
          TEXT="/tmp/s57e8-g3b-u04.txt"
          head -c 5 "$PDF" | grep -q '%PDF-'
          pages="$(pdfinfo "$PDF" | awk '/^Pages:/ {print $2}')"
          test "$pages" = "16"
          bytes="$(stat -c%s "$PDF")"
          test "$bytes" -ge 20000
          pdftotext "$PDF" "$TEXT"
          grep -q '3B-U04' "$TEXT"
          grep -q '兩步驟計算' "$TEXT"
          grep -q '答案卷' "$TEXT"
          grep -q '算式' "$TEXT"
          grep -q '不得作為公開選單或正式教材發布' "$TEXT"

      - name: Finalize smoke manifest
        shell: bash
        run: |
          set -euo pipefail
          PDF="docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.pdf"
          MANIFEST="docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.manifest.json"
          pages="$(pdfinfo "$PDF" | awk '/^Pages:/ {print $2}')"
          bytes="$(stat -c%s "$PDF")"
          sha="$(sha256sum "$PDF" | awk '{print $1}')"
          PAGES="$pages" BYTES="$bytes" SHA="$sha" node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.manifest.json';
          const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
          manifest.actualPdfPageCount = Number(process.env.PAGES);
          manifest.pdfBytes = Number(process.env.BYTES);
          manifest.pdfSha256 = process.env.SHA;
          manifest.status = 'html_pdf_smoke_pass';
          fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`, 'utf8');
          NODE

      - name: Run full test suite with committed-artifact checks enabled
        run: npm test

      - name: Verify generated scope
        run: |
          test -f docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.html
          test -f docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.pdf
          test -f docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.manifest.json
          git status --short

      - name: Commit smoke artifacts and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.html
          git add docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.pdf
          git add docs/curriculum/output/smoke/S57E8_G3B_U04_HiddenSemanticWorksheet.manifest.json
          git rm .github/workflows/s57e8-hidden-html-pdf-smoke.yml
          git commit -m "docs(g3b-u04): add S57E8 hidden HTML PDF smoke artifacts"
          git push origin HEAD:s57e8-g3b-u04-html-pdf-smoke
