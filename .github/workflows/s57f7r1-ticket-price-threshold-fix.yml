name: S57F7R1 Ticket Price Threshold Fix

on:
  push:
    branches:
      - s57f7r1-g3b-u04-human-semantic-readback-fullfix
    paths:
      - .github/workflows/s57f7r1-ticket-price-threshold-fix.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-commit:
    if: github.event_name != 'pull_request' || github.head_ref == 's57f7r1-g3b-u04-human-semantic-readback-fullfix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: s57f7r1-g3b-u04-human-semantic-readback-fullfix
          fetch-depth: 0

      - name: Align ticket price with approved plausibility threshold
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js')
          text = path.read_text(encoding='utf-8')
          old = '              tickets: 60,'
          new = '              tickets: 48,'
          if text.count(old) != 1:
              raise SystemExit('Expected ticket price target not found exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          git diff --check

      - name: Commit patch and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js
          git rm .github/workflows/s57f7r1-ticket-price-threshold-fix.yml
          git commit -m "fix(g3b-u04): align ticket promotion price plausibility"
          git push origin HEAD:s57f7r1-g3b-u04-human-semantic-readback-fullfix
