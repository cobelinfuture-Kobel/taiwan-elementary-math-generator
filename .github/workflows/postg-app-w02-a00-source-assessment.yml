name: POSTG-APP W02-A00 Source Assessment

on:
  pull_request:
    branches: [ main ]
    paths:
      - "data/curriculum/application/assessment/w02-source13-source-authority-baseline.json"
      - "data/curriculum/application/assessment/w02-source13-application-capability-policy.json"
      - "data/curriculum/application/assessment/w02-source13-application-assessment-index.json"
      - "data/curriculum/application/contracts/POSTG-APP-W02-A00_13SourceNodeApplicationCapabilityAssessmentAndAdmissionBaseline.json"
      - "data/project/milestones/POSTG-APP-W02-A00.claim.json"
      - "data/curriculum/application/controller/postg-app-master-controller-state.json"
      - "src/curriculum/application/w02-source13-application-assessment.mjs"
      - "src/curriculum/application/postg-app-master-controller.mjs"
      - "tools/curriculum/validate-postg-app-w02-a00-assessment.mjs"
      - "tests/curriculum/postg-app-w02-a00-assessment.test.js"
      - "tests/curriculum/postg-app-m00-master-controller.test.js"
      - "tests/curriculum/postg-app-w01-a06e-operator-approval.test.js"
      - "docs/curriculum/output/POSTG_APP_W02_A00_SOURCE_ASSESSMENT_READY.marker"
      - "docs/curriculum/output/POSTG_APP_W02_A00_SOURCE_ASSESSMENT_READBACK.md"
      - ".github/workflows/postg-app-w02-a00-source-assessment.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postg-app-w02-a00-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  source-assessment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Run W02 A00 focused tests
        run: node --test tests/curriculum/postg-app-w02-a00-assessment.test.js

      - name: Run deterministic W02 A00 validator
        run: node tools/curriculum/validate-postg-app-w02-a00-assessment.mjs

      - name: Validate master controller transition
        run: |
          node --test tests/curriculum/postg-app-m00-master-controller.test.js
          node tools/curriculum/validate-postg-app-m00-master-controller.mjs

      - name: Verify W01 E5 admission regression
        run: |
          node --test tests/curriculum/postg-app-w01-a06e-operator-approval.test.js
          node tools/curriculum/validate-postg-app-w01-a06e-operator-approval.mjs

      - name: Validate milestone claims
        run: npm run governance:claims
