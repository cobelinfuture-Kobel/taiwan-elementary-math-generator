name: Diagnose S58J G3B U08 PDF

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install --no-package-lock

      - name: Apply canonical final-lifecycle compatibility
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const path = "site/modules/curriculum/batch-a/g3b-u08-canonical-semantic-router.js";
          let text = readFileSync(path, "utf8");
          text = text.replace(
            'G3B_U08_SEMANTIC_PROMOTION_LIFECYCLE.validatorStatus !== "blocking_validator_accepted"',
            '!["blocking_validator_accepted", "blocking_validator_required"].includes(G3B_U08_SEMANTIC_PROMOTION_LIFECYCLE.validatorStatus)'
          );
          writeFileSync(path, text, "utf8");
          NODE

      - name: Generate and print diagnostic PDF
        shell: bash
        run: |
          set -euo pipefail
          node tools/curriculum/generate-s58j-g3b-u08-public-smoke.mjs
          sudo apt-get update >/dev/null
          sudo apt-get install -y poppler-utils python3-pil >/dev/null
          HTML="docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.html"
          PDF="docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.pdf"
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || true)"
          "$CHROME" --headless --no-sandbox --disable-gpu --disable-dev-shm-usage --no-pdf-header-footer --print-to-pdf="$PDF" "file://$(realpath "$HTML")" 2>docs/curriculum/output/smoke/S58J_G3B_U08_chrome.log
          pdfinfo "$PDF" > docs/curriculum/output/smoke/S58J_G3B_U08_pdfinfo.txt
          pdftotext -layout "$PDF" docs/curriculum/output/smoke/S58J_G3B_U08_extracted.txt
          rm -rf docs/curriculum/output/smoke/S58J_G3B_U08_renders
          mkdir -p docs/curriculum/output/smoke/S58J_G3B_U08_renders
          pdftoppm -png -r 100 "$PDF" docs/curriculum/output/smoke/S58J_G3B_U08_renders/page >/dev/null
          {
            echo "chrome=$CHROME"
            echo "pages=$(pdfinfo "$PDF" | awk '/^Pages:/ {print $2}')"
            echo "bytes=$(stat -c%s "$PDF")"
            echo "renders=$(find docs/curriculum/output/smoke/S58J_G3B_U08_renders -name 'page-*.png' | wc -l)"
            echo "equations=$(grep -o '算式：' docs/curriculum/output/smoke/S58J_G3B_U08_extracted.txt | wc -l)"
            echo "answers=$(grep -o '答案：' docs/curriculum/output/smoke/S58J_G3B_U08_extracted.txt | wc -l)"
          } > docs/curriculum/output/smoke/S58J_G3B_U08_diagnostics.txt
          cat docs/curriculum/output/smoke/S58J_G3B_U08_diagnostics.txt

      - name: Upload diagnostic bundle
        uses: actions/upload-artifact@v4
        with:
          name: s58j-g3b-u08-pdf-diagnostics
          path: |
            docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.html
            docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.pdf
            docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.manifest.json
            docs/curriculum/output/smoke/S58J_G3B_U08_diagnostics.txt
            docs/curriculum/output/smoke/S58J_G3B_U08_pdfinfo.txt
            docs/curriculum/output/smoke/S58J_G3B_U08_extracted.txt
            docs/curriculum/output/smoke/S58J_G3B_U08_chrome.log
            docs/curriculum/output/smoke/S58J_G3B_U08_renders
          retention-days: 7
