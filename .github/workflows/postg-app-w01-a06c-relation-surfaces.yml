name: POSTG-APP W01-A06C Relation Surfaces

on:
  pull_request:
    branches: [ main ]
    paths:
      - "data/curriculum/application/contracts/w01-relation-surface-remediation-policy.json"
      - "src/curriculum/application/w01-relation-surface-remediation-runtime.mjs"
      - "tests/curriculum/postg-app-w01-a06c-relation-surfaces.test.js"
      - "tools/curriculum/validate-postg-app-w01-a06c-relation-surfaces.mjs"
      - "tools/governance/bootstrap-postg-app-w01-a06c-surface-fix.mjs"
      - "tools/governance/bootstrap-postg-app-w01-a06c-compare-fact-fix.mjs"
      - "data/project/milestones/POSTG-APP-W01-A06.claim.json"
      - "docs/curriculum/output/POSTG_APP_W01_A06C_RELATION_SURFACES_READY.marker"
      - ".github/workflows/postg-app-w01-a06c-relation-surfaces.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: postg-app-w01-a06c-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  relation-surfaces:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Apply bounded A06C surface fixes
        run: |
          node tools/governance/bootstrap-postg-app-w01-a06c-surface-fix.mjs
          node tools/governance/bootstrap-postg-app-w01-a06c-compare-fact-fix.mjs

      - name: Run A06C focused relation-surface tests
        id: focused_tests
        continue-on-error: true
        run: |
          mkdir -p docs/curriculum/output/postg-app
          set -o pipefail
          node --test tests/curriculum/postg-app-w01-a06c-relation-surfaces.test.js 2>&1 | tee docs/curriculum/output/postg-app/POSTG_APP_W01_A06C_FOCUSED_TEST.log

      - name: Upload A06C focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: postg-app-w01-a06c-focused-diagnostics
          path: |
            docs/curriculum/output/postg-app/POSTG_APP_W01_A06C_FOCUSED_TEST.log
            src/curriculum/application/w01-relation-surface-remediation-runtime.mjs
            tests/curriculum/postg-app-w01-a06c-relation-surfaces.test.js
            data/curriculum/application/contracts/w01-relation-surface-remediation-policy.json
          retention-days: 7

      - name: Block after A06C focused failure
        if: steps.focused_tests.outcome == 'failure'
        run: exit 1

      - name: Run deterministic A06C validator CLI
        run: node tools/curriculum/validate-postg-app-w01-a06c-relation-surfaces.mjs

      - name: Validate milestone claims
        run: npm run governance:claims

      - name: Commit bounded A06C fixes to pull request branch
        if: github.event_name == 'pull_request'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/curriculum/application/w01-relation-surface-remediation-runtime.mjs \
            tests/curriculum/postg-app-w01-a06c-relation-surfaces.test.js
          if git diff --cached --quiet; then
            echo "A06C bounded fixes already committed."
          else
            git commit -m "fix(application): align A06C prompt authority and semantic facts"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
