name: G4B-U04 R3A Paper Efficiency Smoke

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paper-efficiency-smoke:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Install browser and PDF verification dependencies
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
          python3 -m pip install --break-system-packages pypdf pillow

      - name: Run full Node test suite
        run: npm test

      - name: Generate 200-question R3A HTML
        run: node tools/curriculum/generate-g4b-u04-r3a-paper-efficiency-smoke.mjs

      - name: Verify DOM containment and print PDF
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile } from 'node:fs/promises';
          import { resolve } from 'node:path';
          import { pathToFileURL } from 'node:url';
          import { chromium } from 'playwright';

          const root = resolve('docs/curriculum/output/stress/g4b-u04-r3a');
          const manifestPath = resolve(root, 'manifest.json');
          const manifest = JSON.parse(await readFile(manifestPath, 'utf8'));
          const browser = await chromium.launch({ headless: true });
          try {
            const page = await browser.newPage({ viewport: { width: 1440, height: 1200 } });
            await page.goto(pathToFileURL(resolve(root, manifest.htmlFile)).href, { waitUntil: 'networkidle' });
            const containment = await page.evaluate(() => {
              const cells = [...document.querySelectorAll('.g4b-u04-cell')]
                .filter((node) => !node.classList.contains('g4b-u04-cell--filler'));
              const overflow = cells.filter((node) =>
                node.scrollHeight > node.clientHeight + 1 || node.scrollWidth > node.clientWidth + 1
              );
              return {
                cellCount: cells.length,
                overflowCount: overflow.length,
                firstOverflow: overflow[0]?.outerHTML.slice(0, 800) ?? null,
              };
            });
            if (containment.cellCount !== manifest.questionCount) {
              throw new Error(`R3A rendered cells ${containment.cellCount}/${manifest.questionCount}`);
            }
            if (containment.overflowCount !== 0) {
              throw new Error(`R3A DOM overflow ${containment.overflowCount}; first=${containment.firstOverflow}`);
            }
            manifest.domOverflowCount = containment.overflowCount;
            await page.emulateMedia({ media: 'print' });
            await page.pdf({
              path: resolve(root, manifest.pdfFile),
              format: 'A4',
              printBackground: true,
              preferCSSPageSize: true,
              margin: { top: '0mm', right: '0mm', bottom: '0mm', left: '0mm' },
            });
            await page.close();
          } finally {
            await browser.close();
          }
          await writeFile(manifestPath, `${JSON.stringify(manifest, null, 2)}\n`, 'utf8');
          NODE

      - name: Verify all 25 PDF pages are nonblank
        run: |
          rm -rf /tmp/g4b-u04-r3a-rendered
          mkdir -p /tmp/g4b-u04-r3a-rendered
          python3 <<'PY'
          from pathlib import Path
          from PIL import Image, ImageStat
          from pypdf import PdfReader
          import json
          import subprocess

          root = Path('docs/curriculum/output/stress/g4b-u04-r3a')
          manifest_path = root / 'manifest.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          pdf = root / manifest['pdfFile']
          subprocess.run(['pdftoppm', '-png', '-r', '110', str(pdf), '/tmp/g4b-u04-r3a-rendered/page'], check=True)
          reader = PdfReader(str(pdf))
          files = sorted(Path('/tmp/g4b-u04-r3a-rendered').glob('page-*.png'))
          expected = manifest['expectedQuestionPageCount']
          if len(reader.pages) != expected:
              raise SystemExit(f"R3A PDF page mismatch {len(reader.pages)}/{expected}")
          if len(files) != expected:
              raise SystemExit(f"R3A rendered page mismatch {len(files)}/{expected}")
          nonblank = 0
          for path in files:
              image = Image.open(path).convert('L')
              stat = ImageStat.Stat(image)
              if stat.extrema[0][0] < 245 and stat.var[0] > 5:
                  nonblank += 1
          if nonblank != expected:
              raise SystemExit(f"R3A blank page detected {nonblank}/{expected}")
          manifest['actualPdfPageCount'] = len(reader.pages)
          manifest['nonblankRenderedPageCount'] = nonblank
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Verify PDF text bounding boxes
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import re
          import subprocess

          root = Path('docs/curriculum/output/stress/g4b-u04-r3a')
          manifest_path = root / 'manifest.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          pdf = root / manifest['pdfFile']
          bbox = Path('/tmp/g4b-u04-r3a-bbox.html')
          subprocess.run(['pdftotext', '-bbox-layout', str(pdf), str(bbox)], check=True)
          text = bbox.read_text(encoding='utf-8', errors='ignore')
          page_re = re.compile(r'<page[^>]*width="([0-9.]+)"[^>]*height="([0-9.]+)"[^>]*>(.*?)</page>', re.S)
          word_re = re.compile(r'<word[^>]*xMin="([0-9.]+)"[^>]*yMin="([0-9.]+)"[^>]*xMax="([0-9.]+)"[^>]*yMax="([0-9.]+)"', re.S)
          overflow = []
          for page_index, (width, height, body) in enumerate(page_re.findall(text), 1):
              width, height = float(width), float(height)
              for coords in word_re.findall(body):
                  x0, y0, x1, y1 = map(float, coords)
                  if x0 < -0.5 or y0 < -0.5 or x1 > width + 0.5 or y1 > height + 0.5:
                      overflow.append((page_index, x0, y0, x1, y1, width, height))
          if overflow:
              raise SystemExit(f"R3A PDF bbox overflow {len(overflow)} first={overflow[0]}")
          manifest['pdfBoundingBoxOverflowCount'] = 0
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Finalize R3A manifest
        run: |
          python3 <<'PY'
          from hashlib import sha256
          from pathlib import Path
          from pypdf import PdfReader
          import json
          import unicodedata

          root = Path('docs/curriculum/output/stress/g4b-u04-r3a')
          manifest_path = root / 'manifest.json'
          manifest = json.loads(manifest_path.read_text(encoding='utf-8'))
          pdf = root / manifest['pdfFile']
          reader = PdfReader(str(pdf))
          text = ''.join(unicodedata.normalize('NFKC', page.extract_text() or '') for page in reader.pages)
          if '概數' not in text:
              raise SystemExit('R3A Traditional Chinese title missing')
          if manifest['pageReductionPercent'] < 50:
              raise SystemExit(f"R3A paper reduction below target: {manifest['pageReductionPercent']}")
          if manifest['domOverflowCount'] != 0 or manifest['pdfBoundingBoxOverflowCount'] != 0:
              raise SystemExit('R3A containment failure')
          if manifest['validationErrorCount'] != 0 or manifest['duplicatePromptCount'] != 0:
              raise SystemExit('R3A validation or duplicate failure')
          pdf_bytes = pdf.read_bytes()
          manifest['pdfSha256'] = sha256(pdf_bytes).hexdigest()
          manifest['pdfBytes'] = len(pdf_bytes)
          manifest['status'] = 'paper_efficiency_html_pdf_pass'
          manifest['visualRenderVerification'] = '25_nonblank_pages_bbox_contained'
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY

      - name: Upload R3A paper-efficiency bundle
        uses: actions/upload-artifact@v4
        with:
          name: g4b-u04-r3a-paper-efficiency
          if-no-files-found: error
          retention-days: 30
          path: |
            docs/curriculum/output/stress/g4b-u04-r3a/*.html
            docs/curriculum/output/stress/g4b-u04-r3a/*.pdf
            docs/curriculum/output/stress/g4b-u04-r3a/manifest.json
            /tmp/g4b-u04-r3a-rendered/*.png
