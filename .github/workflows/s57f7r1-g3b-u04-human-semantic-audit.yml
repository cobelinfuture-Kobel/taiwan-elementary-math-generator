name: S57F7R1 G3B-U04 Human Semantic Audit

on:
  push:
    branches:
      - s57f7r1-g3b-u04-human-semantic-readback-fullfix
    paths:
      - tools/curriculum/generate-s57f7r1-g3b-u04-human-semantic-audit.mjs
      - .github/workflows/s57f7r1-g3b-u04-human-semantic-audit.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-audit:
    if: github.event_name != 'pull_request' || github.head_ref == 's57f7r1-g3b-u04-human-semantic-readback-fullfix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: s57f7r1-g3b-u04-human-semantic-readback-fullfix

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Generate 117-variant semantic audit
        run: node tools/curriculum/generate-s57f7r1-g3b-u04-human-semantic-audit.mjs

      - name: Upload semantic audit
        uses: actions/upload-artifact@v4
        with:
          name: s57f7r1-g3b-u04-human-semantic-audit
          path: docs/curriculum/output/audit/S57F7R1_G3B_U04_HumanSemanticAudit.json
          if-no-files-found: error
          retention-days: 7
