name: GCTX-P14 Debug E6 Validation

on:
  pull_request:
    branches: [ main ]
    paths:
      - ".github/workflows/gctx-p14-debug-e6-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  debug-e6-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Install Chromium runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.51.1
          npx playwright install --with-deps chromium

      - name: Generate exact live evidence
        run: node tools/curriculum/run-gctx-p14-live-public-ui-regression.mjs

      - name: Promote E6 files in runner
        run: node tools/governance/promote-gctx-p14-e6-d0-claim.mjs

      - name: Validate Claim schema and hashes
        id: claims
        continue-on-error: true
        run: npm run governance:claims 2>&1 | tee /tmp/GCTX_P14_CLAIMS.log

      - name: Validate inline artifact identity
        id: inline
        continue-on-error: true
        env:
          LIVE_EVIDENCE_DIR: docs/curriculum/output/gctx/p14-live
        run: |
          node - <<'NODE' 2>&1 | tee /tmp/GCTX_P14_INLINE.log
          const crypto = require('node:crypto');
          const fs = require('node:fs');
          const path = require('node:path');
          const liveDir = process.env.LIVE_EVIDENCE_DIR;
          const livePath = path.join(liveDir, 'GCTX_P14_LIVE_PUBLIC_UI.json');
          const previewHtmlPath = path.join(liveDir, 'GCTX_P14_LIVE_PUBLIC_PREVIEW.html');
          const pageScreenshotPath = path.join(liveDir, 'GCTX_P14_LIVE_PUBLIC_UI.png');
          const previewScreenshotPath = path.join(liveDir, 'GCTX_P14_LIVE_PUBLIC_PREVIEW.png');
          const live = JSON.parse(fs.readFileSync(livePath, 'utf8'));
          const claim = JSON.parse(fs.readFileSync('data/project/milestones/GCTX-P14.claim.json', 'utf8'));
          const sha = (file) => crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex');
          const failures = [];
          const check = (condition, label, actual) => { if (!condition) failures.push({ label, actual }); };
          check(live.status === 'live_public_ui_production_regression_pass', 'live.status', live.status);
          check(live.evidenceLevel === 'E6_D0_COMPLETE', 'live.evidenceLevel', live.evidenceLevel);
          check(live.deployedAssetIdentityVerified === true, 'deployedAssetIdentityVerified', live.deployedAssetIdentityVerified);
          check(live.output.questionCount === 25, 'questionCount', live.output.questionCount);
          check(live.output.answerCount === 25, 'answerCount', live.output.answerCount);
          check(live.output.questionPageCount === 4, 'questionPageCount', live.output.questionPageCount);
          check(live.output.answerPageCount === 4, 'answerPageCount', live.output.answerPageCount);
          check(live.output.targetQuestionCount === 5, 'targetQuestionCount', live.output.targetQuestionCount);
          check(live.output.targetAnswerCount === 5, 'targetAnswerCount', live.output.targetAnswerCount);
          check(live.output.uniqueRequiredPhraseCount === 5, 'uniqueRequiredPhraseCount', live.output.uniqueRequiredPhraseCount);
          check(live.output.targetAnswersWithEquationAndAnswer === 5, 'targetAnswersWithEquationAndAnswer', live.output.targetAnswersWithEquationAndAnswer);
          check(live.output.missingRequiredPhrases.length === 0, 'missingRequiredPhrases', live.output.missingRequiredPhrases);
          check(live.output.leakedLegacyTargetPhrases.length === 0, 'leakedLegacyTargetPhrases', live.output.leakedLegacyTargetPhrases);
          check(live.output.internalIdLeakage.length === 0, 'internalIdLeakage', live.output.internalIdLeakage);
          check(live.consoleErrors.length === 0, 'consoleErrors', live.consoleErrors);
          check(live.pageErrors.length === 0, 'pageErrors', live.pageErrors);
          check(live.requestFailures.length === 0, 'requestFailures', live.requestFailures);
          check(live.forbiddenQueryKeys.length === 0, 'forbiddenQueryKeys', live.forbiddenQueryKeys);
          check(live.pageScreenshotSha256 === sha(pageScreenshotPath), 'pageScreenshotSha256', { expected: live.pageScreenshotSha256, actual: sha(pageScreenshotPath) });
          check(live.previewScreenshotSha256 === sha(previewScreenshotPath), 'previewScreenshotSha256', { expected: live.previewScreenshotSha256, actual: sha(previewScreenshotPath) });
          check(live.previewHtmlSha256 === sha(previewHtmlPath), 'previewHtmlSha256', { expected: live.previewHtmlSha256, actual: sha(previewHtmlPath) });
          check(claim.actualEvidenceLevel === 'E6_D0_COMPLETE', 'claim.actualEvidenceLevel', claim.actualEvidenceLevel);
          check(claim.claims.productionAdmitted === true, 'claim.productionAdmitted', claim.claims.productionAdmitted);
          check(claim.claims.d0Complete === true, 'claim.d0Complete', claim.claims.d0Complete);
          check(claim.distance.after === 'D0', 'claim.distance.after', claim.distance.after);
          console.log(JSON.stringify({ ok: failures.length === 0, failures }, null, 2));
          if (failures.length) process.exit(1);
          NODE

      - name: Upload exact validation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gctx-p14-e6-validation-diagnostics
          path: |
            /tmp/GCTX_P14_CLAIMS.log
            /tmp/GCTX_P14_INLINE.log
            data/project/milestones/GCTX-P14.claim.json
            data/curriculum/contracts/GCTX_P14_G3BU04LivePublicUIProductionRegressionAndD0Closeout.json
            docs/curriculum/output/GCTX_P14_G3BU04_LIVE_PUBLIC_UI_D0_PASS.marker
            docs/curriculum/output/GCTX_P14_G3BU04_LIVE_PUBLIC_UI_D0_READBACK.md
            docs/curriculum/output/gctx/p14-live
          retention-days: 7

      - name: Fail if either validation failed
        if: steps.claims.outcome != 'success' || steps.inline.outcome != 'success'
        run: exit 1
