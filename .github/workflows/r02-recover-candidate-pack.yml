name: R02 Recover Candidate Pack

on:
  pull_request:
    branches: [main]
    paths:
      - "data/curriculum/global/candidates/r02/**"
      - "tools/curriculum/recover-r02-reviewed-pack.mjs"
      - ".github/workflows/r02-recover-candidate-pack.yml"

permissions:
  contents: read

jobs:
  recover:
    if: github.head_ref == 'curriculum/global-kp-rebase-r02'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Recover and verify R02 candidate pack
        run: node tools/curriculum/recover-r02-reviewed-pack.mjs
      - name: Upload recovered R02 candidate pack
        uses: actions/upload-artifact@v4
        with:
          name: r02-recovered-reviewed-source-candidate-pack
          path: tmp/r02-recovered-reviewed-source-candidate-pack.json
          if-no-files-found: error
          retention-days: 7
