name: G5A-U02 Pre-S104 Focused Readback

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/curriculum/g5a-u02/**"
      - "site/modules/curriculum/batch-a/g5a-u02-global-layout-projection.js"
      - "site/modules/renderer/g5a-u02-s101-public-renderer.js"
      - "site/modules/renderer/html-renderer-s73-extension.js"
      - "tests/curriculum/g5a-u02-pre-s104-public-semantic-regeneration.test.js"
      - ".github/workflows/g5a-u02-pre-s104-focused-readback.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  focused-readback:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-package-lock
      - name: Run focused acceptance and preserve exact output
        shell: bash
        run: |
          set +e
          node --test tests/curriculum/g5a-u02-pre-s104-public-semantic-regeneration.test.js > /tmp/g5a-u02-pre-s104-focused.log 2>&1
          status=$?
          cat /tmp/g5a-u02-pre-s104-focused.log
          exit "$status"
      - name: Upload focused readback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-pre-s104-focused-readback
          retention-days: 7
          if-no-files-found: error
          path: /tmp/g5a-u02-pre-s104-focused.log
