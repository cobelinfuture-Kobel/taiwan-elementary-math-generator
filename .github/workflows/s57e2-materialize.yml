name: S57E2 G3B-U04 Materialize

on:
  push:
    branches:
      - s57e2-g3b-u04-scenario-role-registry
    paths:
      - tools/curriculum/materialize-s57e2-g3b-u04-scenarios.mjs
      - .github/workflows/s57e2-materialize.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: s57e2-g3b-u04-scenario-role-registry
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Materialize S57E2 scenario and role registry
        run: node tools/curriculum/materialize-s57e2-g3b-u04-scenarios.mjs

      - name: Run full test suite
        run: npm test

      - name: Verify generated scope
        run: |
          test -f data/curriculum/scenarios/S57E2_G3B_U04_SemanticScenarioRoleRegistry.json
          test -f site/modules/curriculum/batch-a/g3b-u04-semantic-scenarios.js
          test -f tests/curriculum/g3b-u04-semantic-scenarios.test.js
          git status --short

      - name: Commit generated artifacts and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/curriculum/scenarios/S57E2_G3B_U04_SemanticScenarioRoleRegistry.json
          git add site/modules/curriculum/batch-a/g3b-u04-semantic-scenarios.js
          git add tests/curriculum/g3b-u04-semantic-scenarios.test.js
          git rm .github/workflows/s57e2-materialize.yml
          git commit -m "data(g3b-u04): materialize S57E2 semantic scenario registry"
          git push origin HEAD:s57e2-g3b-u04-scenario-role-registry

