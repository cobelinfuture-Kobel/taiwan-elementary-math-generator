name: Node Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: node-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Upload 15-unit public worksheet closeout report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fifteen-unit-public-worksheet-closeout-report
          path: tmp/15-unit-public-worksheet-closeout-report.json
          if-no-files-found: warn
          retention-days: 30
