name: Node Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: node-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Install Chromium for 15-unit closeout
        if: github.event_name == 'pull_request' && github.head_ref == 'closeout/15-unit-public-worksheet-v1'
        run: |
          npm install --no-save --package-lock=false playwright@1.51.1
          npx playwright install --with-deps chromium
      - name: Run 15-unit Chromium PDF and live UI acceptance
        if: github.event_name == 'pull_request' && github.head_ref == 'closeout/15-unit-public-worksheet-v1'
        run: node tools/curriculum/render-15-unit-public-worksheet-pdf-smoke.mjs
      - name: Upload 15-unit public worksheet closeout report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fifteen-unit-public-worksheet-closeout-report
          path: tmp/15-unit-public-worksheet-closeout-report.json
          if-no-files-found: warn
          retention-days: 30
      - name: Upload 15-unit Chromium acceptance artifacts
        if: always() && github.event_name == 'pull_request' && github.head_ref == 'closeout/15-unit-public-worksheet-v1'
        uses: actions/upload-artifact@v4
        with:
          name: fifteen-unit-public-worksheet-chromium-acceptance
          path: tmp/15-unit-public-worksheet-pdf-smoke
          if-no-files-found: warn
          retention-days: 30
