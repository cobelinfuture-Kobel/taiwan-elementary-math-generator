name: Node Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: |
          mkdir -p build/reports
          set +e
          npm test 2>&1 | tee build/reports/NODE_TEST_FULL.log
          STATUS=${PIPESTATUS[0]}
          exit "$STATUS"

      - name: Upload Node test diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-full-log
          path: build/reports/NODE_TEST_FULL.log
          if-no-files-found: error
