name: Compact S58E G3B U08 Audit

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: compact-s58e-g3b-u08-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  compact:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Generate compact readback evidence
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { mkdirSync, readFileSync, writeFileSync } from "node:fs";
          const path = "data/curriculum/validation/S58E_G3B_U08_HumanSemanticReadbackAudit.json";
          const audit = JSON.parse(readFileSync(path, "utf8"));
          if (audit.records.length !== 72) throw new Error(`Expected 72 records, got ${audit.records.length}`);
          const lines = [
            "record\tknowledgePointId\ttemplateFamilyId\tcontextVariantId\tpromptText\tequationModel\tanswerText"
          ];
          for (const record of audit.records) {
            const fields = [
              record.recordNumber,
              record.knowledgePointId,
              record.templateFamilyId,
              record.contextVariantId,
              record.promptText,
              record.equationModel,
              record.answerText
            ].map((value) => String(value).replaceAll("\t", " ").replaceAll("\n", " "));
            lines.push(fields.join("\t"));
          }
          mkdirSync("docs/curriculum/output", { recursive: true });
          writeFileSync(
            "docs/curriculum/output/S58E_G3B_U08_HUMAN_READBACK_COMPACT.tsv",
            `${lines.join("\n")}\n`,
            "utf8"
          );
          NODE
          test -s docs/curriculum/output/S58E_G3B_U08_HUMAN_READBACK_COMPACT.tsv
          test "$(wc -l < docs/curriculum/output/S58E_G3B_U08_HUMAN_READBACK_COMPACT.tsv)" -eq 73
          git diff --check

      - name: Remove one-shot workflow
        run: rm .github/workflows/compact-s58e-g3b-u08-audit.yml

      - name: Commit compact evidence
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/curriculum/output/S58E_G3B_U08_HUMAN_READBACK_COMPACT.tsv \
                  .github/workflows/compact-s58e-g3b-u08-audit.yml
          git commit -m "docs(g3b-u08): add compact S58E human-readback evidence [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
