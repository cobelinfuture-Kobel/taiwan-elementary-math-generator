name: R05 Finalize Delivery Wave Payload

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'data/project/staging/r05/**'
      - '.github/workflows/r05-finalize-delivery-wave.yml'

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 1
          show-progress: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Materialize and verify R05 artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/r05
          cat data/project/staging/r05/payload-*.b64 > /tmp/r05/payload.b64
          base64 --decode /tmp/r05/payload.b64 > /tmp/r05/payload.tar.gz
          echo '0dcaed4fe7c2c490a8f543b5ada116ef969ff73c9420bb60660e0c22bc8fcd73  /tmp/r05/payload.tar.gz' | sha256sum --check --strict
          tar -xzf /tmp/r05/payload.tar.gz -C .
          python - <<'PY'
          from pathlib import Path

          def replace_exact(path, old, new):
              p = Path(path)
              text = p.read_text()
              if old not in text:
                  raise SystemExit(f"R05_FINALIZER_EXPECTED_TEXT_MISSING:{path}")
              p.write_text(text.replace(old, new))

          replace_exact(
              'src/curriculum/global/r05-delivery-wave-rebase.mjs',
              '    prerequisiteEscalatedKnowledgePointCount: assignments.filter((row) => row.waveEscalatedByPrerequisite).length,\n    waveMetrics: freezeArray(normalizedWaveMetrics),',
              '    prerequisiteEscalatedKnowledgePointCount: assignments.filter((row) => row.waveEscalatedByPrerequisite).length,\n    protectedGlobalModelReconciliationCount: assignments.filter((row) => (\n      row.productionAdmissionState === "PROTECTED_EXISTING_D0"\n      && row.protectedPrerequisiteCapabilityContradictionIds.length > 0\n    )).length,\n    waveMetrics: freezeArray(normalizedWaveMetrics),',
          )
          replace_exact(
              'tools/curriculum/validate-r05-delivery-wave-rebase.mjs',
              '      if (row.protectedPrerequisiteCapabilityContradictionIds.length > 0) errors.push(finding("R05_PROTECTED_D0_PREREQUISITE_CAPABILITY_CONTRADICTION", { knowledgePointId: row.knowledgePointId, capabilityIds: row.protectedPrerequisiteCapabilityContradictionIds }));',
              '      if (row.protectedPrerequisiteCapabilityContradictionIds.length > 0) warnings.push(finding("R05_PROTECTED_D0_GLOBAL_MODEL_RECONCILIATION_REQUIRED", { knowledgePointId: row.knowledgePointId, capabilityIds: row.protectedPrerequisiteCapabilityContradictionIds, nextTask: "R06_LegacyCompatibilityMigration" }));',
          )
          replace_exact(
              'tools/curriculum/validate-r05-delivery-wave-rebase.mjs',
              '      prerequisiteEscalatedKnowledgePointCount: plan.metrics.prerequisiteEscalatedKnowledgePointCount,\n      waveMetrics: plan.metrics.waveMetrics,',
              '      prerequisiteEscalatedKnowledgePointCount: plan.metrics.prerequisiteEscalatedKnowledgePointCount,\n      protectedGlobalModelReconciliationCount: plan.metrics.protectedGlobalModelReconciliationCount,\n      waveMetrics: plan.metrics.waveMetrics,',
          )
          replace_exact(
              'tests/curriculum/r05-delivery-wave-rebase.test.js',
              '  assert.ok(protectedRows.every((row) => row.protectedPrerequisiteCapabilityContradictionIds.length === 0));',
              '  const reconciliationRows = protectedRows.filter((row) => row.protectedPrerequisiteCapabilityContradictionIds.length > 0);\n  assert.ok(reconciliationRows.length > 0);\n  assert.equal(plan.metrics.protectedGlobalModelReconciliationCount, reconciliationRows.length);\n  assert.ok(reconciliationRows.every((row) => row.r06CompatibilityMigrationRequired === true));',
          )
          replace_exact(
              'tests/curriculum/r05-delivery-wave-rebase.test.js',
              '  assert.equal(sameUnit.deliveryWaveId, "R05-W2");',
              '  assert.equal(sameUnit.baseDeliveryWaveId, "R05-W2");\n  assert.equal(sameUnit.deliveryWaveId, "R05-W4");\n  assert.equal(sameUnit.waveEscalatedByPrerequisite, true);',
          )
          replace_exact(
              'tests/curriculum/r05-delivery-wave-rebase.test.js',
              '    row.primaryRuntimeProfileId === "profile_decimal"\n    && row.contractOnlyRequiredCapabilityIds.includes("cap_decimal_number_system")',
              '    row.productionAdmissionState === "PLANNED_NOT_ADMITTED"\n    && row.primaryRuntimeProfileId === "profile_decimal"\n    && row.contractOnlyRequiredCapabilityIds.includes("cap_decimal_number_system")',
          )
          replace_exact(
              'tests/curriculum/r05-delivery-wave-rebase.test.js',
              '    row.primaryRuntimeProfileId === "profile_fraction"\n    && row.contractOnlyRequiredCapabilityIds.includes("cap_fraction_number_system")',
              '    row.productionAdmissionState === "PLANNED_NOT_ADMITTED"\n    && row.primaryRuntimeProfileId === "profile_fraction"\n    && row.contractOnlyRequiredCapabilityIds.includes("cap_fraction_number_system")',
          )
          replace_exact(
              'docs/curriculum/contracts/GLOBAL_DELIVERY_WAVE_REBASE_CONTRACT_V1.md',
              'R05 does not rebuild, demote, hide, or replace these units. It only marks their canonical KnowledgePoints for R06 compatibility migration.',
              'R05 does not rebuild, demote, hide, or replace these units. It marks their canonical KnowledgePoints for R06 compatibility migration. If the new Global prerequisite/capability model demands contract-only facilities that were not required by the proven legacy D0 path, R05 records a reconciliation requirement instead of invalidating the product baseline.',
          )
          replace_exact(
              'docs/curriculum/contracts/GLOBAL_DELIVERY_WAVE_REBASE_CONTRACT_V1.md',
              '```text\nkp_mass_times_integer\n→ shadow quantity identity and same-unit arithmetic\n→ R05-W2\n\nkp_mass_mixed_unit_add_sub\n→ contract-only conversion and mixed-unit normalization\n→ R05-W4\n```\n\nThis preserves the distinction established in R04: same-unit arithmetic is not blocked by the complete conversion subsystem.',
              '```text\nkp_mass_times_integer\n→ capability-only base wave R05-W2\n→ current R03 prerequisite lower bound raises final delivery to R05-W4\n→ contractOnlyRequiredCapabilityIds remains empty\n\nkp_mass_mixed_unit_add_sub\n→ contract-only conversion and mixed-unit normalization\n→ base and final delivery R05-W4\n```\n\nThis preserves the R04 capability distinction while obeying the current R03 graph. R05 records prerequisite escalation explicitly; it does not silently mutate R03 edges.',
          )
          replace_exact(
              'docs/curriculum/output/GCKG_R05_DELIVERY_WAVE_REBASE_READBACK.md',
              'The executable runtime and validator emit the authoritative per-wave counts. The sum of all wave assignments must remain 482.',
              'The executable runtime and validator emit the authoritative per-wave counts. The sum of all wave assignments must remain 482. Existing D0 rows whose legacy runtime proof is narrower than the new Global model are retained in W0 and counted as R06 reconciliation requirements rather than product failures.',
          )
          replace_exact(
              'docs/curriculum/output/GCKG_R05_DELIVERY_WAVE_REBASE_READBACK.md',
              'W2 shadow authority and same-unit/shared semantic hardening',
              'W2 shadow authority and shared semantic hardening (base wave; prerequisite escalation may move a KP later)',
          )
          replace_exact(
              'docs/curriculum/output/GCKG_R05_DELIVERY_WAVE_REBASE_READBACK.md',
              '15_UNITS_PUBLIC_OUTPUT_CHANGE_EXPECTED = false\n```',
              '15_UNITS_PUBLIC_OUTPUT_CHANGE_EXPECTED = false\nGLOBAL_MODEL_DIFFERENCES              = recorded for R06, not treated as D0 demotion\n```',
          )
          PY
          node --check src/curriculum/global/r05-delivery-wave-rebase.mjs
          node --check tools/curriculum/validate-r05-delivery-wave-rebase.mjs
          node --check tests/curriculum/r05-delivery-wave-rebase.test.js
          set +e
          node --test tests/curriculum/r05-delivery-wave-rebase.test.js > /tmp/r05/focused.log 2>&1
          focused_status=$?
          set -e
          tail -n 180 /tmp/r05/focused.log
          if [ "$focused_status" -ne 0 ]; then exit "$focused_status"; fi
          node tools/curriculum/validate-r05-delivery-wave-rebase.mjs > /tmp/r05/validator.json
          node -e 'const r=require("/tmp/r05/validator.json"); if(!r.ok){console.error(JSON.stringify(r.errors,null,2)); process.exit(1)}; console.log("R05_VALIDATOR_SUMMARY="+JSON.stringify(r.summary))'

      - name: Upload R05 focused diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: r05-delivery-wave-focused-diagnostics
          path: |
            /tmp/r05/focused.log
            /tmp/r05/validator.json
          if-no-files-found: warn

      - name: Commit finalized R05 artifacts
        shell: bash
        run: |
          set -euo pipefail
          rm -rf data/project/staging/r05
          rm -f .github/workflows/r05-finalize-delivery-wave.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'feat(curriculum): materialize R05 capability delivery waves'
          git push origin HEAD:${{ github.head_ref }}
