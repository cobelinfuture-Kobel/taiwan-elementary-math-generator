name: POSTG-APP W02-A07 E4 Promotion

on:
  pull_request:
    branches: [ main ]
    paths:
      - "tools/governance/promote-postg-app-w02-a07-e4-state.py"
      - "tools/governance/promote-postg-app-w02-a07-e4-controller.py"
      - ".github/workflows/postg-app-w02-a07-e4-promotion.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: postg-app-w02-a07-e4-promotion-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  promote-e4:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.number == 339
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout final A07 branch
        uses: actions/checkout@v4
        with:
          ref: postg-app-w02-a07-e4
          fetch-depth: 0
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with: { node-version: 20 }

      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install project dependencies
        run: npm install --silent

      - name: Verify A07 context-lineage runtime before artifact generation
        run: |
          python -m py_compile \
            tools/governance/promote-postg-app-w02-a07-e4-state.py \
            tools/governance/promote-postg-app-w02-a07-e4-controller.py
          node --test tests/curriculum/postg-app-w02-a07-human-review-package.test.js
          node tools/curriculum/validate-postg-app-w02-a07-human-review-package.mjs
          node --test tests/curriculum/postg-app-w02-a06-production-equivalent-html-pdf.test.js
          node tools/curriculum/validate-postg-app-w02-a06-production-equivalent-html-pdf.mjs

      - name: Install Chromium and PDF verification dependencies
        run: |
          npm install --silent --no-save playwright@1.55.0
          npx playwright install --with-deps chromium >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk poppler-utils >/dev/null
          python -m pip install --quiet pypdf pillow

      - name: Regenerate exact A06 and A07 production-equivalent evidence
        run: |
          node tools/curriculum/generate-postg-app-w02-a06-artifacts.mjs
          node tools/curriculum/render-postg-app-w02-a06-pdf.mjs
          node tools/curriculum/finalize-postg-app-w02-a06-artifacts.mjs > w02-a06-final-manifest.json
          python tools/curriculum/verify-postg-app-w02-a06-pdf.py
          node tools/curriculum/generate-postg-app-w02-a07-review-artifacts.mjs > w02-a07-generation.json

      - name: Promote hash-locked evidence, claim and controller
        run: |
          python tools/governance/promote-postg-app-w02-a07-e4-state.py
          python tools/governance/promote-postg-app-w02-a07-e4-controller.py

      - name: Verify promoted A07 package
        run: |
          node --test tests/curriculum/postg-app-w02-a07-human-review-package.test.js
          node tools/curriculum/validate-postg-app-w02-a07-human-review-package.mjs

      - name: Verify inherited A06 package
        run: |
          node --test tests/curriculum/postg-app-w02-a06-production-equivalent-html-pdf.test.js
          node tools/curriculum/validate-postg-app-w02-a06-production-equivalent-html-pdf.mjs

      - name: Verify promoted master controller
        run: |
          node --test tests/curriculum/postg-app-m00-master-controller.test.js
          node tools/curriculum/validate-postg-app-m00-master-controller.mjs

      - name: Verify milestone claim governance
        run: npm run governance:claims

      - name: Run full regression suite with diagnostic tail
        run: |
          set +e
          npm test > w02-a07-full-regression.log 2>&1
          status=$?
          echo "FULL_REGRESSION_STATUS=${status}"
          tail -n 500 w02-a07-full-regression.log
          exit "${status}"

      - name: Upload full regression diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: w02-a07-full-regression-diagnostics
          path: w02-a07-full-regression.log
          if-no-files-found: error
          retention-days: 30

      - name: Remove one-shot workflow and commit exact promotion
        run: |
          rm .github/workflows/postg-app-w02-a07-e4-promotion.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            docs/curriculum/output/postg-app/w02-a06 \
            docs/curriculum/output/postg-app/w02-a07 \
            data/project/milestones/POSTG-APP-W02-A07.claim.json \
            data/curriculum/application/reviews/POSTG-APP-W02-A07_ProductionEquivalentHTMLPDFHumanReviewPackage.json \
            data/curriculum/application/controller/postg-app-master-controller-state.json \
            src/curriculum/application/postg-app-master-controller.mjs \
            tests/curriculum/postg-app-m00-master-controller.test.js \
            docs/curriculum/output/POSTG_APP_W02_A07_E4_HUMAN_REVIEW_READY.marker \
            docs/curriculum/output/POSTG_APP_W02_A07_E4_READBACK.md \
            docs/curriculum/output/POSTG_APP_W02_A07_GATE_MATRIX.md \
            docs/curriculum/output/POSTG_APP_W02_A07_NEXT_SHORT_STEP.marker \
            .github/workflows/postg-app-w02-a07-e4-promotion.yml
          git diff --cached --check
          git diff --cached --quiet && { echo "No promotion changes produced"; exit 1; }
          git commit -m "feat(application): promote W02 A07 human review package to E4"
          git push origin HEAD:postg-app-w02-a07-e4
