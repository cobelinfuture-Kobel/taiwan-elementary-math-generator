name: POSTG-APP W02-A02 Candidate Pack

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postg-app-w02-a02-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  candidate-pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: npm install
      - name: Validate W02 A02 schema document
        run: |
          python -m pip install jsonschema
          python - <<'PY'
          import json
          from jsonschema import Draft202012Validator

          path = 'data/curriculum/application/schema/w02-atomic-context-single-application-candidate.schema.json'
          with open(path, encoding='utf-8') as handle:
              schema = json.load(handle)
          Draft202012Validator.check_schema(schema)
          PY
      - name: Run W02 A02 focused tests and validator
        run: |
          node --test tests/curriculum/postg-app-w02-a02-candidate-pack.test.js
          node tools/curriculum/validate-postg-app-w02-a02-candidate-pack.mjs
      - name: Verify A01D and controller regressions
        run: |
          node --test tests/curriculum/postg-app-w02-a01d-hidden-pattern-specs.test.js
          node tools/curriculum/validate-postg-app-w02-a01d-hidden-pattern-specs.mjs
          node --test tests/curriculum/postg-app-m00-master-controller.test.js
          node tools/curriculum/validate-postg-app-m00-master-controller.mjs
          npm run governance:claims
      - name: Run full regression suite
        run: npm test
