name: GLM-S07 G4A-U08 Failing Seed Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/glm-s07-g4a-u08-seed-diagnostic.yml
      - tools/curriculum/diagnose-glm-s07-g4a-u08-seed.mjs
      - site/assets/browser/state/**
      - site/assets/browser/pipeline/**
      - site/modules/curriculum/batch-a/**
      - site/modules/curriculum/registry/**
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Capture failing-seed generation authority
        run: node tools/curriculum/diagnose-glm-s07-g4a-u08-seed.mjs

      - name: Upload diagnostic authority
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glm-s07-g4a-u08-seed-diagnostic
          if-no-files-found: error
          retention-days: 7
          path: docs/curriculum/output/glm-s07-g4a-u08-seed-diagnostic/current.json
