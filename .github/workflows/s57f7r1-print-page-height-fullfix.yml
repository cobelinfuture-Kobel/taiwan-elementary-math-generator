name: S57F7R1 Print Page Height FullFix

on:
  push:
    branches:
      - s57f7r1-g3b-u04-human-semantic-readback-fullfix
    paths:
      - .github/workflows/s57f7r1-print-page-height-fullfix.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-commit:
    if: github.event_name != 'pull_request' || github.head_ref == 's57f7r1-g3b-u04-human-semantic-readback-fullfix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: s57f7r1-g3b-u04-human-semantic-readback-fullfix
          fetch-depth: 0
      - name: Add print rounding safety height
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('site/assets/styles/print-styles.css')
          text = path.read_text(encoding='utf-8')
          old = 'width: var(--worksheet-page-width);\n    min-height: var(--worksheet-page-min-height);\n    margin: 0;'
          new = 'width: var(--worksheet-page-width);\n    height: 296mm;\n    min-height: 296mm;\n    max-height: 296mm;\n    overflow: hidden;\n    margin: 0;'
          if text.count(old) != 1:
              raise SystemExit(f'Expected print worksheet-page sequence count=1, actual={text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          git diff --check
      - name: Commit patch and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+users.noreply.github.com"
          git add site/assets/styles/print-styles.css
          git rm .github/workflows/s57f7r1-print-page-height-fullfix.yml
          git commit -m "fix(print): add A4 rounding safety height"
          git push origin HEAD:s57f7r1-g3b-u04-human-semantic-readback-fullfix
