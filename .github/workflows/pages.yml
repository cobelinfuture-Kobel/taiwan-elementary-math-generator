name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stage G3B-U04 Human Review artifacts
        run: node tools/governance/publish-gctx-p12s-pages-review-artifacts.mjs --output-dir site/review/g3b-u04

      - name: Verify staged Human Review PDF identity
        run: |
          test -s site/review/g3b-u04/index.html
          test -s site/review/g3b-u04/GCTX_P12R_G3BU04_AFTER.pdf
          test -s site/review/g3b-u04/review-publication-manifest.json
          node - <<'NODE'
          const fs = require('node:fs');
          const crypto = require('node:crypto');
          const publication = JSON.parse(fs.readFileSync('site/review/g3b-u04/review-publication-manifest.json', 'utf8'));
          const pdf = fs.readFileSync('site/review/g3b-u04/GCTX_P12R_G3BU04_AFTER.pdf');
          const pdfHash = crypto.createHash('sha256').update(pdf).digest('hex');
          if (publication.reviewOnly !== true
            || publication.productionAdmitted !== false
            || publication.publicGeneratorChanged !== false
            || publication.files[0].sha256 !== pdfHash
            || pdfHash !== '777ac95e2bd138895dda1822de58d0c9f52571513e63ff74d14687de6875e0f0') {
            process.exit(1);
          }
          NODE

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
