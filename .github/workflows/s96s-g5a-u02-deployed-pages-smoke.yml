name: S96S G5A-U02 Deployed GitHub Pages Smoke

on:
  workflow_run:
    workflows:
      - Deploy GitHub Pages
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

env:
  S96S_SITE_URL: https://cobelinfuture-kobel.github.io/taiwan-elementary-math-generator/index.html

jobs:
  deployed-pages-smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.actor.login != 'github-actions[bot]')
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout deployed main test harness
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install browser dependencies
        run: |
          npm install --no-package-lock
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Resolve deployment SHA
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "S96S_DEPLOYMENT_SHA=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "S96S_DEPLOYMENT_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Wait for deployed URL
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              "${S96S_SITE_URL}?deployment=${S96S_DEPLOYMENT_SHA}-${attempt}" > /tmp/s96s-index.html; then
              test -s /tmp/s96s-index.html
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Run deployed production click generate preview print smoke
        run: node tools/curriculum/run-s96s-g5a-u02-deployed-pages-smoke.mjs

      - name: Write deployed smoke authority
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFile, writeFile, mkdir } from 'node:fs/promises';
          const manifest = JSON.parse(await readFile('docs/curriculum/output/stress/s96s-deployed-pages/manifest.json', 'utf8'));
          const authority = {
            schemaVersion: 's96s-deployed-pages-smoke-v1',
            ...manifest,
            workflow: process.env.GITHUB_WORKFLOW,
            run: {
              id: process.env.GITHUB_RUN_ID,
              number: process.env.GITHUB_RUN_NUMBER,
              attempt: process.env.GITHUB_RUN_ATTEMPT,
              url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            },
            repository: process.env.GITHUB_REPOSITORY,
            ref: process.env.GITHUB_REF,
            verifiedAt: new Date().toISOString(),
          };
          await mkdir('docs/ci', { recursive: true });
          await writeFile('docs/ci/latest-s96s-deployed-pages-smoke.json', `${JSON.stringify(authority, null, 2)}\n`, 'utf8');
          NODE

      - name: Commit deployed smoke authority
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ci/latest-s96s-deployed-pages-smoke.json
          git commit -m "ci: record S96S deployed Pages smoke [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload deployed smoke authority
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s96s-g5a-u02-deployed-pages-smoke
          if-no-files-found: warn
          retention-days: 30
          path: |
            docs/curriculum/output/stress/s96s-deployed-pages/manifest.json
            docs/ci/latest-s96s-deployed-pages-smoke.json
            /tmp/s96s-index.html
