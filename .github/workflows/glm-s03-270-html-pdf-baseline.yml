name: GLM-S03 270-Scenario HTML PDF Baseline

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/glm-s03-270-html-pdf-baseline.yml
      - data/curriculum/contracts/GLM_S00_PublicCompletedUnit18LayoutContract.json
      - docs/curriculum/output/GLM_S01_CURRENT_15_UNIT_LAYOUT_BEHAVIOR_BASELINE.json
      - docs/curriculum/output/GLM_S02_UNIT_RENDERER_WORST_CASE_BASELINE.json
      - docs/curriculum/output/smoke/S93_G5A_U02_HiddenWorksheet.html
      - site/assets/styles/print-styles.css
      - site/assets/browser/state/**
      - site/assets/browser/pipeline/**
      - site/modules/curriculum/batch-a/**
      - site/modules/curriculum/batch-b/**
      - site/modules/curriculum/registry/**
      - site/modules/renderer/**
      - tools/curriculum/glm-s03-scenario-plan.mjs
      - tools/curriculum/run-glm-s03-html-pdf-shard.mjs
      - tools/curriculum/inspect-glm-s03-pdfs.py
      - tools/curriculum/aggregate-glm-s03-html-pdf-baseline.mjs
      - tests/curriculum/glm-s03-270-html-pdf-baseline-contract.test.js
      - docs/curriculum/architecture/GLM_S03_270ScenarioHTMLPDFBaseline.md
      - docs/curriculum/output/GLM_S03_270_HTML_PDF_BASELINE_PENDING.marker
  workflow_dispatch:

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm install

      - name: Validate GLM-S03 scenario contract
        run: |
          node --test tests/curriculum/glm-s00-public-completed-unit-18-layout-contract.test.js
          node --test tests/curriculum/glm-s03-270-html-pdf-baseline-contract.test.js
          python3 -m py_compile tools/curriculum/inspect-glm-s03-pdfs.py

  shard:
    needs: contract
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        shard: [0, 1, 2, 3, 4]
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install browser and PDF dependencies
        run: |
          npm install
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
          python3 -m pip install --break-system-packages pypdf pillow

      - name: Run HTML PDF baseline shard
        run: node tools/curriculum/run-glm-s03-html-pdf-shard.mjs --shard=${{ matrix.shard }}

      - name: Upload shard evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: glm-s03-shard-${{ matrix.shard }}
          if-no-files-found: error
          retention-days: 30
          path: docs/curriculum/output/glm-s03-270-html-pdf-baseline/shard-${{ matrix.shard }}/**

  aggregate:
    needs: shard
    if: always() && needs.shard.result == 'success'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all shard evidence
        uses: actions/download-artifact@v4
        with:
          pattern: glm-s03-shard-*
          path: /tmp/glm-s03-shards

      - name: Aggregate 270-scenario baseline
        run: node tools/curriculum/aggregate-glm-s03-html-pdf-baseline.mjs --input=/tmp/glm-s03-shards

      - name: Validate aggregate authority
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const p = 'docs/curriculum/output/glm-s03-270-html-pdf-baseline/current.json';
          const m = JSON.parse(fs.readFileSync(p, 'utf8'));
          if (m.status !== 'BASELINE_CAPTURED') throw new Error(`status ${m.status}`);
          if (m.scenarioCount !== 270) throw new Error(`scenarios ${m.scenarioCount}`);
          if (m.publicUnitCount !== 15) throw new Error(`units ${m.publicUnitCount}`);
          if (m.approvedLayoutCountPerUnit !== 18) throw new Error(`layouts ${m.approvedLayoutCountPerUnit}`);
          if (m.sourceSummaries.length !== 15) throw new Error(`summaries ${m.sourceSummaries.length}`);
          if (new Set(m.scenarios.map(s => s.scenarioId)).size !== 270) throw new Error('duplicate scenario IDs');
          console.log(JSON.stringify({
            globalStatus: m.globalStatus,
            generatedScenarioCount: m.generatedScenarioCount,
            renderedScenarioCount: m.renderedScenarioCount,
            renderPassCount: m.renderPassCount,
            documentClassificationCounts: m.documentClassificationCounts,
            renderFindingCounts: m.renderFindingCounts,
          }, null, 2));
          NODE

      - name: Upload aggregate authority
        uses: actions/upload-artifact@v4
        with:
          name: glm-s03-270-html-pdf-baseline
          if-no-files-found: error
          retention-days: 30
          path: docs/curriculum/output/glm-s03-270-html-pdf-baseline/current.json
