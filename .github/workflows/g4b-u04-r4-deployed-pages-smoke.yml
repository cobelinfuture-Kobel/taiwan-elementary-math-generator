name: G4B-U04 R4 Deployed Pages Smoke

on:
  workflow_run:
    workflows:
      - Deploy GitHub Pages
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

env:
  G4B_U04_R4_SITE_URL: https://cobelinfuture-kobel.github.io/taiwan-elementary-math-generator/index.html

jobs:
  deployed-pages-smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.actor.login != 'github-actions[bot]')
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout deployed main test harness
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install browser dependencies
        run: |
          npm install --no-package-lock
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Resolve deployment SHA
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "G4B_U04_R4_DEPLOYMENT_SHA=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "G4B_U04_R4_DEPLOYMENT_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          fi

      - name: Wait for deployed URL
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              "${G4B_U04_R4_SITE_URL}?r4Deployment=${G4B_U04_R4_DEPLOYMENT_SHA}-${attempt}" \
              > /tmp/g4b-u04-r4-index.html; then
              test -s /tmp/g4b-u04-r4-index.html
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Run deployed source-switch and flexible-layout audit
        run: node tools/curriculum/run-g4b-u04-r4-deployed-pages-smoke.mjs

      - name: Write deployed R4 authority
        if: always()
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { access, readFile, writeFile, mkdir } from 'node:fs/promises';

          async function readJsonIfPresent(path) {
            try {
              await access(path);
              return JSON.parse(await readFile(path, 'utf8'));
            } catch {
              return null;
            }
          }

          const root = 'docs/curriculum/output/stress/g4b-u04-r4-deployed-pages';
          const manifest = await readJsonIfPresent(`${root}/manifest.json`);
          const failure = await readJsonIfPresent(`${root}/failure.json`);
          const evidence = manifest ?? failure ?? {
            schemaVersion: 'g4b-u04-r4-deployed-pages-smoke-v1',
            task: 'G4B_U04_R4_SourceSwitchAndFlexibleCustomLayoutRepair',
            status: 'FAIL',
            deploymentSha: process.env.G4B_U04_R4_DEPLOYMENT_SHA ?? 'unknown',
            message: 'R4 workflow failed before the browser harness wrote structured evidence.',
            details: null,
          };
          const authority = {
            ...evidence,
            workflow: process.env.GITHUB_WORKFLOW,
            eventName: process.env.GITHUB_EVENT_NAME,
            run: {
              id: process.env.GITHUB_RUN_ID,
              number: process.env.GITHUB_RUN_NUMBER,
              attempt: process.env.GITHUB_RUN_ATTEMPT,
              url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            },
            repository: process.env.GITHUB_REPOSITORY,
            ref: process.env.GITHUB_REF,
            verifiedAt: new Date().toISOString(),
          };
          await mkdir('docs/ci', { recursive: true });
          await writeFile('docs/ci/latest-g4b-u04-r4-deployed-pages-smoke.json', `${JSON.stringify(authority, null, 2)}\n`, 'utf8');
          NODE

      - name: Commit deployed R4 authority
        if: always()
        shell: bash
        run: |
          test -f docs/ci/latest-g4b-u04-r4-deployed-pages-smoke.json || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ci/latest-g4b-u04-r4-deployed-pages-smoke.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ci: record G4B-U04-R4 deployed Pages smoke [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload deployed R4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g4b-u04-r4-deployed-pages-smoke
          if-no-files-found: warn
          retention-days: 30
          path: |
            docs/curriculum/output/stress/g4b-u04-r4-deployed-pages/manifest.json
            docs/curriculum/output/stress/g4b-u04-r4-deployed-pages/failure.json
            docs/curriculum/output/stress/g4b-u04-r4-deployed-pages/failure.png
            docs/ci/latest-g4b-u04-r4-deployed-pages-smoke.json
            /tmp/g4b-u04-r4-index.html
