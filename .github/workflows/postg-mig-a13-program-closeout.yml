name: POSTG MIG A13 Program D0 Closeout

on:
  pull_request:
    branches: [ main ]
    paths:
      - "data/curriculum/knowledge/units/g4a_u01_4a01.knowledge-operation.json"
      - "data/curriculum/knowledge/units/g4a_u08_4a08.knowledge-operation.json"
      - "data/curriculum/knowledge/units/g4b_u01_4b01.knowledge-operation.json"
      - ".github/workflows/postg-mig-a13-program-closeout.yml"

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout A13 head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Normalize stale admitted unit states
        run: |
          python3 - <<'PY'
          from pathlib import Path

          paths = [
              Path('data/curriculum/knowledge/units/g4a_u01_4a01.knowledge-operation.json'),
              Path('data/curriculum/knowledge/units/g4a_u08_4a08.knowledge-operation.json'),
              Path('data/curriculum/knowledge/units/g4b_u01_4b01.knowledge-operation.json'),
          ]
          old = '"conformanceState":"IN_PROGRESS_GOLDEN_NATIVE"'
          new = '"conformanceState":"GOLDEN_CONFORMANT"'
          for path in paths:
              text = path.read_text(encoding='utf-8')
              if old in text:
                  assert text.count(old) == 1, path
                  path.write_text(text.replace(old, new), encoding='utf-8')
              else:
                  assert new in text, path
          PY
          if ! git diff --quiet -- data/curriculum/knowledge/units; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add \
              data/curriculum/knowledge/units/g4a_u01_4a01.knowledge-operation.json \
              data/curriculum/knowledge/units/g4a_u08_4a08.knowledge-operation.json \
              data/curriculum/knowledge/units/g4b_u01_4b01.knowledge-operation.json
            git commit -m "fix(postg): finalize admitted unit conformance states"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
