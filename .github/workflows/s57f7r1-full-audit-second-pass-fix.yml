name: S57F7R1 Full Audit Second Pass Fix

on:
  push:
    branches:
      - s57f7r1-g3b-u04-human-semantic-readback-fullfix
    paths:
      - .github/workflows/s57f7r1-full-audit-second-pass-fix.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-commit:
    if: github.event_name != 'pull_request' || github.head_ref == 's57f7r1-g3b-u04-human-semantic-readback-fullfix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: s57f7r1-g3b-u04-human-semantic-readback-fullfix
          fetch-depth: 0

      - name: Apply second-pass audit fixes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          module = Path('site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js')
          text = module.read_text(encoding='utf-8')

          old = '''function normalizeCombinedInventory(question, scenario) {
            const total = question.quantities.a + question.quantities.b;
            const a = Math.floor(total / 2);
            const b = total - a;
            updateAddThenDivide(question, a, b);
            const p = scenario.placeholderBindings;
            setPrompt(question, `老師把第一批${a}${p.itemUnit}${p.item}和第二批${b}${p.itemUnit}${p.item}合在一起，平均分給${question.quantities.c}${p.recipientUnit}${p.recipient}，每${p.recipientUnit}分到多少${p.itemUnit}${p.item}？`);
          }'''
          new = '''function normalizeCombinedInventory(question, scenario) {
            const perRecipientByContext = { classroom: 6, library: 4, sports: 2, crafts: 8 };
            const perRecipient = perRecipientByContext[question.contextDomain] ?? 5;
            const total = question.quantities.c * perRecipient;
            const a = Math.floor(total / 2);
            const b = total - a;
            updateAddThenDivide(question, a, b);
            const p = scenario.placeholderBindings;
            setPrompt(question, `老師把第一批${a}${p.itemUnit}${p.item}和第二批${b}${p.itemUnit}${p.item}合在一起，平均分給${question.quantities.c}${p.recipientUnit}${p.recipient}，每${p.recipientUnit}分到多少${p.itemUnit}${p.item}？`);
          }'''
          if text.count(old) != 1:
              raise SystemExit('Combined inventory normalizer not found exactly once')
          text = text.replace(old, new)

          old = '''function normalizePromotionPrice(question, scenario) {
            const q = question.quantities.q;
            const divisor = question.quantities.r ?? q + question.quantities.g;
            const gcd = (left, right) => right === 0 ? left : gcd(right, left % right);
            const step = divisor / gcd(q, divisor);
            const p = step * (3 + ((q + divisor) % 3));'''
          new = '''function normalizePromotionPrice(question, scenario) {
            const q = question.quantities.q;
            const divisor = question.quantities.r ?? q + question.quantities.g;
            const gcd = (left, right) => right === 0 ? left : gcd(right, left % right);
            const step = divisor / gcd(q, divisor);
            const targetByContext = {
              bakery: 25,
              drinks: 30,
              stationery: 10,
              daily_goods: 28,
              tickets: 60,
              stickers: 14,
              sports_cards: 20,
              coupons: 25
            };
            const target = targetByContext[question.contextDomain] ?? step * 4;
            const p = Math.max(step, Math.ceil(target / step) * step);'''
          if text.count(old) != 1:
              raise SystemExit('Promotion price normalizer prefix not found exactly once')
          text = text.replace(old, new)

          old = '''function normalizeTicketUnitPrice(question, scenario) {
            const priceByContext = { stationery: 10, snacks: 15, tickets: 50, craft_materials: 20 };
            const price = priceByContext[question.contextDomain] ?? question.quantities.a;
            updateConsecutive(question, price, question.quantities.b, question.quantities.c, "元");
            const p = scenario.placeholderBindings;
            setPrompt(question, `每${p.itemUnit}${p.item}${price}元，每${p.packageUnit}有${question.quantities.b}${p.itemUnit}，買${question.quantities.c}${p.packageUnit}一共要付多少元？`);
          }'''
          new = '''function normalizeTicketUnitPrice(question, scenario) {
            const priceByContext = { stationery: 10, snacks: 15, tickets: 50, craft_materials: 20 };
            const packageUnitByContext = { stationery: "盒", snacks: "盒", tickets: "本", craft_materials: "包" };
            const price = priceByContext[question.contextDomain] ?? question.quantities.a;
            const packageUnit = packageUnitByContext[question.contextDomain] ?? "包";
            updateConsecutive(question, price, question.quantities.b, question.quantities.c, "元");
            const p = scenario.placeholderBindings;
            setPrompt(question, `每${p.itemUnit}${p.item}${price}元，每${packageUnit}有${question.quantities.b}${p.itemUnit}，買${question.quantities.c}${packageUnit}一共要付多少元？`);
          }'''
          if text.count(old) != 1:
              raise SystemExit('Unit-price normalizer not found exactly once')
          text = text.replace(old, new)

          old = '''  if (family === "tpl_g3b_u04_div_add_distributed_resources_plus_existing_per_group") {
            const quotient = question.quantities.a / question.quantities.b;
            const caps = { classroom: 9, library: 8, sports: 3, technology: 2 };
            if (!Number.isInteger(quotient) || question.finalAnswer > (caps[question.contextDomain] ?? 8)) {
              errors.push(issue("G3B_U04_READBACK_PER_RECIPIENT_QUANTITY_IMPLAUSIBLE", "quantities", "Per-recipient resource quantity is implausible for the selected context."));
            }
          }'''
          new = '''  if (family === "tpl_g3b_u04_div_add_distributed_resources_plus_existing_per_group") {
            const quotient = question.quantities.a / question.quantities.b;
            const caps = { classroom: 9, library: 8, sports: 3, technology: 2 };
            if (!Number.isInteger(quotient) || question.finalAnswer > (caps[question.contextDomain] ?? 8)) {
              errors.push(issue("G3B_U04_READBACK_PER_RECIPIENT_QUANTITY_IMPLAUSIBLE", "quantities", "Per-recipient resource quantity is implausible for the selected context."));
            }
          }
          if (family === "tpl_g3b_u04_add_divide_combined_inventory_equal_distribution") {
            const caps = { classroom: 10, library: 6, sports: 2, crafts: 10 };
            if (question.finalAnswer > (caps[question.contextDomain] ?? 8)) {
              errors.push(issue("G3B_U04_READBACK_PER_RECIPIENT_QUANTITY_IMPLAUSIBLE", "quantities", "Per-recipient combined inventory quantity is implausible for the selected context."));
            }
          }'''
          if text.count(old) != 1:
              raise SystemExit('Per-recipient validation block not found exactly once')
          text = text.replace(old, new)

          old = '''  if (prompt.includes("本車票") || prompt.includes("本門票")'''
          new = '''  if (prompt.includes("undefined") || prompt.includes("本車票") || prompt.includes("本門票")'''
          if text.count(old) != 1:
              raise SystemExit('Context lexicon validation anchor not found exactly once')
          text = text.replace(old, new)
          module.write_text(text, encoding='utf-8')

          test_path = Path('tests/curriculum/g3b-u04-human-semantic-quality-v2.test.js')
          text = test_path.read_text(encoding='utf-8')
          anchor = '''  const sports = fixed("ps_g3b_u04_div_add_distributed_resources_plus_existing_per_group", "sports");'''
          addition = '''  const combinedSports = fixed("ps_g3b_u04_add_divide_combined_inventory_equal_distribution", "sports");
            assert.equal(combinedSports.finalAnswer <= 2, true);

          ''' + anchor
          if text.count(anchor) != 1:
              raise SystemExit('Quality v2 test sports anchor not found exactly once')
          text = text.replace(anchor, addition)
          anchor = '''  assert.match(ticketPrice.promptText, /每張門票50元/);'''
          addition = anchor + '''
            assert.equal(ticketPrice.promptText.includes("undefined"), false);
            assert.match(ticketPrice.promptText, /每本有/);'''
          if text.count(anchor) != 1:
              raise SystemExit('Ticket price assertion anchor not found exactly once')
          test_path.write_text(text.replace(anchor, addition), encoding='utf-8')

          audit = Path('tools/curriculum/generate-s57f7r1-g3b-u04-human-semantic-audit.mjs')
          text = audit.read_text(encoding='utf-8')
          anchor = '''writeFileSync(OUT_PATH, `${JSON.stringify(report, null, 2)}\n`, "utf8");'''
          addition = anchor + '''
          if (report.semanticValidatorFailureCount !== 0 || report.qualityValidatorFailureCount !== 0) {
            throw new Error(`S57F7R1 audit failed: semantic=${report.semanticValidatorFailureCount}, quality=${report.qualityValidatorFailureCount}`);
          }'''
          if text.count(anchor) != 1:
              raise SystemExit('Audit write anchor not found exactly once')
          audit.write_text(text.replace(anchor, addition), encoding='utf-8')
          PY

      - name: Commit fixes and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js
          git add tests/curriculum/g3b-u04-human-semantic-quality-v2.test.js
          git add tools/curriculum/generate-s57f7r1-g3b-u04-human-semantic-audit.mjs
          git rm .github/workflows/s57f7r1-full-audit-second-pass-fix.yml
          git commit -m "fix(g3b-u04): close second-pass 117-variant semantic defects"
          git push origin HEAD:s57f7r1-g3b-u04-human-semantic-readback-fullfix
