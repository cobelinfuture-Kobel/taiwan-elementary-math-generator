name: S57F7R1 Full Audit Second Pass Fix

on:
  push:
    branches:
      - s57f7r1-g3b-u04-human-semantic-readback-fullfix
    paths:
      - .github/workflows/s57f7r1-full-audit-second-pass-fix.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-commit:
    if: github.event_name != 'pull_request' || github.head_ref == 's57f7r1-g3b-u04-human-semantic-readback-fullfix'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: s57f7r1-g3b-u04-human-semantic-readback-fullfix
          fetch-depth: 0

      - name: Apply structural second-pass audit fixes
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/s57f7r1-second-pass.mjs <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          function replaceFunction(source, functionName, replacement) {
            const lines = source.split("\n");
            const start = lines.findIndex((line) => line.startsWith(`function ${functionName}(`));
            if (start < 0) throw new Error(`Missing function ${functionName}`);
            let depth = 0;
            let end = -1;
            for (let index = start; index < lines.length; index += 1) {
              for (const char of lines[index]) {
                if (char === "{") depth += 1;
                if (char === "}") depth -= 1;
              }
              if (index > start && depth === 0) {
                end = index;
                break;
              }
            }
            if (end < 0) throw new Error(`Unclosed function ${functionName}`);
            lines.splice(start, end - start + 1, ...replacement.trim().split("\n"));
            return lines.join("\n");
          }

          function insertAfterBlock(source, firstLine, insertion) {
            const lines = source.split("\n");
            const start = lines.findIndex((line) => line === firstLine);
            if (start < 0) throw new Error(`Missing block start: ${firstLine}`);
            let depth = 0;
            let end = -1;
            for (let index = start; index < lines.length; index += 1) {
              for (const char of lines[index]) {
                if (char === "{") depth += 1;
                if (char === "}") depth -= 1;
              }
              if (index > start && depth === 0) {
                end = index;
                break;
              }
            }
            if (end < 0) throw new Error(`Unclosed block: ${firstLine}`);
            lines.splice(end + 1, 0, ...insertion.trim().split("\n"));
            return lines.join("\n");
          }

          const modulePath = "site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js";
          let source = readFileSync(modulePath, "utf8");

          source = replaceFunction(source, "normalizeCombinedInventory", `
          function normalizeCombinedInventory(question, scenario) {
            const perRecipientByContext = { classroom: 6, library: 4, sports: 2, crafts: 8 };
            const perRecipient = perRecipientByContext[question.contextDomain] ?? 5;
            const total = question.quantities.c * perRecipient;
            const a = Math.floor(total / 2);
            const b = total - a;
            updateAddThenDivide(question, a, b);
            const p = scenario.placeholderBindings;
            setPrompt(question, \`老師把第一批\${a}\${p.itemUnit}\${p.item}和第二批\${b}\${p.itemUnit}\${p.item}合在一起，平均分給\${question.quantities.c}\${p.recipientUnit}\${p.recipient}，每\${p.recipientUnit}分到多少\${p.itemUnit}\${p.item}？\`);
          }`);

          source = replaceFunction(source, "normalizePromotionPrice", `
          function normalizePromotionPrice(question, scenario) {
            const q = question.quantities.q;
            const divisor = question.quantities.r ?? q + question.quantities.g;
            const gcd = (left, right) => right === 0 ? left : gcd(right, left % right);
            const step = divisor / gcd(q, divisor);
            const targetByContext = {
              bakery: 25,
              drinks: 30,
              stationery: 10,
              daily_goods: 28,
              tickets: 60,
              stickers: 14,
              sports_cards: 20,
              coupons: 25
            };
            const target = targetByContext[question.contextDomain] ?? step * 4;
            const p = Math.max(step, Math.ceil(target / step) * step);
            const total = p * q;
            const answer = total / divisor;
            setBinding(question, "p", p);
            if (question.quantities.r !== undefined) {
              question.intermediateResults = [total, answer];
              setEvent(question, 0, total);
              setEvent(question, 1, answer);
              question.equationModel = \`(\${p} × \${q}) ÷ \${divisor}\`;
              question.equationTokens = ["(", p, "×", q, ")", "÷", divisor];
              const item = scenario.placeholderBindings.item;
              const unit = scenario.placeholderBindings.itemUnit;
              setPrompt(question, \`\${item}每\${unit}\${p}元，活動期間付\${q}\${unit}的錢可以拿到\${divisor}\${unit}，平均每\${unit}\${item}多少元？\`);
            } else {
              question.intermediateResults = [total, divisor, answer];
              setEvent(question, 0, total);
              setEvent(question, 1, divisor);
              setEvent(question, 2, answer);
              question.equationModel = \`(\${p} × \${q}) ÷ (\${q} + \${question.quantities.g})\`;
              question.equationTokens = ["(", p, "×", q, ")", "÷", "(", q, "+", question.quantities.g, ")"];
              const unit = scenario.placeholderBindings.itemUnit;
              const item = question.contextDomain === "coupons" ? "遊戲券" : scenario.placeholderBindings.item;
              setPrompt(question, \`每\${unit}\${item}\${p}元，買\${q}\${unit}另外贈送\${question.quantities.g}\${unit}，把總費用平均到收到的全部\${item}，每\${unit}\${item}平均多少元？\`);
            }
            setAnswer(question, "元", answer);
          }`);

          source = replaceFunction(source, "normalizeTicketUnitPrice", `
          function normalizeTicketUnitPrice(question, scenario) {
            const priceByContext = { stationery: 10, snacks: 15, tickets: 50, craft_materials: 20 };
            const packageUnitByContext = { stationery: "盒", snacks: "盒", tickets: "本", craft_materials: "包" };
            const price = priceByContext[question.contextDomain] ?? question.quantities.a;
            const packageUnit = packageUnitByContext[question.contextDomain] ?? "包";
            updateConsecutive(question, price, question.quantities.b, question.quantities.c, "元");
            const p = scenario.placeholderBindings;
            setPrompt(question, \`每\${p.itemUnit}\${p.item}\${price}元，每\${packageUnit}有\${question.quantities.b}\${p.itemUnit}，買\${question.quantities.c}\${packageUnit}一共要付多少元？\`);
          }`);

          if (!source.includes('family === "tpl_g3b_u04_add_divide_combined_inventory_equal_distribution"')) {
            source = insertAfterBlock(
              source,
              '  if (family === "tpl_g3b_u04_div_add_distributed_resources_plus_existing_per_group") {',
              `
          if (family === "tpl_g3b_u04_add_divide_combined_inventory_equal_distribution") {
            const caps = { classroom: 10, library: 6, sports: 2, crafts: 10 };
            if (question.finalAnswer > (caps[question.contextDomain] ?? 8)) {
              errors.push(issue("G3B_U04_READBACK_PER_RECIPIENT_QUANTITY_IMPLAUSIBLE", "quantities", "Per-recipient combined inventory quantity is implausible for the selected context."));
            }
          }`
            );
          }

          source = source.replace(
            '  if (prompt.includes("本車票") || prompt.includes("本門票")',
            '  if (prompt.includes("undefined") || prompt.includes("本車票") || prompt.includes("本門票")'
          );
          writeFileSync(modulePath, source, "utf8");

          const testPath = "tests/curriculum/g3b-u04-human-semantic-quality-v2.test.js";
          let testSource = readFileSync(testPath, "utf8");
          if (!testSource.includes("const combinedSports")) {
            testSource = testSource.replace(
              '  const sports = fixed("ps_g3b_u04_div_add_distributed_resources_plus_existing_per_group", "sports");',
              '  const combinedSports = fixed("ps_g3b_u04_add_divide_combined_inventory_equal_distribution", "sports");\n'
                + '  assert.equal(combinedSports.finalAnswer <= 2, true);\n\n'
                + '  const sports = fixed("ps_g3b_u04_div_add_distributed_resources_plus_existing_per_group", "sports");'
            );
          }
          if (!testSource.includes('ticketPrice.promptText.includes("undefined")')) {
            testSource = testSource.replace(
              '  assert.match(ticketPrice.promptText, /每張門票50元/);',
              '  assert.match(ticketPrice.promptText, /每張門票50元/);\n'
                + '  assert.equal(ticketPrice.promptText.includes("undefined"), false);\n'
                + '  assert.match(ticketPrice.promptText, /每本有/);'
            );
          }
          writeFileSync(testPath, testSource, "utf8");

          const auditPath = "tools/curriculum/generate-s57f7r1-g3b-u04-human-semantic-audit.mjs";
          let auditSource = readFileSync(auditPath, "utf8");
          if (!auditSource.includes("S57F7R1 audit failed:")) {
            auditSource = auditSource.replace(
              "console.log(JSON.stringify({",
              'if (report.semanticValidatorFailureCount !== 0 || report.qualityValidatorFailureCount !== 0) {\n'
                + '  throw new Error(`S57F7R1 audit failed: semantic=${report.semanticValidatorFailureCount}, quality=${report.qualityValidatorFailureCount}`);\n'
                + '}\n\nconsole.log(JSON.stringify({'
            );
          }
          writeFileSync(auditPath, auditSource, "utf8");
          NODE
          node /tmp/s57f7r1-second-pass.mjs
          git diff --check

      - name: Commit fixes and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js
          git add tests/curriculum/g3b-u04-human-semantic-quality-v2.test.js
          git add tools/curriculum/generate-s57f7r1-g3b-u04-human-semantic-audit.mjs
          git rm .github/workflows/s57f7r1-full-audit-second-pass-fix.yml
          git commit -m "fix(g3b-u04): close second-pass 117-variant semantic defects"
          git push origin HEAD:s57f7r1-g3b-u04-human-semantic-readback-fullfix
