name: S57E5 One-Time Patch

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/s57e5-one-time-patch.yml

permissions:
  contents: write

jobs:
  patch-and-cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout S57E5 branch
        uses: actions/checkout@v4
        with:
          ref: s57e5-g3b-u04-blocking-semantic-validator
          fetch-depth: 0
          path: work

      - name: Patch age-role matcher without matching package roles
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'work/site/modules/curriculum/batch-a/g3b-u04-semantic-validator.js';
          const before = 'if (/age/.test(role)) return "歲";';
          const after = 'if (/(^|_)age($|_)/.test(role)) return "歲";';
          const text = fs.readFileSync(path, 'utf8');
          const count = text.split(before).length - 1;
          if (count !== 1) throw new Error(`Expected one age matcher, found ${count}.`);
          fs.writeFileSync(path, text.replace(before, after), 'utf8');
          NODE

      - name: Commit patched validator to S57E5 branch
        run: |
          cd work
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/modules/curriculum/batch-a/g3b-u04-semantic-validator.js
          git commit -m "fix(g3b-u04): distinguish age roles from package roles"
          git push origin HEAD:s57e5-g3b-u04-blocking-semantic-validator

      - name: Checkout main for workflow cleanup
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          path: cleanup

      - name: Remove one-time workflow from main
        run: |
          cd cleanup
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/s57e5-one-time-patch.yml
          git commit -m "chore(ci): remove one-time S57E5 patch workflow [skip ci]"
          git push origin HEAD:main
