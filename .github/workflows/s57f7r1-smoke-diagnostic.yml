name: S57F7R1 Smoke Diagnostic

on:
  push:
    branches:
      - s57f7r1-g3b-u04-human-semantic-readback-fullfix
    paths:
      - .github/workflows/s57f7r1-smoke-diagnostic.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate-diagnostic:
    if: github.event_name != 'pull_request' || github.head_ref == 's57f7r1-g3b-u04-human-semantic-readback-fullfix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: s57f7r1-g3b-u04-human-semantic-readback-fullfix
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk poppler-utils
      - name: Generate HTML and PDF
        shell: bash
        run: |
          set -euo pipefail
          node tools/curriculum/generate-s57f7r1-g3b-u04-public-smoke.mjs
          HTML="$GITHUB_WORKSPACE/docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.html"
          PDF="$GITHUB_WORKSPACE/docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.pdf"
          CHROME="$(command -v google-chrome-stable || command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          "$CHROME" --headless=new --no-sandbox --disable-gpu --no-pdf-header-footer --print-to-pdf="$PDF" "file://$HTML"
          pdfinfo "$PDF" > docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.pdfinfo.txt
          pdftotext -layout "$PDF" docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.txt
          mkdir -p docs/curriculum/output/smoke/S57F7R1-rendered
          pdftoppm -png -r 110 "$PDF" docs/curriculum/output/smoke/S57F7R1-rendered/page >/dev/null 2>&1
      - name: Upload diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: s57f7r1-smoke-diagnostic
          path: |
            docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.html
            docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.pdf
            docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.manifest.json
            docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.pdfinfo.txt
            docs/curriculum/output/smoke/S57F7R1_G3B_U04_PublicSemanticWorksheet.txt
            docs/curriculum/output/smoke/S57F7R1-rendered/page-*.png
          if-no-files-found: error
          retention-days: 7
