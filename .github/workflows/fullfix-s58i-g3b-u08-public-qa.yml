name: FullFix S58I G3B U08 Public QA

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: fullfix-s58i-g3b-u08-public-qa-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fullfix:
    if: >-
      github.actor != 'github-actions[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Apply lifecycle and surface FullFix
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const path = "tests/site/g3b-u08-public-selector-print-controls.test.js";
          let text = readFileSync(path, "utf8");
          function replaceExactly(oldText, newText) {
            const count = text.split(oldText).length - 1;
            if (count !== 1) throw new Error(`Expected one replacement for ${oldText}, got ${count}`);
            text = text.replace(oldText, newText);
          }
          replaceExactly('    includeAnswerKey: "false"', '    answerKey: "0"');
          replaceExactly('  assert.match(pixel, /id="pixel-selection-mode"/);', '  assert.match(pixel, /id="pixel-selection-mode-select"/);');
          replaceExactly('  assert.match(pixel, /id="pixel-knowledge-point-panel"/);', '  assert.match(pixel, /id="pixel-kp-panel"/);');
          replaceExactly(
            '  assert.doesNotMatch(sanitized, /ps_example/);',
            '  assert.doesNotMatch(sanitized, /ps_example/);\n  assert.doesNotMatch(sanitized, /ctx_example/);'
          );
          writeFileSync(path, text, "utf8");
          NODE
          git diff --check

      - name: Run focused S58I tests
        run: node --test tests/site/g3b-u08-public-selector-print-controls.test.js

      - name: Run full tests
        run: npm test

      - name: Remove one-shot workflow
        run: rm .github/workflows/fullfix-s58i-g3b-u08-public-qa.yml

      - name: Commit S58I FullFix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(g3b-u08): FullFix public query and surface QA [skip ci]"
          git push origin HEAD:${{ github.head_ref }}
