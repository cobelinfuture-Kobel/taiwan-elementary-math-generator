name: G5A-U02 S106 Factor Pair Symmetry Masked Table

on:
  pull_request:
    branches:
      - main
    paths:
      - "src/curriculum/g5a-u02/**"
      - "site/modules/renderer/g5a-u02-s101-public-renderer.js"
      - "site/modules/renderer/g5a-u02-s106-public-representation.js"
      - "site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js"
      - "tests/curriculum/g5a-u02-s97-source-parity-prompt-completeness.test.js"
      - "tests/curriculum/g5a-u02-s106-factor-pair-symmetry-masked-table.test.js"
      - "tools/curriculum/run-g5a-u02-s106-bundle-audit.mjs"
      - "docs/curriculum/architecture/G5AU02_S106_P1FactorPairSymmetryAndMaskedTableFullFix.md"
      - "docs/curriculum/output/G5AU02_S106_P1_FACTOR_PAIR_SYMMETRY_MASKED_TABLE_PENDING.marker"
      - ".github/workflows/g5a-u02-s106-factor-pair-symmetry-masked-table.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  source-contract:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run S106 focused source and renderer acceptance
        run: node --test tests/curriculum/g5a-u02-s106-factor-pair-symmetry-masked-table.test.js
      - name: Run S97 supersession regression
        run: node --test tests/curriculum/g5a-u02-s97-source-parity-prompt-completeness.test.js

  browser-bundle:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build current browser runtime from canonical source
        run: |
          npx --yes esbuild@0.25.5 \
            src/curriculum/g5a-u02/browser-dynamic-entry.js \
            --bundle \
            --format=esm \
            --platform=browser \
            --target=es2022 \
            --minify \
            --banner:js='/* GENERATED CANONICAL G5A-U02 RUNTIME — DO NOT EDIT */' \
            --outfile=site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Verify bundled S106 authority
        run: node tools/curriculum/run-g5a-u02-s106-bundle-audit.mjs
      - name: Sync exact canonical bundle on same-repository PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          bundle="site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js"
          if git diff --quiet -- "$bundle"; then
            echo "Committed bundle already matches canonical source."
            exit 0
          fi
          git add -- "$bundle"
          staged="$(git diff --cached --name-only)"
          test "$staged" = "$bundle"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "build(g5a-u02): sync S106 canonical browser bundle"
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
      - name: Require committed bundle parity after sync
        run: git diff --exit-code -- site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
      - name: Upload generated bundle and audit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-s106-generated-bundle
          retention-days: 30
          if-no-files-found: error
          path: |
            site/modules/curriculum/batch-b/g5a-u02-browser-dynamic-runtime.bundle.js
            docs/curriculum/output/g5a-u02-s106-bundle-audit/current.json

  full-regression:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-package-lock
      - name: Run complete Node regression with inspectable readback
        shell: bash
        run: |
          set +e
          npm test > /tmp/g5a-u02-s106-full-regression.log 2>&1
          status=$?
          tail -n 180 /tmp/g5a-u02-s106-full-regression.log
          exit "$status"
      - name: Upload full regression readback
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u02-s106-full-regression
          retention-days: 7
          if-no-files-found: error
          path: /tmp/g5a-u02-s106-full-regression.log
