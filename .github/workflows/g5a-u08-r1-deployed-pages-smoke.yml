name: G5A-U08-R1 Deployed GitHub Pages Smoke

on:
  workflow_run:
    workflows:
      - Deploy GitHub Pages
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

env:
  G5A_U08_R1_SITE_URL: https://cobelinfuture-kobel.github.io/taiwan-elementary-math-generator/index.html

jobs:
  deployed-pages-smoke:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.actor.login != 'github-actions[bot]')
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Checkout deployed main test harness
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install browser dependencies
        run: |
          npm install --no-package-lock
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Resolve deployment SHA
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "G5A_U08_R1_DEPLOYMENT_SHA=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_ENV"
          else
            echo "G5A_U08_R1_DEPLOYMENT_SHA=${{ github.sha }}" >> "$GITHUB_ENV"
          fi

      - name: Wait for deployed URL
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            if curl --fail --silent --show-error \
              "${G5A_U08_R1_SITE_URL}?deployment=${G5A_U08_R1_DEPLOYMENT_SHA}-${attempt}" > /tmp/g5a-u08-r1-index.html; then
              test -s /tmp/g5a-u08-r1-index.html
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Run deployed G5A-U08 three-control generate preview print audit
        run: node tools/curriculum/run-gs01-g5a-u08-deployed-pages-smoke.mjs

      - name: Write deployed smoke authority
        if: always()
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import { access, readFile, writeFile, mkdir } from 'node:fs/promises';

          async function readJsonIfPresent(path) {
            try {
              await access(path);
              return JSON.parse(await readFile(path, 'utf8'));
            } catch {
              return null;
            }
          }

          const manifestPath = 'docs/curriculum/output/stress/g5a-u08-r1-deployed-pages/manifest.json';
          const failurePath = 'docs/curriculum/output/stress/g5a-u08-r1-deployed-pages/failure.json';
          const manifest = await readJsonIfPresent(manifestPath);
          const failure = await readJsonIfPresent(failurePath);
          const evidence = manifest ?? failure ?? {
            task: 'G5A_U08_R1_DeployedControlsAndPrintRecloseout',
            status: 'FAIL',
            deploymentSha: process.env.G5A_U08_R1_DEPLOYMENT_SHA ?? 'unknown',
            message: 'G5A-U08-R1 workflow failed before the browser harness wrote structured evidence.',
            details: null,
          };
          const authority = {
            schemaVersion: 'g5a-u08-r1-deployed-pages-smoke-v1',
            ...evidence,
            workflow: process.env.GITHUB_WORKFLOW,
            run: {
              id: process.env.GITHUB_RUN_ID,
              number: process.env.GITHUB_RUN_NUMBER,
              attempt: process.env.GITHUB_RUN_ATTEMPT,
              url: `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            },
            repository: process.env.GITHUB_REPOSITORY,
            ref: process.env.GITHUB_REF,
            verifiedAt: new Date().toISOString(),
          };
          await mkdir('docs/ci', { recursive: true });
          await writeFile('docs/ci/latest-g5a-u08-r1-deployed-pages-smoke.json', `${JSON.stringify(authority, null, 2)}\n`, 'utf8');
          NODE

      - name: Commit deployed smoke authority
        if: always()
        shell: bash
        run: |
          test -f docs/ci/latest-g5a-u08-r1-deployed-pages-smoke.json || exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ci/latest-g5a-u08-r1-deployed-pages-smoke.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "ci: record G5A-U08-R1 deployed Pages smoke [skip ci]"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Upload deployed smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: g5a-u08-r1-deployed-pages-smoke
          if-no-files-found: warn
          retention-days: 30
          path: |
            docs/curriculum/output/stress/g5a-u08-r1-deployed-pages/manifest.json
            docs/curriculum/output/stress/g5a-u08-r1-deployed-pages/failure.json
            docs/curriculum/output/stress/g5a-u08-r1-deployed-pages/failure.png
            docs/ci/latest-g5a-u08-r1-deployed-pages-smoke.json
            /tmp/g5a-u08-r1-index.html
