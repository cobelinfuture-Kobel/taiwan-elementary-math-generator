name: S58J G3B-U08 One-Time HTML PDF Smoke

on:
  push:
    branches:
      - s58j-g3b-u08-production-closeout
    paths:
      - .github/workflows/s58j-g3b-u08-one-time-smoke.yml
      - tools/curriculum/generate-s58j-g3b-u08-public-smoke.mjs

permissions:
  contents: write

concurrency:
  group: s58j-g3b-u08-one-time-smoke
  cancel-in-progress: false

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: s58j-g3b-u08-production-closeout
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install project dependencies
        run: npm ci

      - name: Install PDF inspection and Traditional Chinese fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils fonts-noto-cjk

      - name: Install Playwright Chromium without changing repository manifests
        run: |
          npm install --no-save --package-lock=false playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Generate deterministic public HTML and initial manifest
        run: node tools/curriculum/generate-s58j-g3b-u08-public-smoke.mjs

      - name: Print canonical HTML to PDF
        run: |
          node --input-type=module <<'NODE'
          import { chromium } from "playwright";
          import { pathToFileURL } from "node:url";
          import { resolve } from "node:path";

          const htmlPath = resolve("docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.html");
          const pdfPath = resolve("docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.pdf");
          const browser = await chromium.launch({ headless: true });
          try {
            const page = await browser.newPage();
            await page.goto(pathToFileURL(htmlPath).href, { waitUntil: "networkidle" });
            await page.emulateMedia({ media: "print" });
            await page.pdf({
              path: pdfPath,
              format: "A4",
              printBackground: true,
              preferCSSPageSize: true,
              margin: { top: "0", right: "0", bottom: "0", left: "0" }
            });
          } finally {
            await browser.close();
          }
          NODE

      - name: Render, extract and finalize smoke manifest
        run: node tools/curriculum/generate-s58j-g3b-u08-public-smoke.mjs --finalize

      - name: Verify generated artifacts
        run: |
          test -s docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.html
          test -s docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.pdf
          test -s docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.manifest.json
          grep -q '"status": "public_html_pdf_smoke_pass"' docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.manifest.json
          git status --short

      - name: Commit verified artifacts and remove one-time workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm .github/workflows/s58j-g3b-u08-one-time-smoke.yml
          git add .github/workflows/s58j-g3b-u08-one-time-smoke.yml \
            docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.html \
            docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.pdf \
            docs/curriculum/output/smoke/S58J_G3B_U08_PublicSemanticWorksheet.manifest.json
          git commit -m "test(g3b-u08): generate S58J public HTML PDF smoke [skip ci]"
          git push origin HEAD:s58j-g3b-u08-production-closeout
