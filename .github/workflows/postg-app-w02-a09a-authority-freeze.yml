name: POSTG APP W02 A09A Authority Freeze

on:
  push:
    branches: [postg-app-w02-a08r4-third-operator-approval]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: postg-app-w02-a09a-successor-invariant-fix
  cancel-in-progress: true

jobs:
  one-shot-successor-invariant-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: postg-app-w02-a08r4-third-operator-approval
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Remove obsolete A08R2 mutable-state invariants
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/curriculum/application/postg-app-master-controller.mjs')
          text = path.read_text()
          before = """    productionAdmittedCandidateCount: 0,
              publicSelectableCandidateCount: 0,
              operatorDecisionState: 'SECOND_REVISE_RECORDED',
          """
          after = """    publicSelectableCandidateCount: 0,
          """
          if after in text and before not in text:
              print('successor invariant correction already applied')
          else:
              if before not in text:
                  raise SystemExit('obsolete invariant anchor not found')
              path.write_text(text.replace(before, after, 1))
          PY
      - name: Commit exact correction when needed
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No correction commit required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/curriculum/application/postg-app-master-controller.mjs
          git commit -m "fix(application): separate immutable W02 metrics from admission state"
          git push origin HEAD:postg-app-w02-a08r4-third-operator-approval
