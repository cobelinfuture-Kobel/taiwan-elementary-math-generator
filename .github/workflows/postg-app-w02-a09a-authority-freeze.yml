name: POSTG APP W02 A09A Authority Freeze

on:
  pull_request:
  push:
    branches: [main, postg-app-w02-a08r4-third-operator-approval]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: postg-app-w02-a09a-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  authority-freeze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install project dependencies
        run: npm install --silent --no-audit --no-fund
      - name: Apply idempotent A09A authoritative materialization
        run: |
          node tools/curriculum/materialize-postg-app-w02-a09a-controller-import-fix.mjs
          node tools/curriculum/materialize-postg-app-w02-a09a-authoritative-mainline-freeze.mjs
          node tools/curriculum/normalize-postg-app-w02-a09a-m00-compat-materializer.mjs
          node tools/curriculum/materialize-postg-app-w02-a09a-m00-compat-repair.mjs
          git diff --stat
      - name: Validate canonical authority gap and W03 freeze
        run: node tools/curriculum/validate-postg-app-w02-a09a-authority-reconciliation-freeze.mjs
      - name: Enforce frozen mainline against new W03 and legacy routes
        shell: bash
        run: |
          if [[ "$(node -p "require('./data/curriculum/application/governance/postg-app-w02-a09a-authority-freeze.json').executionFreeze.active")" != "true" ]]; then
            echo "A09A execution freeze is released."
            exit 0
          fi
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
          else
            base="${{ github.event.before }}"
            if [[ -z "$base" || "$base" =~ ^0+$ ]]; then
              base="$(git rev-parse HEAD^)"
            fi
          fi
          changed="$(git diff --name-only "$base" HEAD)"
          added="$(git diff --diff-filter=A --name-only "$base" HEAD)"
          if grep -Eiq '(^|/)(w03|postg-app-w03|POSTG-APP-W03)' <<<"$changed"; then
            echo "W03 implementation is frozen pending canonical curriculum authority reconciliation."
            grep -Ei '(^|/)(w03|postg-app-w03|POSTG-APP-W03)' <<<"$changed" || true
            exit 1
          fi
          if grep -Eiq '^site/assets/browser/.*(application|global-context).*\.js$' <<<"$added"; then
            echo "New browser application/global-context routes are forbidden while legacy routes are frozen."
            grep -Ei '^site/assets/browser/.*(application|global-context).*\.js$' <<<"$added" || true
            exit 1
          fi
      - name: Focused A09A tests
        run: |
          node --test tests/curriculum/postg-app-w02-a09a-authority-reconciliation-freeze.test.js
          node --test tests/curriculum/postg-app-m00-master-controller.test.js
          node tools/curriculum/validate-postg-app-m00-master-controller.mjs
      - name: Enforce materializer idempotence
        run: |
          git diff > /tmp/a09a-first.diff
          node tools/curriculum/materialize-postg-app-w02-a09a-controller-import-fix.mjs
          node tools/curriculum/materialize-postg-app-w02-a09a-authoritative-mainline-freeze.mjs
          node tools/curriculum/normalize-postg-app-w02-a09a-m00-compat-materializer.mjs
          node tools/curriculum/materialize-postg-app-w02-a09a-m00-compat-repair.mjs
          git diff > /tmp/a09a-second.diff
          cmp /tmp/a09a-first.diff /tmp/a09a-second.diff
      - name: Full regression
        run: npm test
