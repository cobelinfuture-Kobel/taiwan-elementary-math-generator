name: S57F7R1 Public Smoke Semantic Third Pass FullFix

on:
  push:
    branches:
      - s57f7r1-g3b-u04-human-semantic-readback-fullfix
    paths:
      - .github/workflows/s57f7r1-public-smoke-third-pass-fullfix.yml
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-commit:
    if: github.event_name != 'pull_request' || github.head_ref == 's57f7r1-g3b-u04-human-semantic-readback-fullfix'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: s57f7r1-g3b-u04-human-semantic-readback-fullfix
          fetch-depth: 0

      - name: Apply public-smoke semantic third-pass FullFix
        shell: bash
        run: |
          set -euo pipefail
          cat > /tmp/s57f7r1-third-pass.mjs <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const path = "site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js";
          let text = readFileSync(path, "utf8");

          const measuredAnchor = "function normalizeMeasuredPortion(question, scenario) {";
          if (!text.includes("function normalizePromotionSharedPurchase")) {
            const insertion = `function updateSubtractThenDivide(question, total, removed) {
            const divisor = question.quantities.c;
            const remaining = total - removed;
            const answer = remaining / divisor;
            setBinding(question, "a", total);
            setBinding(question, "b", removed);
            question.intermediateResults = [remaining, answer];
            setEvent(question, 0, remaining);
            setEvent(question, 1, answer);
            question.equationModel = \`(\${total} - \${removed}) ÷ \${divisor}\`;
            question.equationTokens = ["(", total, "-", removed, ")", "÷", divisor];
            setAnswer(question, question.answerUnit, answer);
          }

          function normalizePromotionSharedPurchase(question) {
            const perPersonByContext = { daily_goods: 20, food: 30, school_supplies: 15 };
            const perPerson = perPersonByContext[question.contextDomain] ?? 20;
            const participantCount = question.quantities.c;
            const total = participantCount * perPerson;
            const addOn = Math.max(5, Math.floor(total / 15) * 5);
            const originalPrice = total - addOn;
            updateAddThenDivide(question, originalPrice, addOn);
            const labels = {
              daily_goods: { item: "清潔用品組合", use: "共同使用" },
              food: { item: "分享餐組合", use: "一起分享" },
              school_supplies: { item: "文具組合", use: "作為班級共用物資" }
            };
            const label = labels[question.contextDomain] ?? labels.daily_goods;
            setPrompt(question, \`\${label.item}原價\${originalPrice}元，活動期間再加\${addOn}元可以多拿一組相同商品。\${participantCount}人共同購買，\${label.use}，並平均分擔總費用。每人要付多少元？\`);
          }

          function normalizeReservedDistribution(question, scenario) {
            const perRecipientByContext = { classroom: 5, library: 4, sports_equipment: 2, awards: 3 };
            const reservedByContext = { classroom: 5, library: 4, sports_equipment: 2, awards: 6 };
            const perRecipient = perRecipientByContext[question.contextDomain] ?? 4;
            const reserved = reservedByContext[question.contextDomain] ?? 4;
            const total = reserved + question.quantities.c * perRecipient;
            updateSubtractThenDivide(question, total, reserved);
            const p = scenario.placeholderBindings;
            setPrompt(question, \`共有\${total}\${p.itemUnit}\${p.item}，先保留\${reserved}\${p.itemUnit}，其餘平均分給\${question.quantities.c}\${p.recipientUnit}\${p.recipient}，每\${p.recipientUnit}分到多少\${p.itemUnit}\${p.item}？\`);
          }

          `;
            if (!text.includes(measuredAnchor)) throw new Error("Missing measured normalizer anchor");
            text = text.replace(measuredAnchor, insertion + measuredAnchor);
          }

          text = text.replace(
            'setPrompt(question, `${b}人平均分擔${a}元的共同費用，小安另外花了${personal}元，小安一共花了多少元？`);',
            'setPrompt(question, `小安和其他人共${b}人，平均分擔${a}元的共同費用。小安另外花了${personal}元，小安一共花了多少元？`);'
          );

          if (!text.includes('case "tpl_g3b_u04_add_divide_promotion_total_equal_share"')) {
            text = text.replace(
              'case "tpl_g3b_u04_add_divide_combined_liquid_equal_portions": normalizeCombinedLiquid(question, scenario); break;',
              'case "tpl_g3b_u04_add_divide_combined_liquid_equal_portions": normalizeCombinedLiquid(question, scenario); break;\n'
                + '    case "tpl_g3b_u04_add_divide_promotion_total_equal_share": normalizePromotionSharedPurchase(question); break;'
            );
          }
          if (!text.includes('case "tpl_g3b_u04_sub_div_reserved_amount_then_distribute"')) {
            text = text.replace(
              'case "tpl_g3b_u04_sub_div_used_amount_then_share": normalizeMeasuredPortion(question, scenario); break;',
              'case "tpl_g3b_u04_sub_div_used_amount_then_share": normalizeMeasuredPortion(question, scenario); break;\n'
                + '    case "tpl_g3b_u04_sub_div_reserved_amount_then_distribute": normalizeReservedDistribution(question, scenario); break;'
            );
          }

          const sharedScopeAnchor = '  if (family === "tpl_g3b_u04_add_divide_joint_purchase_equal_share") {';
          if (!text.includes('tpl_g3b_u04_div_add_shared_cost_plus_personal_purchase"\n    && !prompt.includes("小安和其他人共"')) {
            const insert = `  if (family === "tpl_g3b_u04_div_add_shared_cost_plus_personal_purchase"
            && !prompt.includes("小安和其他人共")) {
            errors.push(issue("G3B_U04_READBACK_SHARED_ACTIVITY_SCOPE_UNCLEAR", "promptText", "The named student must be explicitly included in the shared-cost participant total."));
          }

          `;
            text = text.replace(sharedScopeAnchor, insert + sharedScopeAnchor);
          }

          const costTail = '|| (family === "tpl_g3b_u04_total_minus_share_personal_budget_minus_group_fee" && question.quantities.a < 50)) {';
          if (!text.includes('tpl_g3b_u04_add_divide_promotion_total_equal_share"\n      && question.quantities.b > question.quantities.a')) {
            text = text.replace(
              costTail,
              '|| (family === "tpl_g3b_u04_total_minus_share_personal_budget_minus_group_fee" && question.quantities.a < 50)\n'
                + '    || (family === "tpl_g3b_u04_add_divide_promotion_total_equal_share"\n'
                + '      && question.quantities.b > question.quantities.a)) {'
            );
          }

          const combinedEnd = 'if (family === "tpl_g3b_u04_add_divide_combined_inventory_equal_distribution") {';
          if (!text.includes('tpl_g3b_u04_sub_div_reserved_amount_then_distribute") || !text.includes('Per-recipient reserved-distribution quantity')) {
            const block = `  if (family === "tpl_g3b_u04_sub_div_reserved_amount_then_distribute") {
            const caps = { classroom: 6, library: 4, sports_equipment: 2, awards: 3 };
            if (question.finalAnswer > (caps[question.contextDomain] ?? 4)) {
              errors.push(issue("G3B_U04_READBACK_PER_RECIPIENT_QUANTITY_IMPLAUSIBLE", "quantities", "Per-recipient reserved-distribution quantity is implausible for the selected context."));
            }
          }
          `;
            const idx = text.indexOf(combinedEnd);
            if (idx < 0) throw new Error("Missing combined validator anchor");
            text = text.slice(0, idx) + block + text.slice(idx);
          }

          writeFileSync(path, text, "utf8");

          const testPath = "tests/curriculum/g3b-u04-human-semantic-quality-v2.test.js";
          let tests = readFileSync(testPath, "utf8");
          const testAnchor = 'test("S57F7R1 quality v2 exposes five additional blocking quality codes", () => {';
          if (!tests.includes("public-smoke semantic third-pass")) {
            const added = `test("S57F7R1 public-smoke semantic third-pass fixes promotion, reserved distribution, and participant scope", () => {
            const promotion = fixed("ps_g3b_u04_add_divide_promotion_total_equal_share", "daily_goods");
            assert.equal(promotion.quantities.b <= promotion.quantities.a, true);
            assert.match(promotion.promptText, /共同購買/);
            assert.match(promotion.promptText, /共同使用/);
            assert.equal(validateG3BU04HumanSemanticQualityV2(promotion).ok, true);

            const library = fixed("ps_g3b_u04_sub_div_reserved_amount_then_distribute", "library");
            const awards = fixed("ps_g3b_u04_sub_div_reserved_amount_then_distribute", "awards");
            assert.equal(library.finalAnswer <= 4, true);
            assert.equal(awards.finalAnswer <= 3, true);

            const sharedCost = fixed("ps_g3b_u04_div_add_shared_cost_plus_personal_purchase", "meal");
            assert.match(sharedCost.promptText, /小安和其他人共/);
            assert.equal(validateG3BU04HumanSemanticQualityV2(sharedCost).ok, true);
          });

          `;
            if (!tests.includes(testAnchor)) throw new Error("Missing quality v2 test anchor");
            tests = tests.replace(testAnchor, added + testAnchor);
          }
          writeFileSync(testPath, tests, "utf8");
          NODE
          node /tmp/s57f7r1-third-pass.mjs
          git diff --check

      - name: Commit patch and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+users.noreply.github.com"
          git add site/modules/curriculum/batch-a/g3b-u04-human-semantic-readback-quality-v2.js
          git add tests/curriculum/g3b-u04-human-semantic-quality-v2.test.js
          git rm .github/workflows/s57f7r1-public-smoke-third-pass-fullfix.yml
          git commit -m "fix(g3b-u04): close public smoke semantic third-pass defects"
          git push origin HEAD:s57f7r1-g3b-u04-human-semantic-readback-fullfix
