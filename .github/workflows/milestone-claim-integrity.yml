name: Milestone Claim Integrity

on:
  push:
    branches: [main]
    paths:
      - "data/project/milestones/**"
      - "tools/governance/**"
      - "tests/governance/**"
      - ".github/workflows/milestone-claim-integrity.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: milestone-claim-${{ github.ref }}
  cancel-in-progress: true

jobs:
  claim-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run governance:claims
