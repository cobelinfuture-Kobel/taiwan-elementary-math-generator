name: Milestone Claim Integrity

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  claim-integrity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Validate all milestone claims
        run: npm run governance:claims

      - name: Require PR claim manifest and body parity
        if: github.event_name == 'pull_request'
        run: npm run governance:claims:pr
